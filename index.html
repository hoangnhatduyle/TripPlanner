<!DOCTYPE html>
<html lang="en" data-auth="locked">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#009eb0">
<style>
/* ===========================================================
   THEME TOKENS — switched via data-theme on <html>
   =========================================================== */
:root,
:root[data-theme="beach"] {
  --bg-grad-1: #b7e7f0;
  --bg-grad-2: #ffe9c4;
  --bg-grad-3: #ffc1b0;
  --primary: #009eb0;
  --primary-dark: #007a8c;
  --primary-soft: #d3f3f7;
  --accent: #ff7e6b;
  --accent-soft: #ffe0d8;
  --surface: rgba(255,255,255,0.78);
  --surface-solid: #ffffff;
  --surface-2: #f7fbfc;
  --ink: #093743;
  --ink-soft: #4f6e76;
  --line: rgba(9,55,67,0.10);
  --line-strong: rgba(9,55,67,0.18);
  --shadow: 0 12px 40px rgba(0,90,110,0.16);
  --shadow-sm: 0 4px 18px rgba(0,90,110,0.08);
  --hero-emoji: "🏖️";
}
:root[data-theme="forest"] {
  --bg-grad-1: #cfeacf;
  --bg-grad-2: #e9f3d6;
  --bg-grad-3: #f5e9c8;
  --primary: #2e7d4f;
  --primary-dark: #1e5d3a;
  --primary-soft: #e0efdb;
  --accent: #c97b3a;
  --accent-soft: #f5e2d0;
  --surface: rgba(255,255,255,0.82);
  --surface-solid: #ffffff;
  --surface-2: #f6f9f3;
  --ink: #1b2f25;
  --ink-soft: #4a5b50;
  --line: rgba(27,47,37,0.10);
  --line-strong: rgba(27,47,37,0.18);
  --shadow: 0 12px 40px rgba(30,93,58,0.15);
  --shadow-sm: 0 4px 18px rgba(30,93,58,0.08);
  --hero-emoji: "🌲";
}
:root[data-theme="city"] {
  --bg-grad-1: #d6e1ec;
  --bg-grad-2: #eef1f4;
  --bg-grad-3: #f5e8d4;
  --primary: #1f5f8b;
  --primary-dark: #144766;
  --primary-soft: #dbe8f1;
  --accent: #d4a44a;
  --accent-soft: #f5e8c8;
  --surface: rgba(255,255,255,0.85);
  --surface-solid: #ffffff;
  --surface-2: #f5f7fa;
  --ink: #14263a;
  --ink-soft: #4d5e6f;
  --line: rgba(20,38,58,0.10);
  --line-strong: rgba(20,38,58,0.18);
  --shadow: 0 12px 40px rgba(20,71,102,0.15);
  --shadow-sm: 0 4px 18px rgba(20,71,102,0.08);
  --hero-emoji: "🏙️";
}
:root[data-theme="sunset"] {
  --bg-grad-1: #ffd5b8;
  --bg-grad-2: #ffb3c1;
  --bg-grad-3: #d4a8e0;
  --primary: #d94a6e;
  --primary-dark: #b03555;
  --primary-soft: #fbdce4;
  --accent: #f4a261;
  --accent-soft: #fde6d0;
  --surface: rgba(255,255,255,0.80);
  --surface-solid: #ffffff;
  --surface-2: #fdf5f6;
  --ink: #3a1a26;
  --ink-soft: #6b4350;
  --line: rgba(58,26,38,0.10);
  --line-strong: rgba(58,26,38,0.18);
  --shadow: 0 12px 40px rgba(176,53,85,0.16);
  --shadow-sm: 0 4px 18px rgba(176,53,85,0.08);
  --hero-emoji: "🌅";
}
:root[data-theme="aurora"] {
  --bg-grad-1: #b8c8e8;
  --bg-grad-2: #c8b8e8;
  --bg-grad-3: #a8d8d0;
  --primary: #5b4b9c;
  --primary-dark: #3f3372;
  --primary-soft: #e0dcf0;
  --accent: #2bb3a3;
  --accent-soft: #cfeae5;
  --surface: rgba(255,255,255,0.78);
  --surface-solid: #ffffff;
  --surface-2: #f6f5fb;
  --ink: #1f1a3a;
  --ink-soft: #4d456e;
  --line: rgba(31,26,58,0.10);
  --line-strong: rgba(31,26,58,0.18);
  --shadow: 0 12px 40px rgba(63,51,114,0.18);
  --shadow-sm: 0 4px 18px rgba(63,51,114,0.10);
  --hero-emoji: "🌌";
}
:root[data-theme="mono"] {
  --bg-grad-1: #ececec;
  --bg-grad-2: #f6f6f6;
  --bg-grad-3: #e2e2e2;
  --primary: #2b2b2b;
  --primary-dark: #111111;
  --primary-soft: #e8e8e8;
  --accent: #777777;
  --accent-soft: #e0e0e0;
  --surface: rgba(255,255,255,0.92);
  --surface-solid: #ffffff;
  --surface-2: #fafafa;
  --ink: #1a1a1a;
  --ink-soft: #555555;
  --line: rgba(0,0,0,0.10);
  --line-strong: rgba(0,0,0,0.20);
  --shadow: 0 8px 30px rgba(0,0,0,0.10);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.06);
  --hero-emoji: "✈️";
}

/* ===========================================================
   AUTH / VIEW-ONLY
   =========================================================== */
.view-only-banner {
  background: var(--primary-soft);
  border-bottom: 1px solid var(--line);
  color: var(--primary-dark);
  font-size: 13px; font-weight: 600;
  text-align: center; padding: 7px 16px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.view-only-banner button {
  background: var(--primary); color: white;
  border: none; border-radius: 7px;
  padding: 4px 12px; font-size: 12px; font-weight: 700;
  cursor: pointer;
}
[data-auth="locked"] .edit-action { display: none !important; }

/* Disable every form control inside the content area when locked */
[data-auth="locked"] #app-root input,
[data-auth="locked"] #app-root textarea,
[data-auth="locked"] #app-root select {
  pointer-events: none !important;
  cursor: default !important;
  background: transparent !important;
  color: var(--ink) !important;
}
[data-auth="locked"] #app-root input[type="checkbox"] {
  opacity: 0.45;
}
/* Let read-only link anchors still open */
[data-auth="locked"] #app-root a { pointer-events: auto !important; }

/* Any share link (read OR edit): hide things visitors must never touch */
[data-share="true"] .share-hidden { display: none !important; }

/* share-edit: re-enable all form controls but hide global/destructive actions */
[data-auth="share-edit"] #app-root input,
[data-auth="share-edit"] #app-root textarea,
[data-auth="share-edit"] #app-root select {
  pointer-events: auto !important;
  cursor: auto !important;
  background: revert !important;
  color: revert !important;
}
[data-auth="share-edit"] #app-root input[type="checkbox"] {
  opacity: 1;
}
[data-auth="share-edit"] .share-edit-hidden { display: none !important; }
[data-auth="share-edit"] .edit-action { display: none !important; }

/* ===========================================================
   BASE
   =========================================================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(1200px 700px at 0% 0%, var(--bg-grad-1) 0%, transparent 60%),
    radial-gradient(1100px 700px at 100% 0%, var(--bg-grad-3) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-grad-2) 0%, #ffffff 70%);
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
h1, h2, h3, h4 { margin: 0; font-weight: 700; letter-spacing: -0.01em; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ===========================================================
   TOP NAV
   =========================================================== */
.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none;
}
.brand-mark {
  width: 36px; height: 36px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: grid; place-items: center;
  color: white; font-size: 18px;
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-weight: 800; font-size: 18px; color: var(--ink);
  letter-spacing: -0.01em;
}
.brand-tag {
  font-family: 'Caveat', cursive;
  font-size: 17px; color: var(--primary);
  margin-left: 4px;
}
.nav-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface-solid); border: 1px solid var(--line);
  display: grid; place-items: center; color: var(--ink);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--primary-soft); border-color: var(--line-strong); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn.unlocked { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }

/* ===========================================================
   APP LAYOUT
   =========================================================== */
.app { max-width: 1240px; margin: 0 auto; padding: 28px; }
.app-print-only { display: none; }
@media print {
  .nav, .fab, #modal-root, .no-print { display: none !important; }
  body { background: white; }
  .app { max-width: 100%; padding: 0; }
}

/* ===========================================================
   DASHBOARD
   =========================================================== */
.hero {
  display: flex; align-items: center; justify-content: space-between;
  gap: 28px; padding: 28px 0 32px;
}
.hero-text h1 {
  font-size: 38px; line-height: 1.1; margin-bottom: 8px;
}
.hero-text h1 .accent { color: var(--primary); }
.hero-text p { color: var(--ink-soft); margin: 0; font-size: 16px; }
.hero-emoji {
  font-size: 78px; line-height: 1;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.12));
  animation: bob 5s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-6px) rotate(3deg); }
}

.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: 6px 0 16px;
}
.section-head h2 { font-size: 22px; }
.section-head .muted { color: var(--ink-soft); font-size: 14px; margin-left: 8px; font-weight: 500; }

.trip-grid {
  display: grid; gap: 18px;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
}
.trip-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.trip-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: var(--line-strong);
}
.trip-card-banner {
  height: 110px; border-radius: 12px; margin: -6px -6px 14px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: grid; place-items: center;
  font-size: 56px;
  position: relative; overflow: hidden;
}
.trip-card-banner::after {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25) 0%, transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 35%);
  pointer-events: none;
}
.trip-card-title { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.trip-card-dest { color: var(--ink-soft); font-size: 13px; margin-bottom: 12px; }
.trip-card-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--ink-soft);
  margin-top: 6px;
}
.trip-card-row svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
.trip-card-cd {
  position: absolute; top: 12px; right: 12px;
  background: var(--surface-solid); color: var(--primary);
  border-radius: 999px; padding: 5px 11px; font-size: 12px;
  font-weight: 700; box-shadow: var(--shadow-sm);
}
.trip-card-cd.past { color: var(--ink-soft); }
.trip-card-cd.live { color: white; background: var(--accent); }

/* New trip card */
.trip-card.new {
  background: transparent;
  border: 2px dashed var(--line-strong);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 270px; cursor: pointer;
  color: var(--primary); font-weight: 600;
  transition: all 0.2s;
}
.trip-card.new:hover {
  border-color: var(--primary); background: var(--primary-soft);
}
.trip-card.new .plus {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary-soft); display: grid; place-items: center;
  font-size: 30px; color: var(--primary); margin-bottom: 10px;
  font-weight: 300;
}
.trip-card.new:hover .plus { background: white; }

/* Empty state */
.empty-state {
  padding: 60px 28px; text-align: center;
  background: var(--surface);
  border-radius: 22px; border: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.empty-state .e-emoji { font-size: 64px; margin-bottom: 12px; }
.empty-state h3 { font-size: 22px; margin-bottom: 6px; }
.empty-state p { color: var(--ink-soft); margin: 0 0 18px; }

/* ===========================================================
   BUTTONS
   =========================================================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 11px;
  font-weight: 600; font-size: 14px;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s; text-decoration: none;
  color: var(--ink); background: var(--surface-solid);
  border-color: var(--line);
}
.btn:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn.primary {
  background: var(--primary); color: white;
  border-color: var(--primary);
}
.btn.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
.btn.accent {
  background: var(--accent); color: white; border-color: var(--accent);
}
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-solid); border-color: var(--line); }
.btn.danger { color: #c0392b; border-color: rgba(192,57,43,0.2); }
.btn.danger:hover { background: #fbe9e7; border-color: rgba(192,57,43,0.4); }
.btn svg { width: 16px; height: 16px; }
.btn.lg { padding: 13px 22px; font-size: 15px; }
.btn.sm { padding: 6px 11px; font-size: 12px; border-radius: 8px; }
.btn.sm svg { width: 13px; height: 13px; }

/* ===========================================================
   TRIP DETAIL
   =========================================================== */
.trip-header {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px 28px;
  margin-bottom: 22px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px);
}
.trip-header::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--primary-soft) 0%, transparent 50%);
  opacity: 0.6; pointer-events: none;
}
.trip-header-row { display: flex; gap: 22px; align-items: center; position: relative; }
.trip-emoji {
  font-size: 60px; line-height: 1;
  width: 86px; height: 86px; border-radius: 22px;
  display: grid; place-items: center;
  background: var(--surface-solid);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  border: 1px solid var(--line);
}
.trip-emoji:hover { transform: scale(1.04); }
.trip-meta { flex: 1; min-width: 0; }
.trip-title {
  font-size: 28px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 10px;
}
.trip-title input {
  font: inherit; background: transparent; border: none;
  padding: 4px 6px; border-radius: 8px; width: 100%;
  border: 1px solid transparent; color: var(--ink);
}
.trip-title input:hover { border-color: var(--line); }
.trip-title input:focus { outline: none; border-color: var(--primary); background: var(--surface-solid); }
.trip-sub { color: var(--ink-soft); font-size: 14px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.trip-sub span { display: inline-flex; align-items: center; gap: 5px; }
.trip-sub svg { width: 14px; height: 14px; opacity: 0.7; }

.trip-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-top: 18px;
}
.stat {
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
}
.stat-label { font-size: 11px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 20px; font-weight: 700; color: var(--ink); margin-top: 3px; }
.stat-value.accent { color: var(--accent); }
.stat-value.primary { color: var(--primary); }

/* ===========================================================
   TABS
   =========================================================== */
.tabs {
  display: flex; gap: 4px;
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 14px; padding: 5px;
  margin-bottom: 22px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 16px; border-radius: 10px;
  background: transparent; border: none;
  color: var(--ink-soft); font-weight: 600; font-size: 14px;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active {
  background: var(--primary-soft); color: var(--primary-dark);
}
.tab svg { width: 15px; height: 15px; }

.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px;
  backdrop-filter: blur(8px);
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.panel-head h3 { font-size: 18px; }
.panel-head .actions { display: flex; gap: 8px; }
.panel-sub { color: var(--ink-soft); font-size: 13px; margin: -8px 0 14px; }

/* ===========================================================
   TABLES
   =========================================================== */
.t-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); background: var(--surface-solid); }
table.t {
  width: 100%; border-collapse: collapse; font-size: 14px;
  min-width: 600px;
}
table.t th, table.t td {
  text-align: left; padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
table.t th {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-soft);
  background: var(--surface-2);
}
table.t tr:last-child td { border-bottom: none; }
table.t td input, table.t td textarea, table.t td select {
  width: 100%; background: transparent;
  border: 1px solid transparent; padding: 6px 8px;
  border-radius: 7px; color: var(--ink);
  font-size: 13px;
}
table.t td input:hover, table.t td textarea:hover, table.t td select:hover {
  border-color: var(--line);
}
table.t td input:focus, table.t td textarea:focus, table.t td select:focus {
  outline: none; border-color: var(--primary); background: white;
}
table.t td.num { text-align: right; font-variant-numeric: tabular-nums; }
table.t td.num input { text-align: right; }
table.t tfoot td {
  font-weight: 700; background: var(--surface-2);
  border-top: 2px solid var(--line-strong);
}
.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.row-actions .icon-btn { width: 28px; height: 28px; border-radius: 7px; }
.row-actions .icon-btn svg { width: 14px; height: 14px; }

/* ===========================================================
   PACKING
   =========================================================== */
.pack-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.pack-cat {
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
}
.pack-cat-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 8px;
}
.pack-cat-title {
  font-weight: 700; font-size: 14px; color: var(--ink);
  background: transparent; border: 1px solid transparent;
  padding: 4px 6px; border-radius: 6px; width: 100%;
  display: flex; align-items: center; gap: 6px;
}
.pack-cat-title input {
  background: transparent; border: 1px solid transparent;
  padding: 4px 6px; border-radius: 6px; width: 100%;
  font: inherit; color: inherit;
}
.pack-cat-title input:hover { border-color: var(--line); }
.pack-cat-title input:focus { outline: none; border-color: var(--primary); background: white; }
.pack-cat-progress {
  font-size: 11px; color: var(--ink-soft);
  font-weight: 600; white-space: nowrap;
}
.pack-bar {
  height: 4px; background: var(--surface-2);
  border-radius: 999px; overflow: hidden;
  margin-bottom: 10px;
}
.pack-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 999px; transition: width 0.3s;
}
.pack-items { display: flex; flex-direction: column; gap: 3px; }
.pack-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px; border-radius: 7px;
  transition: background 0.1s;
}
.pack-item:hover { background: var(--surface-2); }
.pack-item.checked .pack-name {
  text-decoration: line-through; color: var(--ink-soft); opacity: 0.7;
}
.pack-item input[type="checkbox"] {
  width: 17px; height: 17px; accent-color: var(--primary);
  cursor: pointer; flex-shrink: 0;
}
.pack-item input[type="text"] {
  flex: 1; background: transparent; border: none;
  padding: 3px 0; font-size: 13px; color: var(--ink);
  min-width: 0;
}
.pack-item input[type="text"]:focus { outline: none; }
.pack-item .x {
  visibility: hidden;
  background: transparent; border: none; color: var(--ink-soft);
  padding: 2px; cursor: pointer; border-radius: 5px;
  width: 22px; height: 22px; display: grid; place-items: center;
}
.pack-item .x:hover { background: var(--line); color: #c0392b; }
.pack-item:hover .x { visibility: visible; }
.pack-add {
  display: flex; gap: 6px; margin-top: 8px;
}
.pack-add input {
  flex: 1; background: var(--surface-2);
  border: 1px solid var(--line); padding: 7px 10px;
  border-radius: 8px; font-size: 13px; color: var(--ink);
}
.pack-add input:focus { outline: none; border-color: var(--primary); background: white; }
.pack-add button {
  background: var(--primary-soft); color: var(--primary-dark);
  border: 1px solid transparent; border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 700;
}
.pack-add button:hover { background: var(--primary); color: white; }

/* ===========================================================
   ITINERARY
   =========================================================== */
.itin-controls {
  display: flex; gap: 8px; margin-bottom: 14px;
  align-items: center; flex-wrap: wrap;
}
.itin-controls label { font-size: 13px; color: var(--ink-soft); }
.itin-controls select, .itin-controls input {
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--ink);
}
.itin-grid-wrap { overflow-x: auto; }
.itin-grid {
  display: grid; gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
  min-width: max-content;
}
.itin-cell {
  padding: 8px 10px; min-height: 46px; font-size: 13px;
  position: relative; background: var(--surface-solid);
}
.itin-cell.time {
  background: var(--surface-2) !important;
  font-weight: 700; color: var(--ink-soft);
  font-size: 12px; font-variant-numeric: tabular-nums;
  text-align: center; min-width: 70px;
  display: grid; place-items: center;
}
.itin-cell.daycol {
  font-weight: 700; text-align: center;
  background: var(--primary-soft) !important;
  color: var(--primary-dark);
  padding: 12px 10px;
  min-width: 150px;
}
.itin-cell.daycol .dnum { font-size: 11px; opacity: 0.7; }
.itin-cell.daycol .dlabel { font-size: 14px; }
.itin-cell.daycol .ddate { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.itin-cell.daycol input.theme-in {
  margin-top: 6px; width: 100%; background: rgba(255,255,255,0.7);
  border: 1px dashed var(--line-strong); border-radius: 7px;
  padding: 4px 8px; font-size: 12px; text-align: center;
  font-family: 'Caveat', cursive; color: var(--primary-dark);
  font-weight: 700;
}
.itin-cell.daycol input.theme-in:focus { outline: none; border-style: solid; background: white; }
.itin-cell.slot { cursor: text; position: relative; }
.itin-cell.slot .slot-content {
  width: 100%; height: 100%; min-height: 30px;
  background: transparent; border: 1px solid transparent;
  padding: 6px 8px; border-radius: 6px;
  font: inherit; font-size: 13px; color: var(--ink);
  display: flex; flex-direction: column; justify-content: flex-start;
}
.itin-cell.slot textarea {
  width: 100%; background: transparent; border: none;
  padding: 0; border-radius: 0; resize: none;
  font: inherit; font-size: 13px; color: var(--ink);
  overflow: hidden; flex: 1;
}
.itin-cell.slot textarea:focus { outline: none; }
.itin-cell.slot.filled .slot-content {
  background: var(--accent-soft); border-color: transparent;
  border-radius: 8px;
}
.itin-cell.slot .slot-content:hover { border-color: var(--line); }
.itin-cell.slot.filled .slot-content:hover { border-color: var(--accent); }
.itin-cell.slot .slot-time-badge {
  font-size: 10px; color: var(--ink-soft); font-weight: 600;
  margin-bottom: 2px; pointer-events: none;
}
/* Drag handle for spanning */
.itin-cell.slot.filled .drag-handle {
  position: absolute; bottom: 0; left: 10%; right: 10%; height: 8px;
  cursor: ns-resize; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.itin-cell.slot.filled:hover .drag-handle { opacity: 1; }
.drag-handle::after {
  content: ""; width: 30px; height: 3px; border-radius: 3px;
  background: var(--primary); opacity: 0.5;
}
.drag-handle:hover::after { opacity: 1; height: 4px; }
/* Mobile: tap target for activity dialog */
.itin-cell.slot.filled .mobile-edit-btn {
  display: none; position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--primary); color: white; border: none;
  font-size: 11px; cursor: pointer; place-items: center;
}
@media (hover: none) and (pointer: coarse) {
  .itin-cell.slot.filled .drag-handle { display: none !important; }
  .itin-cell.slot.filled .mobile-edit-btn { display: grid; }
}
/* Activity time dialog */
.activity-time-form { display: flex; flex-direction: column; gap: 14px; }
.activity-time-form .field-row {
  display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 10px;
}
.activity-time-form .field-row label { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
.activity-time-form select {
  padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
  font-size: 14px; background: var(--surface-solid); color: var(--ink);
}
.itin-day-actions {
  display: flex; gap: 4px; justify-content: center; margin-top: 6px;
}
.itin-day-actions button {
  background: transparent; border: 1px solid var(--line-strong);
  border-radius: 6px; padding: 2px 6px; font-size: 10px;
  color: var(--ink-soft); cursor: pointer;
}
.itin-day-actions button:hover { background: white; color: var(--ink); }

/* ===========================================================
   RESERVATIONS
   =========================================================== */
.res-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.res-status.pending { background: #fff4d6; color: #946800; }
.res-status.booked { background: #d6f5e0; color: #1d6e3a; }
.res-status.cancelled { background: #fadcd9; color: #a02b25; }

/* ===========================================================
   NOTES
   =========================================================== */
.notes-area {
  width: 100%; min-height: 280px;
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 12px; padding: 16px 18px;
  font: inherit; font-size: 14px; color: var(--ink);
  line-height: 1.65; resize: vertical;
}
.notes-area:focus { outline: none; border-color: var(--primary); }

/* ===========================================================
   MODAL
   =========================================================== */
.modal-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(20,20,30,0.45);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  padding: 20px;
  animation: fadein 0.15s ease;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes popin { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal {
  background: white; color: var(--ink);
  border-radius: 18px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  animation: popin 0.18s ease;
}
.modal-head {
  padding: 18px 22px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 18px; }
.modal-body { padding: 6px 22px 18px; }
.modal-foot {
  padding: 14px 22px 18px; display: flex; gap: 8px;
  justify-content: flex-end; border-top: 1px solid var(--line);
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--ink-soft); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 14px; color: var(--ink); background: var(--surface-2);
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--primary); background: white;
}
.field textarea { min-height: 80px; resize: vertical; }
.emoji-picker {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
  margin-top: 6px;
}
.emoji-picker button {
  font-size: 22px; padding: 7px;
  background: var(--surface-2); border: 1px solid transparent;
  border-radius: 9px;
}
.emoji-picker button:hover { background: var(--primary-soft); border-color: var(--primary); }
.emoji-picker button.sel { background: var(--primary-soft); border-color: var(--primary); }

/* ===========================================================
   FAB (Quick calc)
   =========================================================== */
.fab {
  position: fixed; bottom: 26px; right: 26px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary); color: white;
  border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  cursor: pointer; z-index: 40;
  display: grid; place-items: center;
  font-size: 22px;
  transition: all 0.2s;
}
.fab:hover { transform: scale(1.06); background: var(--primary-dark); }
.fab svg { width: 22px; height: 22px; }

/* ===========================================================
   CALCULATOR
   =========================================================== */
.calc {
  background: white; border-radius: 18px;
  padding: 18px; max-width: 320px;
}
.calc-display {
  background: var(--ink); color: white;
  border-radius: 12px; padding: 14px 16px;
  font-family: 'Plus Jakarta Sans', monospace;
  font-size: 26px; font-weight: 600;
  text-align: right; min-height: 56px;
  margin-bottom: 12px;
  word-break: break-all; overflow-wrap: anywhere;
}
.calc-display .expr {
  font-size: 12px; opacity: 0.5; min-height: 14px;
  margin-bottom: 2px;
}
.calc-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.calc-btn {
  padding: 14px 0; border-radius: 11px;
  background: var(--surface-2); border: 1px solid var(--line);
  font-size: 17px; font-weight: 600; color: var(--ink);
  transition: all 0.1s;
}
.calc-btn:hover { background: var(--primary-soft); }
.calc-btn:active { transform: scale(0.95); }
.calc-btn.op { background: var(--primary-soft); color: var(--primary-dark); }
.calc-btn.eq { background: var(--primary); color: white; border-color: var(--primary); }
.calc-btn.fn { background: var(--accent-soft); color: var(--accent); }
.calc-help {
  margin-top: 10px; padding: 10px 12px;
  background: var(--surface-2); border-radius: 9px;
  font-size: 12px; color: var(--ink-soft);
}

/* ===========================================================
   SETTINGS PANEL
   =========================================================== */
.set-panel { padding: 6px 4px; }
.theme-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-top: 10px;
}
.theme-swatch {
  border: 2px solid transparent; border-radius: 13px;
  padding: 4px; cursor: pointer; transition: all 0.15s;
  background: white;
}
.theme-swatch.sel { border-color: var(--ink); }
.theme-swatch:hover { transform: translateY(-2px); }
.theme-swatch .preview {
  height: 60px; border-radius: 9px; position: relative; overflow: hidden;
}
.theme-swatch .preview::after {
  content: ""; position: absolute; bottom: 6px; left: 6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--p1); border: 2px solid white;
}
.theme-swatch .name { text-align: center; font-size: 12px; font-weight: 600; margin-top: 6px; }

/* ===========================================================
   SHARED HELPERS
   =========================================================== */
.muted { color: var(--ink-soft); }
.text-sm { font-size: 13px; }
.empty-mini {
  padding: 24px; text-align: center;
  color: var(--ink-soft); font-size: 14px;
  background: var(--surface-2); border-radius: 12px;
  border: 1px dashed var(--line-strong);
}
.empty-mini h4 { margin: 0 0 6px; color: var(--ink); font-size: 15px; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.row.between { justify-content: space-between; }
.spacer { flex: 1; }
.kbd {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  background: var(--surface-2); border: 1px solid var(--line);
  font-family: monospace; font-size: 11px;
}
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--primary-soft); color: var(--primary-dark);
  padding: 3px 9px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.tag:hover { background: var(--primary); color: white; }
.tag.is-me {
  background: var(--primary); color: white;
  box-shadow: 0 0 0 2px var(--primary-soft);
}
.tag .me-badge { font-size: 9px; opacity: 0.85; }

/* My Summary panel */
.my-summary {
  background: linear-gradient(135deg, var(--primary-soft) 0%, var(--surface-2) 100%);
  border: 1px solid var(--primary); border-radius: 14px;
  padding: 18px; margin-top: 14px;
}
.my-summary-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.my-summary-head h4 { font-size: 15px; color: var(--primary-dark); margin: 0; }
.my-summary-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 14px;
}
.my-stat {
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 12px; text-align: center;
}
.my-stat .label { font-size: 10px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.my-stat .value { font-size: 18px; font-weight: 700; margin-top: 3px; }
.my-debts { margin-top: 10px; }
.my-debts-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 6px; }
.my-debt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-radius: 8px; font-size: 13px;
  background: var(--surface-solid); border: 1px solid var(--line);
  margin-bottom: 4px;
}
.my-debt-row .name { font-weight: 600; }
.my-debt-row .amt { font-weight: 700; font-variant-numeric: tabular-nums; }
.my-debt-row .amt.owed-to-me { color: var(--primary); }
.my-debt-row .amt.i-owe { color: #c0392b; }
.split-summary {
  display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  margin-top: 14px;
}
.split-pill {
  background: var(--surface-2);
  border: 1px solid var(--line); border-radius: 11px;
  padding: 10px 12px;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.split-pill:hover {
  border-color: var(--primary); background: var(--primary-soft);
  transform: translateY(-1px); box-shadow: var(--shadow-sm);
}
.split-pill .who { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.split-pill .amt { font-size: 18px; font-weight: 700; color: var(--ink); margin-top: 2px; }

/* Person detail dialog */
.person-detail-expenses { margin-top: 12px; }
.person-detail-expenses table { width: 100%; border-collapse: collapse; font-size: 13px; }
.person-detail-expenses th {
  text-align: left; padding: 8px 10px; font-weight: 600; font-size: 12px;
  color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 2px solid var(--line-strong);
}
.person-detail-expenses th.num { text-align: right; }
.person-detail-expenses td { padding: 8px 10px; border-bottom: 1px solid var(--line); }
.person-detail-expenses td.num { text-align: right; font-variant-numeric: tabular-nums; }
.person-detail-expenses td.cat-badge span {
  display: inline-block; background: var(--primary-soft); color: var(--primary-dark);
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
}
.person-detail-expenses tfoot td { font-weight: 700; border-top: 2px solid var(--line-strong); border-bottom: none; }
.person-detail-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px;
}
.person-detail-stat {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 11px; padding: 12px; text-align: center;
}
.person-detail-stat .label { font-size: 11px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.person-detail-stat .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
.person-detail-stat .value.positive { color: var(--primary); }
.person-detail-stat .value.negative { color: #c0392b; }
.person-detail-stat .value.even { color: var(--ink-soft); }

/* ===========================================================
   SPLIT EDITOR
   =========================================================== */
.split-methods {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  margin-bottom: 6px;
}
@media (max-width: 600px) {
  .split-methods { grid-template-columns: repeat(3, 1fr); }
}
.split-method {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
}
.split-method:hover { background: var(--primary-soft); border-color: var(--primary); }
.split-method.sel {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.split-method .sm-icon {
  font-size: 16px; font-weight: 700;
  min-height: 22px; display: grid; place-items: center;
}
.split-method .sm-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.split-desc {
  font-size: 13px; color: var(--ink-soft);
  background: var(--surface-2);
  border: 1px dashed var(--line-strong);
  border-radius: 9px;
  padding: 10px 12px;
  margin-bottom: 14px;
  line-height: 1.5;
}
.split-participants {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 14px;
}
.split-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 999px; padding: 5px 11px;
  font-size: 13px; cursor: pointer; user-select: none;
  transition: all 0.15s;
}
.split-chip:hover { border-color: var(--primary); }
.split-chip.on {
  background: var(--primary-soft);
  border-color: var(--primary);
  color: var(--primary-dark);
  font-weight: 600;
}
.split-chip input[type="checkbox"] { display: none; }
.split-chip .dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--line-strong); background: white;
  display: grid; place-items: center;
  transition: all 0.15s;
}
.split-chip.on .dot {
  background: var(--primary); border-color: var(--primary);
}
.split-chip.on .dot::after {
  content: ""; width: 5px; height: 5px;
  background: white; border-radius: 50%;
}
.split-rows {
  border: 1px solid var(--line); border-radius: 11px;
  background: var(--surface-solid);
  overflow: hidden;
}
.split-row-head, .split-row {
  display: grid;
  gap: 10px;
  padding: 10px 14px;
  align-items: center;
}
.split-row-head {
  background: var(--surface-2);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-soft);
}
.split-row {
  border-top: 1px solid var(--line);
  font-size: 14px;
}
.split-row-head.cols-2, .split-row.cols-2 { grid-template-columns: 1fr auto; }
.split-row-head.cols-3, .split-row.cols-3 { grid-template-columns: 1fr 110px 100px; }
.split-row-head.cols-4, .split-row.cols-4 { grid-template-columns: 1fr 90px 100px 100px; }
.split-row .who { font-weight: 600; color: var(--ink); }
.split-row .amt-out { font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; }
.split-row .amt-out.muted-out { color: var(--ink-soft); font-weight: 500; }
.split-row input.split-in {
  width: 100%; padding: 6px 10px;
  border: 1px solid var(--line); border-radius: 7px;
  font-size: 13px; background: var(--surface-2);
  color: var(--ink); font-variant-numeric: tabular-nums;
}
.split-row input.split-in:focus { outline: none; border-color: var(--primary); background: white; }
.split-row input.split-in.adj { padding-left: 28px; }
.adj-wrap { position: relative; }
.adj-wrap::before {
  content: "±$"; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: var(--ink-soft); font-weight: 600;
}
.split-summary-line {
  margin-top: 12px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; font-weight: 700;
  padding: 10px 14px;
  background: var(--surface-2);
  border-radius: 9px;
}
.split-summary-line .ok { color: #1d6e3a; font-weight: 700; }
.split-summary-line .bad { color: #c0392b; font-weight: 700; }
.split-cell-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 8px; padding: 5px 10px;
  font-size: 12px; font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;

}
.payer-btn .payer-placeholder { color: var(--ink-soft); font-style: italic; }

/* Settle-up dialog */
.settle-section { margin-top: 18px; }
.settle-section-label {

  letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 8px;
}
.settle-payer-chips {

}
.settle-payer-chip {

}
.settle-payer-chip .chip-dot {

}

.settle-rows { margin-top: 12px; }
.settle-row {

}
.settle-row:last-child { border-bottom: none; }
.settle-row .settle-name { font-weight: 600; color: var(--ink); }
.settle-row .settle-amt {
  font-weight: 600; font-variant-numeric: tabular-nums;

.settle-toggle {
  display: inline-flex; align-items: center; gap: 6px;

  font-weight: 600; cursor: pointer; border: 1px solid var(--line);

.settle-toggle:hover { border-color: var(--primary); }

}
.settle-toggle.is-payer {

.settle-summary {

/* Print styles */
@media print {
  body { background: white !important; color: black; }
  .trip-header, .panel { background: white !important; border-color: #ddd !important; box-shadow: none !important; }
  .panel { page-break-inside: avoid; }

  .itin-cell.daycol { background: #f0f0f0 !important; color: black !important; }
  .tab:not(.active) { display: none; }
  .tabs { display: none; }
  .panel { margin-bottom: 18px; }
  .print-show { display: block !important; }
}
.print-show { display: none; }

/* tooltip */
.hint {
  font-size: 12px; color: var(--ink-soft); margin-top: 4px;
}

/* responsive */
@media (max-width: 760px) {
  .hero { flex-direction: column-reverse; align-items: flex-start; gap: 14px; }
  .hero-text h1 { font-size: 28px; }

}

<script>
/* ============================================================
   TRIP PLANNER  —  vanilla single-file app
   ============================================================ */

// -------- DEFAULTS (smart starter templates) --------
const PACKING_TEMPLATE = [
  { name: "Essentials", items: ["First aid kit", "Advil / pain reliever", "Cough drops", "Hydrocortisone", "Band-aids", "Hand sanitizer", "Tissues", "Masks"] },
  { name: "Clothes",    items: ["Pajamas", "Jacket / layers", "Underwear & socks", "3 outfits", "Swimwear", "Comfortable walking shoes"] },
  { name: "Electronics",items: ["Phone charger", "Power bank", "USB adapter", "Headphones / AirPods", "Camera", "Laptop / iPad"] },
  { name: "Skincare",   items: ["Cleanser", "Moisturizer", "Sunscreen (face)", "Cotton pads", "Acne patches", "Lip balm"] },
  { name: "Beauty",     items: ["Mascara", "Lipstick", "Eyebrow pencil", "Makeup remover", "Eyelash curler"] },
  { name: "Body care",  items: ["Body wash", "Shampoo & conditioner", "Body lotion", "Sunscreen (body)", "Deodorant"] },
  { name: "Hair care",  items: ["Hair dryer", "Comb / brush", "Hair ties", "Curler / straightener"] },
  { name: "Dental",     items: ["Toothbrush", "Toothpaste", "Floss / flosser", "Mouthwash"] },
  { name: "Outside kit",items: ["Umbrella", "Hat / cap", "Tote / reusable bag", "Sunglasses", "Sandals"] },
  { name: "Documents",  items: ["ID / Driver license", "Passport", "Wallet & cards", "Reservation printouts", "Insurance card"] },
  { name: "Miscellaneous", items: ["Tripod", "Snacks", "Board games", "Travel iron", "Lint roller"] }
];

const EXPENSE_CATEGORIES = ["Transport", "Lodging", "Activities", "Food", "Shopping", "Misc"];

const SPLIT_METHODS = [
  { id: "equal",   label: "Equal",   icon: "=",       desc: "Each traveler pays the same amount. Use when everyone benefited equally." },
  { id: "exact",   label: "Exact",   icon: "1.23",    desc: "Each traveler pays a fixed dollar amount you enter directly. Use when you've already worked out who owes what." },
  { id: "percent", label: "Percent", icon: "%",       desc: "Each traveler pays a percentage of the bill (must total 100%). Use for fixed long-term ratios." },
  { id: "shares",  label: "Shares",  icon: "≡",       desc: "Each traveler pays in proportion to assigned shares. Use when one traveler owes 2× another, etc." },
  { id: "adjust",  label: "Adjust",  icon: "+/−",     desc: "Equal split, then add or subtract a dollar amount per traveler. Use for one-off favors or fines." },
  { id: "days",    label: "Days",    icon: "📅",      desc: "Pay in proportion to # of days each person is on the trip. Use when people join for only part of the trip." }
];

const TIME_SLOTS_DEFAULT = [
  "7:00 AM","8:00 AM","9:00 AM","10:00 AM","11:00 AM","12:00 PM",
  "1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM",
  "7:00 PM","8:00 PM","9:00 PM","10:00 PM","11:00 PM"
];

const EMOJI_OPTIONS = [
  "🏖️","🌴","🗽","🏔️","🌋","🏝️","🌆","🏰","🎢","🎡",
  "🗼","🏛️","⛩️","🛕","🌅","🌇","🏕️","⛺","🚣","🏄",
  "🎿","⛷️","🏂","🚗","✈️","🚂","🛳️","🏟️","🎭","🎨",
  "🍣","🍕","🍷","☕","🎪","🎰","🎢","🦘","🦒","🐠"
];

const THEMES = [
  { id: "beach",   label: "Beach",   p1:"#009eb0", p2:"#ff7e6b", bg:"linear-gradient(135deg,#b7e7f0,#ffe9c4,#ffc1b0)" },
  { id: "forest",  label: "Forest",  p1:"#2e7d4f", p2:"#c97b3a", bg:"linear-gradient(135deg,#cfeacf,#e9f3d6,#f5e9c8)" },
  { id: "city",    label: "City",    p1:"#1f5f8b", p2:"#d4a44a", bg:"linear-gradient(135deg,#d6e1ec,#eef1f4,#f5e8d4)" },
  { id: "sunset",  label: "Sunset",  p1:"#d94a6e", p2:"#f4a261", bg:"linear-gradient(135deg,#ffd5b8,#ffb3c1,#d4a8e0)" },
  { id: "aurora",  label: "Aurora",  p1:"#5b4b9c", p2:"#2bb3a3", bg:"linear-gradient(135deg,#b8c8e8,#c8b8e8,#a8d8d0)" },
  { id: "mono",    label: "Mono",    p1:"#2b2b2b", p2:"#777777", bg:"linear-gradient(135deg,#ececec,#f6f6f6,#e2e2e2)" }
];

// -------- TIMEZONE --------
const TIMEZONES = [
  "Pacific/Honolulu","America/Anchorage","America/Los_Angeles","America/Denver",
  "America/Chicago","America/New_York","America/Sao_Paulo","Atlantic/Reykjavik",
  "Europe/London","Europe/Paris","Europe/Berlin","Europe/Helsinki","Europe/Moscow",
  "Asia/Dubai","Asia/Kolkata","Asia/Bangkok","Asia/Singapore","Asia/Ho_Chi_Minh",
  "Asia/Tokyo","Asia/Seoul","Asia/Shanghai","Australia/Sydney","Pacific/Auckland",
];
function getTimezoneOptions(selected) {
  return TIMEZONES.map(tz =>
    `<option value="${tz}" ${tz === selected ? "selected" : ""}>${tz.replace(/_/g," ")}</option>`
  ).join("");
}
function tickTzClock() {
  const el = document.getElementById("tz-clock");
  if (!el) return;
  const trip = currentTrip();
  if (!trip?.timezone) return;
  try {
    el.textContent = new Intl.DateTimeFormat(undefined, {
      timeZone: trip.timezone, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    }).format(new Date());
  } catch { el.textContent = "—"; }
}
let tzInterval = null;
function startTzClock() {
  stopTzClock();
  tickTzClock();
  tzInterval = setInterval(tickTzClock, 1000);
}
function stopTzClock() { if (tzInterval) { clearInterval(tzInterval); tzInterval = null; } }

// -------- AUTH --------
function getToken() { return sessionStorage.getItem("tp_token"); }
function setToken(t) {
  sessionStorage.setItem("tp_token", t);
  document.documentElement.setAttribute("data-auth", "unlocked");
  const btn = document.getElementById("lock-btn");
  if (btn) { btn.title = "Sign out"; btn.classList.add("unlocked"); }
  document.getElementById("lock-icon").innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
  const banner = document.getElementById("view-only-banner");
  if (banner) banner.style.display = "none";
}
function clearToken() {
  sessionStorage.removeItem("tp_token");
  document.documentElement.setAttribute("data-auth", "locked");
  const btn = document.getElementById("lock-btn");
  if (btn) { btn.title = "Sign in to edit"; btn.classList.remove("unlocked"); }
  document.getElementById("lock-icon").innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
  const banner = document.getElementById("view-only-banner");
  if (banner) banner.style.display = "";
}
function isEditing() {
  const auth = document.documentElement.getAttribute("data-auth");
  return auth === "unlocked" || auth === "share-edit";
}
function isShareMode() {
  return document.documentElement.getAttribute("data-share") === "true";
}
function guardEdit() {
  if (isEditing()) return true;
  openPasswordModal();
  return false;
}
function toggleAuth() {
  if (isEditing()) { if (confirm("Sign out?")) { clearToken(); render(); } }
  else openPasswordModal();
}
function applyAuthState() {
  const auth = document.documentElement.getAttribute("data-auth");
  // Don't touch share-edit state — it is managed exclusively by loadSharedTrip().
  if (auth === "share-edit") return;
  if (getToken()) setToken(getToken()); else clearToken();
}

// -------- STATE / STORAGE --------
const DEFAULT_STATE = () => ({ trips: [], settings: { theme: "beach", currency: "USD" } });

async function loadState() {
  try {
    const res = await fetch("/api/data");
    if (!res.ok) throw new Error("fetch failed");
    const s = await res.json();
    s.trips = s.trips || [];
    s.settings = Object.assign({ theme: "beach", currency: "USD" }, s.settings || {});
    return s;
  } catch {
    return DEFAULT_STATE();
  }
}
function saveState() {
  const auth = document.documentElement.getAttribute("data-auth");

  if (auth === "share-edit") {
    const trip = currentTrip();
    if (!trip || !window._shareToken) return;
    fetch(`/api/share/${window._shareToken}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ trip }),
    }).catch(console.error);
    return;
  }

  const token = getToken();
  if (!token) return;
  fetch("/api/data", {
    method: "PUT",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(state),
  }).catch(console.error);
}

let state = DEFAULT_STATE();
let route = { view: "home", tripId: null, tab: "overview" };

// -------- HELPERS --------
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function fmtCurrency(n) {
  const cur = state.settings.currency || "USD";
  if (n === null || n === undefined || isNaN(n)) return "—";
  try { return new Intl.NumberFormat(undefined, { style:"currency", currency: cur, maximumFractionDigits: 2 }).format(n); }
  catch { return "$" + Number(n).toFixed(2); }
}
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function parseDate(d) { if (!d) return null; const x = new Date(d + "T00:00:00"); return isNaN(x) ? null : x; }
function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}
function daysUntil(dateStr) {
  const d = parseDate(dateStr); if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return daysBetween(today, d);
}
function fmtDate(dateStr, opts={month:"short",day:"numeric",year:"numeric"}) {
  const d = parseDate(dateStr); if (!d) return "";
  return d.toLocaleDateString(undefined, opts);
}
function tripDuration(t) {
  if (!t.startDate || !t.endDate) return null;
  return daysBetween(parseDate(t.startDate), parseDate(t.endDate)) + 1;
}

function setTheme(themeId) {
  if (!isShareMode() && !guardEdit()) return;
  document.documentElement.setAttribute("data-theme", themeId);
  state.settings.theme = themeId; saveState();
}

// -------- TRIP MODEL --------
function newTrip(data) {
  if (!guardEdit()) return null;
  const start = data.startDate ? parseDate(data.startDate) : null;
  const end = data.endDate ? parseDate(data.endDate) : null;
  const days = (start && end) ? daysBetween(start, end) + 1 : 3;
  const trip = {
    id: uid(),
    title: data.title || "New Trip",
    destination: data.destination || "",
    emoji: data.emoji || "🏖️",
    startDate: data.startDate || "",
    endDate: data.endDate || "",
    travelers: (data.travelers || "").split(",").map(s => s.trim()).filter(Boolean),
    budget: data.budget ? parseFloat(data.budget) : null,
    expenses: [],
    packing: data.useTemplate
      ? PACKING_TEMPLATE.map(c => ({ id: uid(), name: c.name, items: c.items.map(i => ({ id: uid(), name: i, packed: false })) }))
      : [],
    itinerary: Array.from({ length: days }, (_, i) => ({
      id: uid(),
      theme: "",
      slots: TIME_SLOTS_DEFAULT.map(t => ({ time: t, activity: "" }))
    })),
    reservations: [],
    notes: "",
    timeSlots: TIME_SLOTS_DEFAULT.slice(),
    timezone: "",
    createdAt: new Date().toISOString()
  };
  state.trips.push(trip); saveState(); return trip;
}

function deleteTrip(id) {
  state.trips = state.trips.filter(t => t.id !== id);
  saveState();
}
function duplicateTrip(id, ev) {
  if (ev) ev.stopPropagation();
  const src = state.trips.find(t => t.id === id);
  if (!src) return;
  const clone = JSON.parse(JSON.stringify(src));
  clone.id = uid();
  clone.title = src.title + " (copy)";
  clone.startDate = "";
  clone.endDate = "";
  clone.expenses = [];
  clone.createdAt = new Date().toISOString();
  // Reset packing items to unpacked
  (clone.packing || []).forEach(cat => cat.items.forEach(item => { item.packed = false; item.id = uid(); }));
  state.trips.push(clone);
  saveState();
  render();
}
function currentTrip() { return state.trips.find(t => t.id === route.tripId); }

// -------- ROUTING --------
function goHome() { route = { view: "home", tripId: null, tab: "overview" }; render(); }
function openTrip(id, tab) { route = { view: "trip", tripId: id, tab: tab || "overview" }; render(); }
function setTab(t) { route.tab = t; render(); }

// -------- RENDER --------
function render() {
  document.documentElement.setAttribute("data-theme", state.settings.theme || "beach");
  applyAuthState();
  stopTzClock();
  const root = document.getElementById("app-root");
  if (route.view === "home") root.innerHTML = renderHome();
  else if (route.view === "trip") root.innerHTML = renderTrip();
  document.querySelectorAll("textarea.autogrow").forEach(autoGrow);
  if (route.view === "trip" && currentTrip()?.timezone) startTzClock();
}

function autoGrow(el) {
  const adjust = () => { el.style.height = "auto"; el.style.height = (el.scrollHeight + 2) + "px"; };
  el.addEventListener("input", adjust); adjust();
}

// -------- HOME / DASHBOARD --------
function renderHome() {
  if (document.documentElement.getAttribute("data-auth") === "locked") {
    return `
      <section class="hero">
        <div class="hero-text">
          <h1>Hey Hoang Le — <span class="accent">where are we going?</span></h1>
          <p>Sign in to view and manage your trips.</p>
        </div>
        <div class="hero-emoji">✈️</div>
      </section>
      <div class="empty-state">
        <div class="e-emoji">🔒</div>
        <h3>Sign in to continue</h3>
        <p>Your trips are private. Enter the master password to view and edit them.</p>
        <button class="btn primary lg" onclick="openPasswordModal()">Sign in</button>
      </div>
    `;
  }

  const trips = state.trips.slice().sort((a, b) => (a.startDate || "z").localeCompare(b.startDate || "z"));
  const upcoming = trips.filter(t => {
    const d = daysUntil(t.endDate); return d === null || d >= 0;
  });
  const past = trips.filter(t => {
    const d = daysUntil(t.endDate); return d !== null && d < 0;
  });

  const nextTrip = upcoming.find(t => daysUntil(t.startDate) !== null);
  const heroSub = nextTrip
    ? `Your next adventure is <strong>${escapeHtml(nextTrip.title)}</strong> — ${daysUntil(nextTrip.startDate) > 0 ? daysUntil(nextTrip.startDate) + " days to go" : daysUntil(nextTrip.startDate) === 0 ? "starts today!" : "in progress"} 🎉`
    : "Let's plan something amazing. Tap <strong>New Trip</strong> to start.";

  return `
    <section class="hero">
      <div class="hero-text">
        <h1>Hey Hoang Le — <span class="accent">where are we going?</span></h1>
        <p>${heroSub}</p>
      </div>
      <div class="hero-emoji">${state.trips.length ? "🌎" : "✈️"}</div>
    </section>

    ${trips.length === 0 ? `
      <div class="empty-state">
        <div class="e-emoji">🧭</div>
        <h3>No trips yet</h3>
        <p>Create your first trip and we'll set up packing lists, an itinerary, and an expense tracker for you.</p>
        <button class="btn primary lg" onclick="openNewTrip()">+ Plan my first trip</button>
      </div>
    ` : `
      <div class="section-head">
        <h2>Upcoming <span class="muted">${upcoming.length} ${upcoming.length === 1 ? "trip" : "trips"}</span></h2>
      </div>
      <div class="trip-grid">
        ${upcoming.map(renderTripCard).join("")}
        <div class="trip-card new" onclick="openNewTrip()">
          <div class="plus">+</div>
          <div>Plan a new trip</div>
        </div>
      </div>
      ${past.length ? `
        <div class="section-head" style="margin-top:32px;">
          <h2>Past <span class="muted">${past.length} ${past.length === 1 ? "trip" : "trips"}</span></h2>
        </div>
        <div class="trip-grid">
          ${past.map(renderTripCard).join("")}
        </div>
      ` : ""}
    `}
  `;
}

// -------- TRIP DETAIL --------
function renderTrip() {
  const t = currentTrip();
  if (!t) { goHome(); return ""; }
  const dU = daysUntil(t.startDate);
  const dEnd = daysUntil(t.endDate);
  let cdLabel = "";
  if (dU === null) cdLabel = "Add dates →";
  else if (dU > 0) cdLabel = `${dU} days until departure`;
  else if (dU === 0) cdLabel = "🎉 Today's the day!";
  else if (dEnd !== null && dEnd >= 0) cdLabel = "✈️ Trip in progress";
  else cdLabel = `${-dU} days ago`;

  const nights = tripDuration(t);
  const totalSpend = (t.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);
  const numPeople = Math.max(1, (t.travelers || []).length);
  const perPerson = totalSpend / numPeople;
  const reservOpen = (t.reservations || []).filter(r => r.status !== "booked").length;
  const packTotal = t.packing.reduce((s, c) => s + c.items.length, 0);
  const packDone = t.packing.reduce((s, c) => s + c.items.filter(i => i.packed).length, 0);

  const tab = route.tab;
  return `
    <div class="trip-header">
      <div class="trip-header-row">
        <div class="trip-emoji" onclick="openEmojiPicker()" title="Change icon">${t.emoji}</div>
        <div class="trip-meta">
          <div class="trip-title">
            <input value="${escapeHtml(t.title)}" oninput="updateTrip('title', this.value)" placeholder="Trip name" ${isEditing() ? '' : 'readonly'} />
          </div>
          <div class="trip-sub">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <input style="background:transparent;border:none;color:inherit;font:inherit;width:200px;"
                     value="${escapeHtml(t.destination)}" oninput="updateTrip('destination', this.value)" placeholder="Destination" ${isEditing() ? '' : 'readonly'} />
            </span>
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <input type="date" style="background:transparent;border:none;color:inherit;font:inherit;"
                     value="${t.startDate}" onchange="updateTripDates('start', this.value)" ${isEditing() ? '' : 'readonly'} />
              →
              <input type="date" style="background:transparent;border:none;color:inherit;font:inherit;"
                     value="${t.endDate}" onchange="updateTripDates('end', this.value)" ${isEditing() ? '' : 'readonly'} />
            </span>
            ${isEditing() ? `
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <select style="background:transparent;border:none;color:inherit;font:inherit;font-size:13px;cursor:pointer;max-width:220px;"
                      onchange="updateTrip('timezone', this.value)" title="Destination time zone">
                <option value="">Time zone (optional)</option>
                ${getTimezoneOptions(t.timezone || "")}
              </select>
            </span>` : (t.timezone ? `
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${t.timezone.replace(/_/g," ")}
            </span>` : "")}
          </div>
        </div>
        <div class="row">
          <button class="btn ghost share-hidden" onclick="goHome()" title="Back to dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            All trips
          </button>
          <button class="btn" onclick="window.print()" title="Print / save as PDF">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print
          </button>
          <button class="btn edit-action share-edit-hidden" onclick="openShareModal('${t.id}')" title="Share this trip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share

          <button class="btn danger edit-action share-edit-hidden" onclick="confirmDeleteTrip()" title="Delete trip">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>

          if (myData) {
            return `<div class="stat"><div class="stat-label">My share</div><div class="stat-value">${fmtCurrency(myData.myOwed)}</div>${t.budget ? `<div style="font-size:11px;color:${myData.myOwed > t.budget ? '#c0392b' : 'var(--ink-soft)'};margin-top:2px;">of ${fmtCurrency(t.budget)} budget</div>` : ""}</div>`;
          }
          return `<div class="stat"><div class="stat-label">Per person</div><div class="stat-value">${(t.travelers||[]).length ? fmtCurrency(perPerson) : "—"}</div>${t.budget && (t.travelers||[]).length ? `<div style="font-size:11px;color:${perPerson > t.budget ? '#c0392b' : 'var(--ink-soft)'};margin-top:2px;">of ${fmtCurrency(t.budget)} budget</div>` : ""}</div>`;
        })()}
        <div class="stat"><div class="stat-label">Packed</div><div class="stat-value">${packDone}/${packTotal}</div></div>
        <div class="stat"><div class="stat-label">To book</div><div class="stat-value">${reservOpen}</div></div>

      </div>
    </div>

    <div class="tabs no-print">
      ${tabBtn("overview", "Overview", svgIcon("home"))}

      ${tabBtn("packing", "Packing", svgIcon("luggage"))}
      ${tabBtn("reservations", "Reservations", svgIcon("bookmark"))}
      ${tabBtn("notes", "Notes", svgIcon("edit"))}

      <h2 style="margin:24px 0 12px;">Expenses</h2>
      ${renderExpenses(t, true)}
      <h2 style="margin:24px 0 12px;">Packing List</h2>
      ${renderPacking(t)}
      <h2 style="margin:24px 0 12px;">Reservations</h2>
      ${renderReservations(t, true)}
      ${t.notes ? `<h2 style="margin:24px 0 12px;">Notes</h2><div class="panel">${escapeHtml(t.notes).replace(/\n/g,"<br>")}</div>` : ""}
    </div>
  `;
}

    <div class="panel">
      <div class="panel-head">
        <h3>At a glance</h3>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;">

        <div class="stat" style="padding:16px;">
          <div class="stat-label">Travelers ${t.myTraveler ? '' : '<span class="muted text-sm" style="text-transform:none;letter-spacing:0;font-weight:500;">· click a name to set as "You"</span>'}</div>
          <div style="margin-top:8px;">
            ${(t.travelers||[]).length ? (t.travelers.map(p => {
              const isMe = t.myTraveler === p;
              return `<span class="tag ${isMe?'is-me':''}" onclick="setMyTraveler('${escapeAttr(p)}')" title="${isMe ? 'This is you! Click to unset.' : 'Click to set as you'}">${escapeHtml(p)}${isMe ? ' <span class="me-badge">(You)</span>' : ''}</span>`;

          <div style="margin-top:10px;">

                   onkeydown="if(event.key==='Enter'){addTraveler(this.value);this.value='';}"/>
          </div>
        </div>

        <div class="stat" style="padding:16px;">
          <div class="stat-label">Budget <span class="muted text-sm" style="text-transform:none;letter-spacing:0;font-weight:500;">(per person)</span></div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px;">
            <input type="number" step="0.01" placeholder="—" value="${t.budget||""}" onchange="updateTrip('budget', this.value ? parseFloat(this.value) : null)"

            `;

          </div>
          <button class="btn sm" style="margin-top:10px;" onclick="setTab('reservations')">View all →</button>
        </div>

          ${myData.iOwe.length ? `
            <div class="my-debts" style="margin-top:${myData.owesMe.length ? '10px' : '0'};">
              <div class="my-debts-title">I owe</div>
              ${myData.iOwe.map(d => `
                <div class="my-debt-row">
                  <span class="name">${escapeHtml(d.name)}</span>

          ` : ''}
