// -------- ITINERARY TAB --------
let itinMobileDay = 0;

function navItinDay(delta) {
  const t = currentTrip(); if (!t) return;
  itinMobileDay = Math.max(0, Math.min(t.itinerary.length - 1, itinMobileDay + delta));
  render();
}

function showDaySummary() {
  const t = currentTrip(); if (!t) return;
  const dIdx = Math.max(0, Math.min(t.itinerary.length - 1, itinMobileDay));
  const day = t.itinerary[dIdx];
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const startDate = parseDate(t.startDate);
  let dayLabel = `Day ${dIdx + 1}`;
  if (startDate) {
    const dd = new Date(startDate); dd.setDate(dd.getDate() + dIdx);
    dayLabel = dd.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
  }
  const activities = [];
  const covered = new Set();
  slots.forEach((time, sIdx) => {
    if (covered.has(sIdx)) return;
    const slot = day.slots[sIdx];
    if (!slot || !slot.activity?.trim()) return;
    const span = Math.min(slot.span || 1, slots.length - sIdx);
    for (let k = 1; k < span; k++) covered.add(sIdx + k);
    const timeLabel = span > 1 ? `${time} – ${slotEndLabel(slots, sIdx + span)}` : time;
    activities.push({ time: timeLabel, activity: slot.activity, address: slot.address });
  });
  const content = activities.length
    ? activities.map(a => `
        <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);">
          <div style="min-width:100px;font-size:11px;color:var(--ink-soft);font-weight:600;font-variant-numeric:tabular-nums;padding-top:2px;">${a.time}</div>
          <div>
            <div style="font-size:14px;font-weight:600;">${escapeHtml(a.activity)}</div>
            ${a.address ? `<div style="font-size:11px;color:var(--ink-soft);margin-top:3px;">📍 ${escapeHtml(a.address)}</div>` : ''}
          </div>
        </div>`).join('')
    : `<p style="color:var(--ink-soft);text-align:center;padding:24px 0;">No activities planned for this day yet.</p>`;
  const theme = day.theme ? ` · ${day.theme}` : '';
  showModal({
    title: `${escapeHtml(dayLabel)}${escapeHtml(theme)}`,
    body: `<div style="max-height:65vh;overflow-y:auto;">${content}</div>`,
    actions: [{ label: 'Close', primary: true, onClick: closeModal }],
  });
}

function renderItinerary(t) {
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const startDate = parseDate(t.startDate);
  const isMobile = window.innerWidth <= 600;

  // Clamp mobile day index
  itinMobileDay = Math.max(0, Math.min(t.itinerary.length - 1, itinMobileDay));

  // On mobile show one day at a time; on desktop show all
  const displayDayIndices = isMobile ? [itinMobileDay] : t.itinerary.map((_, i) => i);
  const displayDayCount = displayDayIndices.length;

  const gridStyle = `grid-template-columns: 80px repeat(${displayDayCount}, minmax(160px, 1fr)); grid-template-rows: auto repeat(${slots.length}, minmax(46px, auto));`;

  let cells = "";

  // Header row (grid row 1)
  cells += `<div class="itin-cell time itin-time-hdr" style="grid-row:1; grid-column:1;">Time</div>`;
  displayDayIndices.forEach((dIdx, colPos) => {
    const d = t.itinerary[dIdx];
    let dayDate = "";
    if (startDate) { const dd = new Date(startDate); dd.setDate(dd.getDate() + dIdx); dayDate = dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }); }
    cells += `
      <div class="itin-cell daycol" style="grid-row:1; grid-column:${colPos+2};">
        <div class="dnum">Day ${dIdx+1}</div>
        ${dayDate ? `<div class="ddate">${dayDate}</div>`:""}
        <input class="theme-in" value="${escapeHtml(d.theme||"")}" placeholder="Day theme..." onchange="updateDayTheme(${dIdx}, this.value)" />
      </div>`;
  });

  // Slot rows: for each displayed day
  displayDayIndices.forEach((dIdx, colPos) => {
    const d = t.itinerary[dIdx];
    const covered = new Set();
    slots.forEach((time, sIdx) => {
      if (covered.has(sIdx)) return;
      if (!d.slots[sIdx]) d.slots[sIdx] = { time, activity: "" };
      const slot = d.slots[sIdx];
      const v = slot.activity || "";
      const isFilled = !!(v || slot.filled);
      const span = Math.min(slot.span || 1, slots.length - sIdx);
      for (let k = 1; k < span; k++) covered.add(sIdx + k);

      const gridRow = span > 1 ? `grid-row: ${sIdx+2} / span ${span}` : `grid-row: ${sIdx+2}`;
      const gridCol = `grid-column: ${colPos+2}`;
      // Exclusive end label — matches what openActivityTimeDialog shows
      const spanLabel = v ? (span > 1 ? `${slots[sIdx]} – ${slotEndLabel(slots, sIdx + span)}` : slots[sIdx]) : '';

      const linkedResId = slot.reservationId || "";
      const linkedRes = linkedResId ? (t.reservations || []).find(r => r.id === linkedResId) : null;
      const resBadge = linkedRes ? `
        <div class="slot-res-badge ${linkedRes.status || 'pending'}">
          ${linkedRes.status === 'booked' ? '✓' : linkedRes.status === 'cancelled' ? '✗' : '⏳'}
          ${escapeHtml(linkedRes.name)}
        </div>` : '';
      const resLinkBtn = v && isEditing() ? `
        <button class="slot-res-link-btn ${linkedRes ? 'linked' : ''}"
                onclick="openResLinkPicker(${dIdx},${sIdx})" title="${linkedRes ? 'Change reservation link' : 'Link reservation'}">
          🔗
        </button>` : '';

      const addr = slot.address || '';
      const mapsUrl = addr ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}` : '';
      const addrInput = v && isEditing() && !addr ? `
        <input class="slot-addr-input" value="" placeholder="📍 Add address..."
               onchange="updateSlotField(${dIdx},${sIdx},'address',this.value)"
               onclick="event.stopPropagation()" />` : '';
      const addrLink = v && addr ? `
        <div class="slot-addr-row">
          <a class="slot-addr-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer"
             onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${escapeHtml(addr)}
          </a>
          ${isEditing() ? `<button class="slot-addr-clear" onclick="event.stopPropagation();updateSlotField(${dIdx},${sIdx},'address','')" title="Remove address">✕</button>` : ''}
        </div>` : '';
      const deleteBtn = isFilled && isEditing() ? `
        <button class="slot-delete-btn" onclick="event.stopPropagation();deleteSlot(${dIdx},${sIdx})" title="Remove activity">✕</button>` : '';

      cells += `<div class="itin-cell slot ${isFilled?"filled":""}" style="${gridRow}; ${gridCol};"
                     data-didx="${dIdx}" data-sidx="${sIdx}" data-span="${span}">
        <div class="slot-content">
          ${spanLabel ? `<div class="slot-time-badge">${spanLabel}</div>` : ''}
          <textarea class="autogrow" onchange="updateSlot(${dIdx}, ${sIdx}, this.value)" placeholder="${isFilled && !v ? 'Enter activity...' : ''}">${escapeHtml(v)}</textarea>
          ${addrInput}
          ${addrLink}
          ${resBadge}
        </div>
        ${v ? `<div class="drag-handle" onmousedown="startSlotDrag(event, ${dIdx}, ${sIdx})"></div>` : ''}
        ${isFilled ? `<div class="slot-btns">${v ? `<button class="mobile-edit-btn" onclick="openActivityTimeDialog(${dIdx}, ${sIdx})" title="Edit time">⏱</button>` : ''}${resLinkBtn}${deleteBtn}</div>` : ''}
      </div>`;
    });
  });

  // Time labels (column 1)
  slots.forEach((time, sIdx) => {
    cells += `<div class="itin-cell time" style="grid-row:${sIdx+2}; grid-column:1;">${time}</div>`;
  });

  // Mobile day navigation bar
  let mobileNavDateLabel = "";
  if (startDate) { const dd = new Date(startDate); dd.setDate(dd.getDate() + itinMobileDay); mobileNavDateLabel = dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }); }
  const mobileNav = `
    <div class="itin-day-nav">
      <button class="itin-day-nav-btn" onclick="navItinDay(-1)" ${itinMobileDay === 0 ? "disabled" : ""}>‹</button>
      <div class="itin-day-nav-center">
        <div class="itin-day-label">Day ${itinMobileDay+1} of ${t.itinerary.length}</div>
        ${mobileNavDateLabel ? `<div class="itin-day-date-label">${mobileNavDateLabel}</div>` : ''}
        <button class="itin-day-summary-btn" onclick="showDaySummary()">📋 Day summary</button>
      </div>
      <button class="itin-day-nav-btn" onclick="navItinDay(1)" ${itinMobileDay === t.itinerary.length - 1 ? "disabled" : ""}>›</button>
    </div>`;

  return `
    <div class="panel">
      <div class="panel-head">
        <h3>Day-by-day itinerary</h3>
        <div class="actions">
          <button class="btn sm" onclick="openTimeSlotsEditor()">⏱ Edit time slots</button>
        </div>
      </div>
      <div class="panel-sub no-print">Tap any cell to add an activity. Drag the bottom edge to span multiple hours. On mobile, tap ⏱ to set duration.</div>
      ${mobileNav}
      <div class="itin-grid-wrap">
        <div class="itin-grid" style="${gridStyle}">
          ${cells}
        </div>
      </div>
    </div>
  `;
}

function openResLinkPicker(dIdx, sIdx) {
  const t = currentTrip();
  const slot = t.itinerary[dIdx]?.slots[sIdx];
  if (!slot) return;
  const reservations = (t.reservations || []).filter(r => r.name?.trim());
  const currentId = slot.reservationId || "";

  const startDate = parseDate(t.startDate);

  if (startDate) { const dd = new Date(startDate); dd.setDate(dd.getDate() + dIdx); dayDateStr = dd.toISOString().slice(0, 10); }

  const STATUS_ICON = { booked: "✓", pending: "⏳", cancelled: "✗" };

  showModal({
    title: "Link reservation",
    size: "sm",
    body: `
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">

      </p>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${reservations.length ? reservations.map(r => {

            <label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;

              <span style="flex:1;font-size:13px;font-weight:600;">${escapeHtml(r.name)}</span>
              <span class="slot-res-badge ${r.status||'pending'}" style="pointer-events:none;">
                ${STATUS_ICON[r.status] || '⏳'} ${r.status || 'pending'}
              </span>
              ${matchesDay && !isLinked ? `<span style="font-size:10px;color:var(--primary);">same day</span>` : ''}
            </label>`;
        }).join("") : `<p class="muted text-sm">No named reservations yet. Add some in the Reservations tab.</p>`}
      </div>
      ${currentId ? `<button class="btn sm ghost" style="margin-top:12px;color:#c0392b;"
                             onclick="linkSlotReservation(${dIdx},${sIdx},'')">✕ Remove link</button>` : ""}
    `,
    actions: [{ label: "Done", primary: true, onClick: () => { closeModal(); render(); } }],
  });
}

function linkSlotReservation(dIdx, sIdx, resId) {
  const t = currentTrip();
  if (!t.itinerary[dIdx]?.slots[sIdx]) return;
  t.itinerary[dIdx].slots[sIdx].reservationId = resId || undefined;
  saveState();
}
function updateSlotField(dIdx, sIdx, field, value) {
  if (!guardEdit()) return;
  const t = currentTrip();
  if (!t.itinerary[dIdx]?.slots[sIdx]) return;
  t.itinerary[dIdx].slots[sIdx][field] = value || undefined;
  saveState();
  // Re-render only to update the address link (no full re-render needed for just saving)
  // But we need the link to appear/disappear, so re-render the itinerary cell
  render();
}

function updateDayTheme(i, v) {
  if (!guardEdit()) return;
  const t = currentTrip(); t.itinerary[i].theme = v; saveState();
}
function updateSlot(dIdx, sIdx, v) {
  if (!guardEdit()) return;
  const t = currentTrip();
  if (!t.itinerary[dIdx].slots[sIdx]) t.itinerary[dIdx].slots[sIdx] = { time: (t.timeSlots||TIME_SLOTS_DEFAULT)[sIdx], activity: "" };
  const slot = t.itinerary[dIdx].slots[sIdx];
  const hasActivity = !!(v && v.trim());
  slot.activity = v;
  slot.filled = hasActivity;
  if (!hasActivity) slot.span = 1;
  saveState();
  render();
}
function deleteSlot(dIdx, sIdx) {
  if (!guardEdit()) return;
  const t = currentTrip();
  const slot = t.itinerary[dIdx]?.slots[sIdx];
  if (!slot) return;
  const label = slot.activity?.trim() ? `"${slot.activity.trim().substring(0, 40)}"` : "this activity";
  showModal({
    title: "Remove activity",
    size: "sm",
    body: `<p style="margin:0;font-size:14px;">Remove ${label} from the itinerary? This cannot be undone.</p>`,
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Remove", danger: true, onClick: () => {
        slot.activity = "";
        slot.filled = false;
        slot.span = 1;
        delete slot.address;
        delete slot.reservationId;
        saveState();
        closeModal();
        render();
      }}
    ]
  });
}

function openTimeSlotsEditor() {
  if (!guardEdit()) return;
  const t = currentTrip();
  const current = t.timeSlots || TIME_SLOTS_DEFAULT;
  const firstSlot = current[0] || "7:00 AM";
  const lastSlot = current[current.length - 1] || "11:00 PM";

  // Detect interval from current slots
  let detectedInterval = 60;
  if (current.length >= 2) {
    const a = parseTime12(current[0]), b = parseTime12(current[1]);
    if (a !== null && b !== null && b > a) detectedInterval = b - a;
  }

  const halfHours = allHalfHourTimes();
  const timeOpts = (sel) => halfHours.map(h => `<option${h===sel?" selected":""}>${h}</option>`).join("");

  function buildPreview() {
    const start = document.getElementById('tse-start')?.value || firstSlot;
    const last = document.getElementById('tse-last')?.value || lastSlot;
    const iv = parseInt(document.getElementById('tse-interval')?.value || 60);
    const gen = generateSlotsFromRange(start, last, iv);
    const el = document.getElementById('tse-preview');
    if (el) el.textContent = gen.length
      ? `${gen.length} slots: ${gen[0]} → ${gen[gen.length-1]}`
      : 'No slots — check start/end times';
  }

  showModal({
    title: "Time slots",
    size: "sm",
    body: `
      <div class="activity-time-form">
        <p style="font-size:13px;color:var(--ink-soft);margin:0 0 4px;">Choose the time range and interval. All days share the same slots.</p>
        <div class="field-row">
          <label>First slot</label>
          <select id="tse-start" oninput="(function(){const a=allHalfHourTimes(),s=document.getElementById('tse-start').value,l=document.getElementById('tse-last').value;if(a.indexOf(l)<=a.indexOf(s)){const ni=Math.min(a.indexOf(s)+2,a.length-1);document.getElementById('tse-last').value=a[ni];}document.getElementById('tse-preview').textContent=''+(function(){const g=generateSlotsFromRange(s,document.getElementById('tse-last').value,parseInt(document.getElementById('tse-interval').value));return g.length?g.length+' slots: '+g[0]+' → '+g[g.length-1]:'No slots';})();})()">
            ${timeOpts(firstSlot)}
          </select>
        </div>
        <div class="field-row">
          <label>Last slot</label>
          <select id="tse-last" oninput="document.getElementById('tse-preview').textContent=(function(){const g=generateSlotsFromRange(document.getElementById('tse-start').value,this.value,parseInt(document.getElementById('tse-interval').value));return g.length?g.length+' slots: '+g[0]+' → '+g[g.length-1]:'No slots';}).call(this)">
            ${timeOpts(lastSlot)}
          </select>
        </div>
        <div class="field-row">
          <label>Interval</label>
          <select id="tse-interval" oninput="document.getElementById('tse-preview').textContent=(function(){const g=generateSlotsFromRange(document.getElementById('tse-start').value,document.getElementById('tse-last').value,parseInt(this.value));return g.length?g.length+' slots: '+g[0]+' → '+g[g.length-1]:'No slots';}).call(this)">
            <option value="30" ${detectedInterval===30?"selected":""}>Every 30 minutes</option>
            <option value="60" ${detectedInterval===60?"selected":""}>Every 1 hour</option>
            <option value="120" ${detectedInterval===120?"selected":""}>Every 2 hours</option>
          </select>
        </div>
        <div id="tse-preview" style="font-size:12px;color:var(--ink-soft);padding:6px 0;"></div>
      </div>
    `,
    onOpen: () => {
      const gen = generateSlotsFromRange(firstSlot, lastSlot, detectedInterval);
      const el = document.getElementById('tse-preview');
      if (el) el.textContent = gen.length ? `${gen.length} slots: ${gen[0]} → ${gen[gen.length-1]}` : 'No slots';
    },
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Save", primary: true, onClick: () => {
        const start = document.getElementById('tse-start').value;
        const last = document.getElementById('tse-last').value;
        const iv = parseInt(document.getElementById('tse-interval').value);
        const slots = generateSlotsFromRange(start, last, iv);
        if (!slots.length) return alert("No slots generated — make sure first slot is before last slot.");
        t.timeSlots = slots;
        t.itinerary.forEach(d => {
          const oldMap = {};
          (d.slots||[]).forEach(s => { oldMap[s.time] = { activity: s.activity, span: s.span, filled: s.filled }; });
          d.slots = slots.map(time => ({ time, activity: (oldMap[time]||{}).activity || "", span: (oldMap[time]||{}).span || 1, ...(oldMap[time]?.filled ? { filled: true } : {}) }));
        });
        saveState(); closeModal(); render();
      }}
    ]
  });
}

// -------- DRAG TO RESIZE ACTIVITY SPAN --------
let dragState = null;

function startSlotDrag(e, dIdx, sIdx) {
  if (!isEditing()) return;
  e.preventDefault();
  const t = currentTrip();
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const cell = e.target.closest('.itin-cell.slot');
  if (!cell) return;

  // Get all slot cells for this day to compute row positions
  const grid = cell.closest('.itin-grid');
  const allTimeCells = grid.querySelectorAll('.itin-cell.time:not(.daycol)');
  // Build row boundaries from the time cells (column 1)
  // Actually use all cells in column 1 that are slot rows
  const timeCellArr = [];
  allTimeCells.forEach(tc => {
    // skip the header "Time" cell
    if (tc.style.gridRow && parseInt(tc.style.gridRow) >= 2) {
      timeCellArr.push(tc);
    }
  });

  const rowBounds = timeCellArr.map(tc => {
    const r = tc.getBoundingClientRect();
    return { top: r.top, bottom: r.bottom, mid: r.top + r.height/2 };
  });

  const startSpan = t.itinerary[dIdx].slots[sIdx].span || 1;

  dragState = { dIdx, sIdx, startSpan, rowBounds, maxSpan: slots.length - sIdx };

  const onMove = (ev) => {
    if (!dragState) return;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    // Find which row the mouse is over
    let newSpan = 1;
    for (let i = sIdx; i < dragState.rowBounds.length; i++) {
      if (clientY >= dragState.rowBounds[i].mid) {
        newSpan = i - sIdx + 1;
      }
    }
    newSpan = Math.max(1, Math.min(newSpan, dragState.maxSpan));

    // Check if any covered slot has content (don't merge over filled slots)
    const day = t.itinerary[dIdx];
    let canSpan = true;
    for (let k = 1; k < newSpan; k++) {
      const coveredSlot = day.slots[sIdx + k];
      if (coveredSlot && (coveredSlot.filled || (coveredSlot.activity && coveredSlot.activity.trim()))) {
        newSpan = k; // stop before the filled slot
        break;
      }
    }

    if (newSpan !== (t.itinerary[dIdx].slots[sIdx].span || 1)) {
      t.itinerary[dIdx].slots[sIdx].span = newSpan;
      // Clear span on covered slots
      for (let k = 1; k < newSpan; k++) {
        if (day.slots[sIdx + k]) day.slots[sIdx + k].span = 1;
      }
      // Update cell visually without full re-render during drag
      cell.style.gridRow = `${sIdx+2} / span ${newSpan}`;
    }
  };

  const onUp = () => {
    dragState = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    saveState(); render(); // full re-render on drag end
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

// -------- MOBILE ACTIVITY TIME DIALOG --------
function openActivityTimeDialog(dIdx, sIdx) {
  const t = currentTrip(); if (!t) return;
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const day = t.itinerary[dIdx];
  const slot = day.slots[sIdx];
  const currentSpan = slot.span || 1;
  const startDate = parseDate(t.startDate);
  let dayLabel = `Day ${dIdx+1}`;
  if (startDate) {
    const dd = new Date(startDate); dd.setDate(dd.getDate() + dIdx);
    dayLabel = dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });
  }

  // Build start time options (current start slot)
  const startOptions = slots.map((s, i) =>
    `<option value="${i}" ${i===sIdx?"selected":""}>${s}</option>`
  ).join("");

  // Build end time options — exclusive end (matches what the calendar displays: "7AM – 11AM")
  // currentEndIdx = sIdx + span (first slot AFTER the event, same as the display)
  const currentEndIdx = sIdx + currentSpan;
  const endOpts = [];
  for (let i = sIdx + 1; i <= slots.length; i++) {
    let blocked = false;
    for (let k = sIdx + 1; k < i; k++) {
      if (day.slots[k] && day.slots[k].activity && day.slots[k].activity.trim()) { blocked = true; break; }
    }
    if (blocked) break;
    const label = slotEndLabel(slots, i);
    endOpts.push(`<option value="${i}" ${i===currentEndIdx?"selected":""}>${label}</option>`);
  }
  const endOptions = endOpts.join("");

  showModal({
    title: `${escapeHtml(slot.activity || "Activity")}`,
    size: "sm",
    body: `
      <div class="activity-time-form">
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:4px;">${dayLabel}</div>
        <div class="field">
          <label>Activity</label>
          <textarea id="atd-activity" rows="2" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:14px;">${escapeHtml(slot.activity||"")}</textarea>
        </div>
        <div class="field-row">
          <label>Start</label>
          <select id="atd-start">${startOptions}</select>
        </div>
        <div class="field-row">
          <label>End</label>
          <select id="atd-end">${endOptions}</select>
        </div>
      </div>
    `,
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Save", primary: true, onClick: () => {
        const newActivity = document.getElementById("atd-activity").value;
        const newStart = parseInt(document.getElementById("atd-start").value);
        const newEnd = parseInt(document.getElementById("atd-end").value);
        // newEnd is exclusive (same as display), so span = newEnd - newStart
        const newSpan = Math.max(1, newEnd - newStart);

        // If start changed, move the activity
        if (newStart !== sIdx) {
          // Clear old slot
          day.slots[sIdx].activity = "";
          day.slots[sIdx].span = 1;
          // Set new slot
          if (!day.slots[newStart]) day.slots[newStart] = { time: slots[newStart], activity: "" };
          day.slots[newStart].activity = newActivity;
          day.slots[newStart].span = newSpan;
        } else {
          day.slots[sIdx].activity = newActivity;
          day.slots[sIdx].span = newSpan;
        }

        saveState(); closeModal(); render();
      }}
    ]
  });
}

// -------- EXPENSE SPLIT LOGIC --------
function expenseParticipants(e, allTravelers) {
  // splitAmong: undefined = all travelers; [] = none; otherwise specific names
  if (!e.splitAmong) return allTravelers.slice();
  return e.splitAmong.filter(p => allTravelers.includes(p));
}

function computeSplit(expense, allTravelers) {
  const cost = parseFloat(expense.cost) || 0;
  const participants = expenseParticipants(expense, allTravelers);
  const result = {};
  if (!participants.length) return result;
  const method = expense.splitMethod || "equal";
  const d = expense.splitDetails || {};

  if (method === "equal") {
    const each = cost / participants.length;
    participants.forEach(p => result[p] = each);
  } else if (method === "exact") {
    participants.forEach(p => result[p] = parseFloat(d[p]) || 0);
  } else if (method === "percent") {
    participants.forEach(p => result[p] = cost * (parseFloat(d[p]) || 0) / 100);
  } else if (method === "shares" || method === "days") {
    let total = 0;
    participants.forEach(p => total += (parseFloat(d[p]) || 0));
    if (total <= 0) {
      const each = cost / participants.length;
      participants.forEach(p => result[p] = each);
    } else {
      participants.forEach(p => result[p] = cost * (parseFloat(d[p]) || 0) / total);
    }
  } else if (method === "adjust") {
    let totalAdj = 0;
    participants.forEach(p => totalAdj += (parseFloat(d[p]) || 0));
    const base = (cost - totalAdj) / participants.length;
    participants.forEach(p => result[p] = base + (parseFloat(d[p]) || 0));
  }
  return result;
}

function splitTotalAllocated(expense, allTravelers) {
  const split = computeSplit(expense, allTravelers);
  return Object.values(split).reduce((s, v) => s + (v || 0), 0);
}

function splitSummaryLabel(expense, allTravelers) {
  const m = SPLIT_METHODS.find(x => x.id === (expense.splitMethod||"equal")) || SPLIT_METHODS[0];
  const ppl = expenseParticipants(expense, allTravelers).length;
  return `${m.icon} ${m.label} · ${ppl} ${ppl===1?"person":"ppl"}`;
}

// -------- EXPENSES TAB --------
function renderExpenses(t, printMode) {
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];
  const me = getMyTraveler(t.id);

  // Filter to expenses involving the selected traveler (keep original index for mutations)
  const visibleWithIdx = expenses.map((e, i) => ({ e, i })).filter(({ e }) => {
    if (!me) return true;
    return (e.paidBy || []).includes(me) || expenseParticipants(e, travelers).includes(me);
  });

  // Apply search filter across name, category, paidBy, note
  const q = expenseSearch.toLowerCase().trim();
  const searchFiltered = q ? visibleWithIdx.filter(({ e }) =>
    (e.name||"").toLowerCase().includes(q)
    || (e.category||"").toLowerCase().includes(q)
    || (e.note||"").toLowerCase().includes(q)
    || (e.paidBy||[]).some(p => p.toLowerCase().includes(q))
  ) : visibleWithIdx;

  // Pagination (skip in print mode)
  const totalPages = (!printMode && expensePageSize > 0) ? Math.max(1, Math.ceil(searchFiltered.length / expensePageSize)) : 1;
  const safePage = Math.min(expensePage, totalPages - 1);
  const pageStart = printMode ? 0 : safePage * expensePageSize;
  const pageEnd = printMode ? searchFiltered.length : pageStart + expensePageSize;
  const pagedItems = searchFiltered.slice(pageStart, pageEnd);

  const total = searchFiltered.reduce((s, { e }) => s + (parseFloat(e.cost) || 0), 0);

  // Aggregate owed/paid/settled using computeSplit logic
  const owedBy = {}; const paidBy = {}; const settledAmt = {}; const unsettledAmt = {}; const unsettledToMe = {};
  travelers.forEach(p => { owedBy[p] = 0; paidBy[p] = 0; settledAmt[p] = 0; unsettledAmt[p] = 0; unsettledToMe[p] = 0; });
  expenses.forEach(e => {
    const cost = parseFloat(e.cost) || 0;
    const split = computeSplit(e, travelers);
    Object.entries(split).forEach(([p, v]) => { if (owedBy[p] !== undefined) owedBy[p] += v; });
    const payer = e.paidBy && e.paidBy.length ? e.paidBy : (travelers[0] ? [travelers[0]] : []);
    if (payer.length) payer.forEach(p => { if (paidBy[p] !== undefined) paidBy[p] += cost / payer.length; });
    // Track settlements — from debtor's perspective
    const settled = e.settledBy || [];
    const participants = expenseParticipants(e, travelers);
    participants.forEach(p => {
      const share = split[p] || 0;
      if (payer.includes(p)) { settledAmt[p] += share; }
      else if (settled.includes(p)) { settledAmt[p] += share; }
      else { unsettledAmt[p] += share; }
    });
    // Track settlements — from creditor's perspective (amount still owed TO each payer)
    participants.forEach(other => {
      if (!payer.includes(other) && !settled.includes(other)) {
        const share = (split[other] || 0) / payer.length;
        payer.forEach(pp => { if (unsettledToMe[pp] !== undefined) unsettledToMe[pp] += share; });
      }
    });
  });

  const rows = pagedItems.map(({ e, i }) => {
    const allocated = splitTotalAllocated(e, travelers);
    const cost = parseFloat(e.cost) || 0;
    const balanced = Math.abs(allocated - cost) < 0.01;
    const participants = travelers.length ? expenseParticipants(e, travelers) : [];
    const perPerson = participants.length > 0 ? cost / participants.length : 0;
    const method = e.splitMethod || "equal";
    const isCustom = method !== "equal" || (e.splitAmong && e.splitAmong.length > 0 && e.splitAmong.length < travelers.length);
    const splitLabel = isCustom
      ? `${fmtCurrency(perPerson)} avg · ${participants.length} ppl`
      : (participants.length > 0 ? fmtCurrency(perPerson) : "$0.00");
    return `
    <tr>
      <td class="col-name"><input value="${escapeHtml(e.name||"")}" onchange="updateExpense(${i},'name',this.value)" placeholder="Expense" /></td>
      <td class="col-cat"><select onchange="updateExpense(${i},'category',this.value)">
        ${EXPENSE_CATEGORIES.map(c => `<option ${e.category===c?"selected":""}>${c}</option>`).join("")}
      </select></td>
      <td class="col-cost num"><input type="number" step="0.01" value="${e.cost||""}" onchange="updateExpense(${i},'cost',parseFloat(this.value)||0)" /></td>
      <td class="col-date"><input type="date" value="${e.date||""}" onchange="updateExpense(${i},'date',this.value)" /></td>
      <td class="col-paid">
        <button class="payer-btn" onclick="openPayerDialog(${i})" title="Select who paid & settle up">
          ${(e.paidBy||[]).length ? (e.paidBy||[]).map(p => `<span class="payer-tag">${escapeHtml(p)}</span>`).join("") : '<span class="payer-placeholder">Select payer</span>'}
          ${(() => {
            const parts = travelers.length ? expenseParticipants(e, travelers) : [];
            const payers = (e.paidBy||[]);
            const settled = (e.settledBy||[]);
            const needSettle = parts.filter(p => !payers.includes(p));
            const doneCount = needSettle.filter(p => settled.includes(p)).length;
            return needSettle.length > 0 && payers.length > 0
              ? '<span style="font-size:10px;color:' + (doneCount === needSettle.length ? '#2e7d32' : 'var(--ink-soft)') + ';margin-left:2px;">' + doneCount + '/' + needSettle.length + '</span>'
              : '';
          })()}
        </button>
      </td>
      <td class="col-note"><input value="${escapeHtml(e.note||"")}" onchange="updateExpense(${i},'note',this.value)" placeholder="" /></td>
      <td class="col-per">
        <button class="split-cell-btn" onclick="openSplitEditor(${i})" title="Customize split">
          ${splitLabel} ${!balanced && cost>0 ? '<span style="color:#c0392b;" title="Allocation doesn\'t match cost">⚠</span>' : ''}
        </button>
      </td>
      <td class="row-actions no-print">
        <button class="icon-btn" onclick="deleteExpense(${i})" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </td>
    </tr>
  `;}).join("");

  return `
    <div class="panel">
      <div class="panel-head">
        <h3>Expenses</h3>
        <div class="actions">
          <button class="btn sm" onclick="openCalc()" title="Calculator">🧮 Calculator</button>
          <button class="btn sm primary" onclick="addExpense()">+ Add expense</button>
        </div>
      </div>

      ${expenses.length > 0 ? `
        <div class="no-print" style="display:flex;align-items:center;margin-bottom:15px;">
          <div style="flex:8;position:relative;">
            <svg style="position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink-soft);pointer-events:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="expense-search" type="text" placeholder="Search by name, category, payer…"
              value="${escapeHtml(expenseSearch)}"
              oninput="setExpenseSearch(this.value)"
              style="width:100%;padding:7px 10px 7px 30px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:13px;background:var(--surface-2);box-sizing:border-box;" />
            ${expenseSearch ? `<button onclick="setExpenseSearch('')" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:16px;line-height:1;padding:0;" title="Clear">×</button>` : ''}
          </div>
          <div style="flex:2;"></div>
          <div style="flex:2;display:flex;align-items:center;justify-content:flex-end;gap:6px;font-size:13px;color:var(--ink-soft);white-space:nowrap;">
            Rows per page:
            <select onchange="setExpensePageSize(this.value)" style="padding:3px 6px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:13px;background:var(--surface-2);">
              ${[5,10,15,20].map(n => `<option value="${n}" ${expensePageSize===n?'selected':''}>${n}</option>`).join('')}
            </select>
          </div>
        </div>
      ` : ''}

      ${expenses.length === 0 ? `
        <div class="empty-mini">
          <h4>No expenses yet 💸</h4>
          <p>Add your flights, lodging, activities — anything you're spending on this trip.</p>
          <button class="btn primary sm" onclick="addExpense()" style="margin-top:8px;">+ Add first expense</button>
        </div>
      ` : `
        <div class="t-wrap">
          <table class="t">
            <thead><tr>
              <th class="col-name">Expense</th><th class="col-cat">Category</th><th class="col-cost" style="text-align:right;">Cost</th>
              <th class="col-date">Date</th><th class="col-paid">Paid by</th><th class="col-note">Note</th><th class="col-per">Per Person</th>
              <th class="no-print"></th>
            </tr></thead>
            <tbody>${rows || `<tr><td colspan="8" style="padding:20px 12px;color:var(--ink-soft);text-align:center;">${q ? `No expenses match "<strong>${escapeHtml(expenseSearch)}</strong>".` : `No expenses involve <strong>${escapeHtml(me)}</strong> yet.`}</td></tr>`}</tbody>
            <tfoot>
              <tr>
                <td colspan="2">Total</td>
                <td class="num">${fmtCurrency(total)}</td>
                <td colspan="4"></td>
                <td class="no-print"></td>
              </tr>
            </tfoot>
          </table>
        </div>

        ${!printMode && searchFiltered.length > 0 ? `
        <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:13px;">
          <div style="color:var(--ink-soft);">
            ${(() => {
              const parts = [];
              if (q) parts.push(`matching "<strong>${escapeHtml(expenseSearch)}</strong>"`);
              if (me) parts.push(`involving <strong>${escapeHtml(me)}</strong>`);
              const count = searchFiltered.length;
              return `Showing ${count} expense${count !== 1 ? 's' : ''}${parts.length ? ' ' + parts.join(' and ') : ''}.`
                + (me ? ` <span style="font-size:11px;">(Tap your name in Overview to clear.)</span>` : '');
            })()}
          </div>
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="color:var(--ink-soft);margin-right:4px;">Page ${safePage+1} of ${totalPages}</span>
            <button class="btn sm" onclick="setExpensePage(${safePage-1})" ${safePage===0?'disabled':''} style="min-width:32px;">‹</button>
            ${Array.from({length:totalPages},(_,k)=>k).filter(k=>Math.abs(k-safePage)<=2||k===0||k===totalPages-1).reduce((acc,k,idx,arr)=>{
              if(idx>0&&k-arr[idx-1]>1) acc.push('<span style="color:var(--ink-soft);padding:0 2px;">…</span>');
              acc.push(`<button class="btn sm ${k===safePage?'primary':''}" onclick="setExpensePage(${k})" style="min-width:32px;">${k+1}</button>`);
              return acc;
            },[]).join('')}
            <button class="btn sm" onclick="setExpensePage(${safePage+1})" ${safePage===totalPages-1?'disabled':''} style="min-width:32px;">›</button>
          </div>
        </div>` : ''}

        ${travelers.length >= 1 ? `
          <h4 style="margin:18px 0 0; margin-bottom: 18px;">Per-person breakdown</h4>
          <div class="panel-sub">Compares each person's share of expenses vs. what they've paid. Click a person to see their expense details.</div>
          <div class="split-summary">
            ${travelers.map(p => {
              const owe = owedBy[p] || 0, paid = paidBy[p] || 0, net = paid - owe;
              const color = net > 0.01 ? "var(--primary)" : net < -0.01 ? "#c0392b" : "var(--ink-soft)";
              const uAmt = unsettledAmt[p] || 0, uToMe = unsettledToMe[p] || 0;
              const hasActivity = owe > 0;
              const isCreditor = net > 0.01, isDebtor = net < -0.01;
              const allSettled = isCreditor ? uToMe < 0.01 : (isDebtor ? uAmt < 0.01 : false);
              const unsettledLabel = isCreditor
                ? (uToMe > 0.01 ? `${fmtCurrency(uToMe)} unsettled` : '')
                : (uAmt > 0.01 ? `${fmtCurrency(uAmt)} unsettled` : '');
              return `
                <div class="split-pill" onclick="openPersonDetail('${escapeAttr(p)}')" title="Click to see ${escapeHtml(p)}'s expenses">
                  <div class="who">${escapeHtml(p)}</div>
                  <div class="amt">${fmtCurrency(owe)}</div>
                  <div class="text-sm" style="color:${color};margin-top:2px;">
                    ${isCreditor ? "Is owed " + fmtCurrency(net) : isDebtor ? "Owes " + fmtCurrency(-net) : "Even"}
                  </div>
                  ${hasActivity && unsettledLabel ? `<div class="text-sm" style="color:#c0392b;margin-top:1px;font-size:10px;">${unsettledLabel}</div>` : ''}
                  ${hasActivity && allSettled ? `<div class="text-sm" style="color:#2e7d32;margin-top:1px;font-size:10px;">✓ All settled</div>` : ''}
                </div>
              `;
            }).join("")}
          </div>
        ` : `<div class="hint" style="margin-top:14px;">Add travelers (in Overview tab) to see per-person breakdowns.</div>`}
      `}
    </div>
  `;
}

// -------- SPLIT EDITOR --------
function openSplitEditor(i) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  const travelers = t.travelers || [];
  if (!travelers.length) {
    alert("Add travelers first (in the Overview tab) so you can split this expense.");
    return;
  }
  const e = t.expenses[i];
  // Ensure splitAmong defaults to all travelers if undefined
  if (!e.splitAmong) e.splitAmong = travelers.slice();
  e.splitMethod = e.splitMethod || "equal";
  e.splitDetails = e.splitDetails || {};

  showModal({
    title: `Split: ${e.name || "Expense"} (${fmtCurrency(parseFloat(e.cost)||0)})`,
    size: "lg",
    body: `<div id="split-editor-body"></div>`,
    actions: [
      { label: "Done", primary: true, onClick: () => { saveState(); closeModal(); render(); } }
    ]
  });
  renderSplitEditor(i);
}

function renderSplitEditor(i) {
  const t = currentTrip();
  const e = t.expenses[i];
  const allTravelers = t.travelers || [];
  const participants = expenseParticipants(e, allTravelers);
  const cost = parseFloat(e.cost) || 0;
  const method = e.splitMethod || "equal";
  const methodObj = SPLIT_METHODS.find(m => m.id === method) || SPLIT_METHODS[0];
  const split = computeSplit(e, allTravelers);
  const allocated = Object.values(split).reduce((s,v)=>s+(v||0), 0);
  const balanced = Math.abs(allocated - cost) < 0.01;

  // Method-specific rows
  let rowsHtml = "";
  let headHtml = "";
  if (!participants.length) {
    rowsHtml = `<div style="padding:24px;text-align:center;color:var(--ink-soft);">Select at least one traveler above.</div>`;
  } else if (method === "equal") {
    headHtml = `<div class="split-row-head cols-2"><div>Traveler</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => `
      <div class="split-row cols-2">
        <div class="who">${escapeHtml(p)}</div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `).join("");
  } else if (method === "exact") {
    headHtml = `<div class="split-row-head cols-2"><div>Traveler</div><div style="text-align:right;">Amount (${state.settings.currency})</div></div>`;
    rowsHtml = participants.map(p => `
      <div class="split-row cols-2">
        <div class="who">${escapeHtml(p)}</div>
        <input class="split-in" type="number" step="0.01" value="${(e.splitDetails[p]!==undefined?e.splitDetails[p]:(split[p]||0).toFixed(2))}"
               onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="max-width:140px;margin-left:auto;display:block;text-align:right;"/>
      </div>
    `).join("");
  } else if (method === "percent") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Percent</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => {
      const pct = e.splitDetails[p]!==undefined ? e.splitDetails[p] : (100/participants.length).toFixed(2);
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="0.01" value="${pct}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "shares") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Shares</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => {
      const sh = e.splitDetails[p]!==undefined ? e.splitDetails[p] : 1;
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="1" min="0" value="${sh}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "days") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Days</div><div style="text-align:right;">Amount</div></div>`;
    const tripDays = tripDuration(t) || 1;
    rowsHtml = participants.map(p => {
      const dv = e.splitDetails[p]!==undefined ? e.splitDetails[p] : tripDays;
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="1" min="0" value="${dv}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "adjust") {
    headHtml = `<div class="split-row-head cols-4"><div>Traveler</div><div style="text-align:right;">Equal share</div><div style="text-align:right;">Adjustment</div><div style="text-align:right;">Final</div></div>`;
    const totalAdj = participants.reduce((s,p)=>s+(parseFloat(e.splitDetails[p])||0), 0);
    const baseShare = (cost - totalAdj) / participants.length;
    rowsHtml = participants.map(p => {
      const adj = e.splitDetails[p]!==undefined ? e.splitDetails[p] : 0;
      return `
      <div class="split-row cols-4">
        <div class="who">${escapeHtml(p)}</div>
        <div class="amt-out muted-out" style="text-align:right;">${fmtCurrency(baseShare)}</div>
        <div class="adj-wrap"><input class="split-in adj" type="number" step="0.01" value="${adj}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  }

  // Method-specific footer
  let footerHtml = "";
  if (method === "percent") {
    const totalPct = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    const pctOk = Math.abs(totalPct - 100) < 0.01;
    footerHtml = `<div class="split-summary-line">
      <div>Total: <span class="${pctOk?'ok':'bad'}">${totalPct.toFixed(2)}%</span></div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else if (method === "shares") {
    const totalShares = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    footerHtml = `<div class="split-summary-line">
      <div>Total shares: ${totalShares}</div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else if (method === "days") {
    const totalDays = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    footerHtml = `<div class="split-summary-line">
      <div>Total person-days: ${totalDays}</div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else {
    footerHtml = `<div class="split-summary-line">
      <div>Total: <strong>${fmtCurrency(allocated)}</strong></div>
      <div>${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">${fmtCurrency(allocated-cost>0?allocated-cost:cost-allocated)} ${allocated>cost?"over":"short"}</span>`}</div>
    </div>`;
  }

  const html = `
    <div class="field">
      <label>Split method</label>
      <div class="split-methods">
        ${SPLIT_METHODS.map(m => `
          <button class="split-method ${method===m.id?'sel':''}" onclick="changeSplitMethod(${i}, '${m.id}')">
            <div class="sm-icon">${m.icon}</div>
            <div class="sm-label">${m.label}</div>
          </button>
        `).join("")}
      </div>
      <div class="split-desc">${methodObj.desc}</div>
    </div>

    <div class="field">
      <label>Who's involved? (${participants.length} of ${allTravelers.length})</label>
      ${(() => {
        const groups = (t.groups || []).filter(g => g.members.filter(p => allTravelers.includes(p)).length > 0);
        if (!groups.length) return "";
        return `<div class="split-group-row">
          ${groups.map(g => {
            const members = g.members.filter(p => allTravelers.includes(p));
            const allOn = members.every(p => (e.splitAmong || allTravelers).includes(p));
            const groupIdx = (t.groups || []).indexOf(g);
            return `<button class="group-chip-btn ${allOn?'selected':''}"
              onclick="toggleGroupParticipants(${i}, ${groupIdx})">
              ${escapeHtml(g.name)} <span style="opacity:0.7;font-weight:400;">${members.length}</span>
            </button>`;
          }).join("")}
        </div>`;
      })()}
      <div class="split-participants">
        ${allTravelers.map(p => {
          const on = (e.splitAmong || allTravelers).includes(p);
          return `
            <label class="split-chip ${on?'on':''}" onclick="toggleSplitParticipant(${i}, '${escapeAttr(p)}')">
              <div class="dot"></div> ${escapeHtml(p)}
            </label>
          `;
        }).join("")}
        <button class="split-chip" style="background:transparent;font-weight:600;color:var(--primary);"
                onclick="setAllSplitParticipants(${i}, ${participants.length === allTravelers.length})">
          ${participants.length === allTravelers.length ? "Clear all" : "Select all"}
        </button>
      </div>
    </div>

    <div class="field">
      <label>Allocation</label>
      <div class="split-rows">
        ${headHtml}
        ${rowsHtml}
      </div>
      ${footerHtml}
      ${method !== "equal" && participants.length ? `
        <div style="margin-top:8px;display:flex;justify-content:flex-end;">
          <button class="btn sm" onclick="splitAutoBalance(${i})">⚖ Auto-balance</button>
        </div>
      ` : ""}
    </div>
  `;
  document.getElementById("split-editor-body").innerHTML = html;
}

function escapeAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function changeSplitMethod(i, method) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitMethod = method;
  // Reset details to sensible defaults
  const participants = expenseParticipants(e, t.travelers || []);
  e.splitDetails = {};
  if (method === "percent") {
    const each = participants.length ? 100/participants.length : 0;
    participants.forEach(p => e.splitDetails[p] = parseFloat(each.toFixed(2)));
  } else if (method === "shares") {
    participants.forEach(p => e.splitDetails[p] = 1);
  } else if (method === "days") {
    const td = tripDuration(t) || 1;
    participants.forEach(p => e.splitDetails[p] = td);
  } else if (method === "adjust") {
    participants.forEach(p => e.splitDetails[p] = 0);
  } else if (method === "exact") {
    const cost = parseFloat(e.cost) || 0;
    const each = participants.length ? cost/participants.length : 0;
    participants.forEach(p => e.splitDetails[p] = parseFloat(each.toFixed(2)));
  }
  saveState();
  renderSplitEditor(i);
}

function updateSplitDetail(i, name, value) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitDetails = e.splitDetails || {};
  e.splitDetails[name] = parseFloat(value) || 0;
  saveState();
  renderSplitEditor(i);
}

function toggleSplitParticipant(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitAmong = e.splitAmong || (t.travelers || []).slice();
  const idx = e.splitAmong.indexOf(name);
  if (idx >= 0) e.splitAmong.splice(idx, 1); else e.splitAmong.push(name);
  // Clean up details for removed participants
  if (e.splitDetails) { Object.keys(e.splitDetails).forEach(k => { if (!e.splitAmong.includes(k)) delete e.splitDetails[k]; }); }
  saveState();
  renderSplitEditor(i);
}

function setAllSplitParticipants(i, clear) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitAmong = clear ? [] : (t.travelers || []).slice();
  saveState();
  renderSplitEditor(i);
}

function toggleGroupParticipants(i, groupIdx) {
  const t = currentTrip();
  const e = t.expenses[i];
  const travelers = t.travelers || [];
  const group = (t.groups || [])[groupIdx];
  if (!group) return;
  const members = group.members.filter(p => travelers.includes(p));
  e.splitAmong = e.splitAmong || travelers.slice();
  const allOn = members.every(p => e.splitAmong.includes(p));
  if (allOn) {
    e.splitAmong = e.splitAmong.filter(p => !members.includes(p));
  } else {
    members.forEach(p => { if (!e.splitAmong.includes(p)) e.splitAmong.push(p); });
  }
  if (e.splitDetails) { Object.keys(e.splitDetails).forEach(k => { if (!e.splitAmong.includes(k)) delete e.splitDetails[k]; }); }
  saveState();
  renderSplitEditor(i);
}

function splitAutoBalance(i) {
  // Adjust last participant's value so total matches cost
  const t = currentTrip();
  const e = t.expenses[i];
  const cost = parseFloat(e.cost) || 0;
  const participants = expenseParticipants(e, t.travelers || []);
  if (!participants.length) return;
  const method = e.splitMethod;

  if (method === "percent") {
    const last = participants[participants.length - 1];
    let used = 0;
    for (let j = 0; j < participants.length - 1; j++) {
      used += parseFloat(e.splitDetails[participants[j]]) || 0;
    }
    e.splitDetails[last] = parseFloat((100 - used).toFixed(2));
  } else if (method === "exact") {
    const last = participants[participants.length - 1];
    let used = 0;
    for (let j = 0; j < participants.length - 1; j++) {
      used += parseFloat(e.splitDetails[participants[j]]) || 0;
    }
    e.splitDetails[last] = parseFloat((cost - used).toFixed(2));
  } else if (method === "adjust") {
    // zero out adjustments
    participants.forEach(p => e.splitDetails[p] = 0);
  } else if (method === "shares" || method === "days") {
    // Already auto-balances proportionally
  }
  saveState();
  renderSplitEditor(i);
}

function openPayerDialog(i) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  const travelers = t.travelers || [];
  if (!travelers.length) {
    alert("Add travelers first (in the Overview tab).");
    return;
  }
  const e = t.expenses[i];
  e.paidBy = e.paidBy || [];
  e.settledBy = e.settledBy || [];

  showModal({
    title: `Payment: ${e.name || "Expense"} (${fmtCurrency(parseFloat(e.cost)||0)})`,
    size: "lg",
    body: `<div id="payer-dialog-body"></div>`,
    actions: [
      { label: "Done", primary: true, onClick: () => { saveState(); closeModal(); render(); } }
    ]
  });
  renderPayerDialog(i);
}

function renderPayerDialog(i) {
  const t = currentTrip();
  const e = t.expenses[i];
  const travelers = t.travelers || [];
  const participants = expenseParticipants(e, travelers);
  const cost = parseFloat(e.cost) || 0;
  const split = computeSplit(e, travelers);
  const payers = e.paidBy || [];
  const settled = e.settledBy || [];

  // Payer selection
  const payerChips = travelers.map(p => {
    const on = payers.includes(p);
    return `<div class="settle-payer-chip ${on?'on':''}" onclick="dialogTogglePayer(${i}, '${escapeAttr(p)}')">
      <div class="chip-dot"></div> ${escapeHtml(p)}
    </div>`;
  }).join("");

  // Settle-up rows: participants who didn't pay need to settle
  let settleHtml = "";
  if (payers.length > 0 && participants.length > 0) {
    const settleRows = participants.map(p => {
      const share = split[p] || 0;
      const isPayer = payers.includes(p);
      const isSettled = settled.includes(p);

      let toggleHtml;
      if (isPayer) {
        toggleHtml = `<div class="settle-toggle is-payer">Payer</div>`;
      } else {
        toggleHtml = `<div class="settle-toggle ${isSettled?'settled':''}" onclick="dialogToggleSettle(${i}, '${escapeAttr(p)}')">
          ${isSettled ? '✓ Settled' : 'Unsettled'}
        </div>`;
      }
      return `<div class="settle-row">
        <div class="settle-name">${escapeHtml(p)}</div>
        <div class="settle-amt">${fmtCurrency(share)}</div>
        ${toggleHtml}
      </div>`;
    }).join("");

    const needSettle = participants.filter(p => !payers.includes(p));
    const doneCount = needSettle.filter(p => settled.includes(p)).length;
    const totalUnsettled = needSettle.filter(p => !settled.includes(p)).reduce((s, p) => s + (split[p]||0), 0);

    settleHtml = `
      <div class="settle-section">
        <div class="settle-section-label">Settle up</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">
          Mark participants as settled once they've paid back the payer${payers.length > 1 ? 's' : ''}.
        </div>
        <div class="settle-rows">${settleRows}</div>
        <div class="settle-summary">
          <span>${doneCount}/${needSettle.length} settled</span>
          <span style="color:${totalUnsettled > 0.01 ? '#c0392b' : '#2e7d32'}">
            ${totalUnsettled > 0.01 ? fmtCurrency(totalUnsettled) + ' unsettled' : '✓ All settled'}
          </span>
        </div>
      </div>
    `;
  } else if (payers.length === 0) {
    settleHtml = `<div style="padding:16px;text-align:center;color:var(--ink-soft);font-size:13px;">Select who paid above to track settlements.</div>`;
  }

  document.getElementById("payer-dialog-body").innerHTML = `
    <div class="settle-section">
      <div class="settle-section-label">Who paid?</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">Select the person(s) who paid for this expense upfront.</div>
      <div class="settle-payer-chips">${payerChips}</div>
    </div>
    ${settleHtml}
  `;
}

function dialogTogglePayer(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.paidBy = e.paidBy || [];
  const idx = e.paidBy.indexOf(name);
  if (idx >= 0) e.paidBy.splice(idx, 1); else e.paidBy.push(name);
  // If removed as payer, also remove from settled
  if (idx >= 0 && e.settledBy) {
    const si = e.settledBy.indexOf(name);
    if (si >= 0) e.settledBy.splice(si, 1);
  }
  saveState();
  renderPayerDialog(i);
}

function dialogToggleSettle(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.settledBy = e.settledBy || [];
  const idx = e.settledBy.indexOf(name);
  if (idx >= 0) e.settledBy.splice(idx, 1); else e.settledBy.push(name);
  saveState();
  renderPayerDialog(i);
}

// -------- PERSON EXPENSE DETAIL --------
function openPersonDetail(name) {
  const t = currentTrip(); if (!t) return;
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];

  // Find all expenses this person is involved in
  const personExpenses = [];
  let totalOwed = 0, totalPaid = 0, totalSettled = 0, totalUnsettled = 0;
  let outstandingFromOthers = 0;

  expenses.forEach((e, i) => {
    const cost = parseFloat(e.cost) || 0;
    const participants = expenseParticipants(e, travelers);
    const payers = e.paidBy && e.paidBy.length ? e.paidBy : (travelers[0] ? [travelers[0]] : []);
    const isPayer = payers.includes(name);
    if (!participants.includes(name) && !isPayer) return;

    const split = computeSplit(e, travelers);
    const share = participants.includes(name) ? (split[name] || 0) : 0;
    totalOwed += share;

    let paidAmount = 0;
    if (isPayer) {
      paidAmount = cost / payers.length;
    }
    totalPaid += paidAmount;

    // Settlement status
    const isSettled = (e.settledBy || []).includes(name);
    let status, settledCount = 0, debtorCount = 0;
    if (isPayer) {
      const debtors = participants.filter(p => !payers.includes(p));
      debtorCount = debtors.length;
      settledCount = debtors.filter(p => (e.settledBy || []).includes(p)).length;
      status = debtorCount === 0 ? "payer-solo"
             : settledCount === debtorCount ? "payer-full"
             : settledCount === 0 ? "payer-none"
             : "payer-partial";
      totalSettled += share;
      // Track what debtors still haven't paid back
      const unsettledDebtors = debtors.filter(p => !(e.settledBy || []).includes(p));
      unsettledDebtors.forEach(p => { outstandingFromOthers += split[p] || 0; });
    } else if (isSettled) { status = "settled"; totalSettled += share; }
    else { status = "unsettled"; totalUnsettled += share; }

    personExpenses.push({
      name: e.name || "Untitled",
      category: e.category || "Misc",
      date: e.date || "",
      totalCost: cost,
      share: share,
      paidAmount: paidAmount,
      status: status,
      settledCount,
      debtorCount,
      index: i
    });
  });

  const netOutstanding = outstandingFromOthers - totalUnsettled;
  const netClass = netOutstanding > 0.01 ? "positive" : netOutstanding < -0.01 ? "negative" : "even";
  const netLabel = netOutstanding > 0.01 ? "Is owed " + fmtCurrency(netOutstanding) : netOutstanding < -0.01 ? "Owes " + fmtCurrency(-netOutstanding) : "Even";

  const statusBadge = (pe) => {
    const s = pe.status;
    if (s === "payer-full" || s === "payer-solo")
      return '<span style="display:inline-block;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Fully recovered</span>';
    if (s === "payer-partial")
      return `<span style="display:inline-block;background:#fff8e1;color:#f57f17;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">${pe.settledCount}/${pe.debtorCount} settled</span>`;
    if (s === "payer-none")
      return '<span style="display:inline-block;background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Awaiting payment</span>';
    if (s === "settled")
      return '<span style="display:inline-block;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Settled</span>';
    return '<span style="display:inline-block;background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Unsettled</span>';
  };

  const tableRows = personExpenses.length ? personExpenses.map(pe => `
    <tr>
      <td><strong>${escapeHtml(pe.name)}</strong></td>
      <td class="cat-badge"><span>${escapeHtml(pe.category)}</span></td>
      <td class="num">${fmtCurrency(pe.totalCost)}</td>
      <td>${pe.date || "—"}</td>
      <td class="num">${fmtCurrency(pe.share)}</td>
      <td class="num">${pe.status.startsWith("payer") ? fmtCurrency(pe.paidAmount) : pe.status === "settled" ? fmtCurrency(pe.share) : fmtCurrency(0)}</td>
      <td style="text-align:center;">${statusBadge(pe)}</td>
    </tr>
  `).join("") : `<tr><td colspan="7" style="text-align:center;color:var(--ink-soft);padding:24px;">No expenses yet</td></tr>`;

  showModal({
    title: `${escapeHtml(name)}'s Expenses`,
    size: "lg",
    body: `
      <div class="person-detail-summary" style="grid-template-columns:repeat(4,1fr);">
        <div class="person-detail-stat">
          <div class="label">Total Owed</div>
          <div class="value">${fmtCurrency(totalOwed)}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Total Paid</div>
          <div class="value">${fmtCurrency(totalPaid)}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Balance</div>
          <div class="value ${netClass}">${netLabel}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Settled</div>
          <div class="value ${totalUnsettled < 0.01 && totalOwed > 0 ? 'positive' : totalUnsettled > 0.01 ? 'negative' : 'even'}">
            ${totalOwed > 0 ? (totalUnsettled < 0.01 ? '✓ All' : fmtCurrency(totalUnsettled) + ' left') : '—'}
          </div>
        </div>
      </div>
      <div class="person-detail-expenses">
        <table>
          <thead>
            <tr>
              <th>Expense</th>
              <th>Category</th>
              <th class="num">Total Cost</th>
              <th>Date</th>
              <th class="num">Their Share</th>
              <th class="num">Paid</th>
              <th style="text-align:center;">Status</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          ${personExpenses.length ? `
          <tfoot>
            <tr>
              <td colspan="4">Total</td>
              <td class="num">${fmtCurrency(totalOwed)}</td>
              <td class="num">${fmtCurrency(totalPaid)}</td>
              <td></td>
            </tr>
          </tfoot>` : ""}
        </table>
      </div>
    `,
    actions: [
      { label: "Close", primary: true, onClick: () => closeModal() }
    ]
  });
}

// -------- DESTINATION AUTOCOMPLETE --------
function onDestInput(val) {
  clearTimeout(destAcTimer);
  if (!val.trim() || val.length < 2) { closeDestDropdown(); return; }
  destAcTimer = setTimeout(() => fetchDestSuggestions(val), 300);
}

async function fetchDestSuggestions(query) {
  try {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=en&format=json`);
    const data = await res.json();
    destAcResults = data.results || [];
    renderDestDropdown();
  } catch { closeDestDropdown(); }
}

function renderDestDropdown() {
  const dd = document.getElementById("dest-dropdown");
  if (!dd) return;
  if (!destAcResults.length) { dd.style.display = "none"; return; }
  destAcIdx = -1;
  dd.innerHTML = destAcResults.map((r, i) => {
    const sub = [r.admin1, r.country].filter(Boolean).join(", ");
    return `<div class="dest-option" onmousedown="selectDestination(${i})">
      <div class="dest-option-name">${escapeHtml(r.name)}</div>
      ${sub ? `<div class="dest-option-sub">${escapeHtml(sub)}</div>` : ""}
    </div>`;
  }).join("");
  dd.style.display = "block";
}

function selectDestination(idx) {
  const r = destAcResults[idx];
  if (!r) return;
  const name = [r.name, r.admin1, r.country].filter(Boolean).join(", ");
  const coords = { lat: r.latitude, lng: r.longitude };
  const t = currentTrip(); if (!t) return;
  weatherCache.delete(t.destination);
  t.destination = name;
  t.destinationCoords = coords;
  saveState();
  render();
}

function onDestKeydown(e) {
  const dd = document.getElementById("dest-dropdown");
  if (!dd || dd.style.display === "none") return;
  if (e.key === "ArrowDown") { e.preventDefault(); destAcIdx = Math.min(destAcIdx + 1, destAcResults.length - 1); highlightDestOption(); }
  else if (e.key === "ArrowUp") { e.preventDefault(); destAcIdx = Math.max(destAcIdx - 1, 0); highlightDestOption(); }
  else if (e.key === "Enter" && destAcIdx >= 0) { e.preventDefault(); selectDestination(destAcIdx); }
  else if (e.key === "Escape") { closeDestDropdown(); }
}

function highlightDestOption() {
  const dd = document.getElementById("dest-dropdown");
  if (!dd) return;
  [...dd.querySelectorAll(".dest-option")].forEach((el, i) => el.classList.toggle("ac-sel", i === destAcIdx));
}

function closeDestDropdown() {
  const dd = document.getElementById("dest-dropdown");
  if (dd) dd.style.display = "none";
  destAcResults = [];
  destAcIdx = -1;
}

  85:"🌨️", 86:"🌨️",
  95:"⛈️", 96:"⛈️", 99:"⛈️",
};
function wmoIcon(code) { return WMO_ICON[code] || "🌡️"; }

function renderWeatherWidget(t) {
  if (!t.destination || !t.startDate) return "";
  const start = parseDate(t.startDate);
  const end = t.endDate ? parseDate(t.endDate) : start;
  if (!start) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const diffStart = Math.round((start - today) / 86400000);
  const diffEnd = Math.round((end - today) / 86400000);
  if (diffEnd < 0) return "";
  if (diffStart > 7) {
    const daysUntilForecast = diffStart - 7;
    const unlockDate = new Date(today.getTime() + daysUntilForecast * 86400000);
    const unlockLabel = daysUntilForecast === 1 ? 'tomorrow' : unlockDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return `<div class="stat overview-weather" style="padding:16px;">
      <div class="stat-label" style="margin-bottom:4px;">Weather forecast</div>
      <div style="font-size:12px;color:var(--ink-soft);line-height:1.6;">
        🗓️ Available in <strong>${daysUntilForecast}</strong> day${daysUntilForecast !== 1 ? 's' : ''}<br>
        <span style="font-size:11px;">7-day forecast unlocks ${unlockLabel}.</span>
      </div>
    </div>`;
  }

  const cached = weatherCache.get(t.destination);
  const isStale = !cached || (Date.now() - cached.fetchedAt > WEATHER_CACHE_TTL);
  if (isStale && !cached?.loading) fetchWeather(t.destination, t.destinationCoords);
  if (!cached || cached.loading) return `<div class="stat overview-weather" style="padding:16px;"><div class="stat-label">Weather forecast</div><div style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Loading…</div></div>`;
  if (cached.error || !cached.data) return "";

  const { daily } = cached.data;
  if (!daily) return "";
  const todayStr = new Date().toISOString().slice(0, 10);
  const days = daily.time.slice(0, 7).map((date, i) => {
    const d = new Date(date + "T00:00:00");
    const label = d.toLocaleDateString(undefined, { weekday: "short" });
    const icon = wmoIcon(daily.weathercode[i]);
    const hi = Math.round(daily.temperature_2m_max[i]);
    const lo = Math.round(daily.temperature_2m_min[i]);
    const isToday = date === todayStr;
    return `<div class="weather-day${isToday ? " today" : ""}">
      <div class="weather-day-label">${isToday ? "Today" : label}</div>
      <div class="weather-icon">${icon}</div>
      <div class="weather-hi">${hi}°</div>
      <div class="weather-lo">${lo}°</div>
    </div>`;
  }).join("");

  return `<div class="stat overview-weather" style="padding:16px;">
    <div class="stat-label" style="margin-bottom:0;">Weather forecast</div>
    <div style="font-size:11px;color:var(--ink-soft);margin-bottom:2px;">${escapeHtml(t.destination)}</div>
    <div class="weather-strip">${days}</div>
  </div>`;
}

async function fetchWeather(destination, coords = null) {
  if (!destination) return;
  weatherCache.set(destination, { data: null, fetchedAt: Date.now(), loading: true });
  try {
    let loc = coords ? { latitude: coords.lat, longitude: coords.lng } : null;
    if (!loc) {
      const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(destination)}&count=1&language=en&format=json`);
      const geoData = await geoRes.json();
      loc = geoData.results?.[0];
      if (!loc) { weatherCache.set(destination, { data: null, fetchedAt: Date.now(), error: "Location not found" }); return; }
    }

    const fxRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`);
    const fxData = await fxRes.json();
    weatherCache.set(destination, { data: fxData, fetchedAt: Date.now() });
  } catch {
    weatherCache.set(destination, { data: null, fetchedAt: Date.now(), error: "Failed" });
  }
  if (route.view === "trip" && route.tab === "overview") render();
}

async function fetchDrivePhotos(folderId, forceRefresh = false) {
  if (!folderId) return;
  const cached = driveCache.get(folderId);
  if (cached?.loading) return; // already in flight
  if (!forceRefresh && cached && Date.now() - cached.fetchedAt < DRIVE_CACHE_TTL) return;
  // Set loading flag synchronously before any await to prevent duplicate calls
  driveCache.set(folderId, { files: cached?.files || [], fetchedAt: cached?.fetchedAt || 0, loading: true });
  if (route.view === "trip" && route.tab === "photos") render();
  try {
    const res = await fetch(`/api/drive/folder?folderId=${encodeURIComponent(folderId)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed to load photos");
    driveCache.set(folderId, { files: data.files || [], fetchedAt: Date.now() });
    lightboxFiles = data.files || [];
  } catch (e) {
    driveCache.set(folderId, { files: [], fetchedAt: Date.now(), error: e.message });
  }
  if (route.view === "trip" && route.tab === "photos") render();
}

function setupPhotoLazyLoad() {
  const imgs = document.querySelectorAll('.photo-thumb img[data-src]');
  if (!imgs.length) return;
  if (!('IntersectionObserver' in window)) {
    imgs.forEach(img => { img.src = img.dataset.src; });
    return;
  }
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.src = e.target.dataset.src; obs.unobserve(e.target); }
    });
  }, { rootMargin: '400px' });
  imgs.forEach(img => obs.observe(img));
}

function refreshDrivePhotos(folderId) {

function openLightbox(idx) {
  const t = currentTrip();
  const cached = t?.driveFolder?.folderId ? driveCache.get(t.driveFolder.folderId) : null;
  lightboxFiles = cached?.files || [];
  if (!lightboxFiles.length) return;
  lightboxIdx = idx;
  renderLightbox();
}

function renderLightbox() {
  if (!lightboxFiles.length) return;
  const f = lightboxFiles[lightboxIdx];
  const total = lightboxFiles.length;
  const t = currentTrip();
  const isThumb = t?.driveFolder?.thumbnailId === f.id;
  const shareReadOnly = document.documentElement.getAttribute("data-share") === "read";
  // Use thumbnailLink directly when available (Google CDN, no proxy hop); fall back to proxy
  const thumbSrc = getFileThumbUrl(f, 400);
  const fullSrc  = getFileThumbUrl(f, 1200);
  const root = document.getElementById("modal-root");
  root.innerHTML = `<div class="lightbox-bg" onclick="if(event.target===this)closeLightbox()" id="lightbox-bg">
    <div class="lightbox-img-wrap">
      <img id="lightbox-img" src="${escapeAttr(thumbSrc)}" alt="${escapeHtml(f.name)}" />
    </div>
    <button class="lightbox-close" onclick="closeLightbox()" title="Close (Esc)">✕</button>
    ${total > 1 ? `<button class="lightbox-nav prev" onclick="moveLightbox(-1)">&#8249;</button>
    <button class="lightbox-nav next" onclick="moveLightbox(1)">&#8250;</button>` : ""}
    <div class="lightbox-counter">${lightboxIdx + 1} / ${total}</div>
    ${!shareReadOnly ? `<button class="lightbox-cover-btn${isThumb ? " is-thumb" : ""}" onclick="setTripThumbnail(event,'${escapeAttr(f.id)}')">${isThumb ? "★ Trip Cover" : "☆ Set as Cover"}</button>` : ""}
  </div>`;
  // If full-res already loaded this session, swap src immediately (browser HTTP cache = no network)
  if (lightboxFullResReady.has(f.id)) {
    const el = document.getElementById("lightbox-img");
    if (el) el.src = fullSrc;
  } else {
    const hi = new Image();
    hi.onload = () => {
      lightboxFullResReady.add(f.id);
      const el = document.getElementById("lightbox-img");
      if (el) el.src = fullSrc;
    };
    hi.src = fullSrc;
  }
  // Preload adjacent images so navigation is instant
  if (lightboxFiles.length > 1) {
    [-1, 1, 2].forEach(offset => {
      const nf = lightboxFiles[(lightboxIdx + offset + lightboxFiles.length) % lightboxFiles.length];
      if (nf && nf !== f && !lightboxFullResReady.has(nf.id)) {
        const pre = new Image();
        pre.onload = () => lightboxFullResReady.add(nf.id);
        pre.src = getFileThumbUrl(nf, 1200);
      }
    });
  }
}

function moveLightbox(dir) {
  if (!lightboxFiles.length) return;
  lightboxIdx = (lightboxIdx + dir + lightboxFiles.length) % lightboxFiles.length;
  renderLightbox();
}

function closeLightbox() {
  document.getElementById("modal-root").innerHTML = "";
}

function updateTrip(key, value) {

    const hdrEls = document.querySelectorAll(".stat-value");

function updateTripDates(which, value) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  if (which === "start") t.startDate = value; else t.endDate = value;
  syncItineraryToDateRange(t);
  saveState(); render();
}

function syncItineraryToDateRange(t) {
  if (!t.startDate || !t.endDate) return;
  const dur = tripDuration(t);
  if (dur === null || dur < 0) return;
  const targetDays = dur + 1; // calendar days inclusive of start and end
  while (t.itinerary.length < targetDays) {
    t.itinerary.push({ id: uid(), theme: "", slots: (t.timeSlots||TIME_SLOTS_DEFAULT).map(time => ({ time, activity: "" })) });
  }
  if (t.itinerary.length > targetDays) {
    t.itinerary = t.itinerary.slice(0, targetDays);
  }
}
function confirmDeleteTrip() {
  const t = currentTrip(); if (!t) return;
  if (!confirm(`Delete "${t.title}"? This cannot be undone.`)) return;
  deleteTrip(t.id); goHome();
}

  } else {
    lightboxFiles = [{ id: thumbnailId, name: "Cover photo", thumbnailLink: null }];
    lightboxIdx = 0;
  }
  renderLightbox();
}

function switchAuthTab(tab) {
  const isLogin = tab === "login";
  document.getElementById("auth-form-login").style.display = isLogin ? "" : "none";
  document.getElementById("auth-form-register").style.display = isLogin ? "none" : "";
  document.getElementById("auth-modal-title").textContent = isLogin ? "Sign In" : "Create Account";
  document.getElementById("tab-login").style.background = isLogin ? "var(--primary)" : "var(--surface)";
  document.getElementById("tab-login").style.color = isLogin ? "white" : "var(--ink-soft)";
  document.getElementById("tab-register").style.background = isLogin ? "var(--surface)" : "var(--primary)";
  document.getElementById("tab-register").style.color = isLogin ? "var(--ink-soft)" : "white";
  const firstInput = isLogin ? "login-username" : "reg-username";
  setTimeout(() => document.getElementById(firstInput)?.focus(), 50);
}
async function submitLogin() {
  const username = document.getElementById("login-username")?.value.trim();
  const password = document.getElementById("login-password")?.value;
  const errEl = document.getElementById("login-error");
  if (!username || !password) return;
  const btn = document.querySelector("#auth-form-login .btn.primary");
  if (btn) btn.disabled = true;
  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Login failed");
    setToken(data.token);
    closeModal();
    state = await loadState();
    render();
  } catch (err) {
    if (btn) btn.disabled = false;
    if (errEl) { errEl.textContent = err.message; errEl.style.display = ""; }
  }
}
async function submitRegister() {
  const username = document.getElementById("reg-username")?.value.trim();
  const password = document.getElementById("reg-password")?.value;
  const confirm = document.getElementById("reg-confirm")?.value;
  const errEl = document.getElementById("reg-error");
  if (!username || !password || !confirm) return;
  if (password !== confirm) {
    if (errEl) { errEl.textContent = "Passwords do not match."; errEl.style.display = ""; }
    return;
  }
  const btn = document.querySelector("#auth-form-register .btn.primary");
  if (btn) btn.disabled = true;
  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Registration failed");
    setToken(data.token);
    closeModal();
    state = await loadState();
    render();
  } catch (err) {
    if (btn) btn.disabled = false;
    if (errEl) { errEl.textContent = err.message; errEl.style.display = ""; }
  }
}

function openHighlightCardModal(tripId) {

  showModal({
    title: "Trip Card",

      <p class="hint" style="text-align:center;">Download and share anywhere — Instagram, group chat, email.</p>`,
