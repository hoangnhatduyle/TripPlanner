    </div>
  `;
}

function addTraveler(name) {
  if (!guardEdit()) return;
  name = (name || "").trim(); if (!name) return;
  const t = currentTrip(); if (!t) return;
  t.travelers = t.travelers || [];
  t.travelers.push(name); saveState(); render();
}
function removeTraveler(name) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  t.travelers = (t.travelers || []).filter(p => p !== name);
  if (t.myTraveler === name) t.myTraveler = null;
  saveState(); render();
}
function setMyTraveler(name) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  t.myTraveler = (t.myTraveler === name) ? null : name;
  saveState(); render();
}
function computeMyData(t) {
  const me = t.myTraveler;
  if (!me) return null;
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];
  let myOwed = 0, myPaid = 0, mySettled = 0, myUnsettled = 0;
  // Track net debts: positive = they owe me, negative = I owe them
  const netWith = {};
  travelers.forEach(p => { if (p !== me) netWith[p] = 0; });

  expenses.forEach(e => {
    const cost = parseFloat(e.cost) || 0;
    const participants = expenseParticipants(e, travelers);
    if (!participants.includes(me)) return;
    const split = computeSplit(e, travelers);
    const myShare = split[me] || 0;
    myOwed += myShare;

    const payers = e.paidBy && e.paidBy.length ? e.paidBy : [];
    const isPayer = payers.includes(me);
    if (isPayer) myPaid += cost / payers.length;

    const settled = e.settledBy || [];
    if (isPayer || settled.includes(me)) mySettled += myShare;
    else myUnsettled += myShare;

    // Compute who owes whom for this expense
    if (isPayer) {
      // I paid: others who haven't settled owe me their share
      participants.forEach(p => {
        if (p === me || netWith[p] === undefined) return;
        const theirShare = split[p] || 0;
        if (!payers.includes(p)) {
          netWith[p] += theirShare; // they owe me
        }
      });
    } else if (payers.length > 0) {
      // Someone else paid: I owe payers my share
      payers.forEach(p => {
        if (p === me || netWith[p] === undefined) return;
        netWith[p] -= myShare / payers.length; // I owe them
      });
    }
  });

  // Simplify: aggregate into owesMe / iOwe lists
  const owesMe = [], iOwe = [];
  Object.entries(netWith).forEach(([p, v]) => {
    if (v > 0.01) owesMe.push({ name: p, amount: v });
    else if (v < -0.01) iOwe.push({ name: p, amount: -v });
  });
  owesMe.sort((a, b) => b.amount - a.amount);
  iOwe.sort((a, b) => b.amount - a.amount);

  return { myOwed, myPaid, mySettled, myUnsettled, owesMe, iOwe, net: myPaid - myOwed };
}

// -------- ITINERARY TAB --------
function renderItinerary(t) {
  const dayCount = t.itinerary.length;
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const startDate = parseDate(t.startDate);
  const totalCols = 1 + dayCount; // time col + day cols
  const totalRows = 1 + slots.length; // header row + slot rows

  // Flat CSS Grid: columns = time + days, rows = header + slots
  const gridStyle = `grid-template-columns: 100px repeat(${dayCount}, minmax(160px, 1fr)); grid-template-rows: auto repeat(${slots.length}, minmax(46px, auto));`;

  let cells = "";

  // Header row (grid row 1)
  cells += `<div class="itin-cell time" style="grid-row:1; grid-column:1;">Time</div>`;
  t.itinerary.forEach((d, i) => {
    let dayDate = "";
    if (startDate) { const dd = new Date(startDate); dd.setDate(dd.getDate() + i); dayDate = dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" }); }
    cells += `
      <div class="itin-cell daycol" style="grid-row:1; grid-column:${i+2};">
        <div class="dnum">Day ${i+1}</div>
        ${dayDate ? `<div class="ddate">${dayDate}</div>`:""}
        <input class="theme-in" value="${escapeHtml(d.theme||"")}" placeholder="Day theme..." onchange="updateDayTheme(${i}, this.value)" />
        <div class="itin-day-actions no-print">
          <button onclick="addDay()">+ Day</button>
          ${dayCount > 1 ? `<button onclick="removeDay(${i})">– Day</button>`:""}
        </div>
      </div>`;
  });

  // Slot rows: for each day, track which slots are covered by a span
  t.itinerary.forEach((d, dIdx) => {
    const covered = new Set();
    slots.forEach((time, sIdx) => {
      if (covered.has(sIdx)) return;
      if (!d.slots[sIdx]) d.slots[sIdx] = { time, activity: "" };
      const slot = d.slots[sIdx];
      const v = slot.activity || "";
      const span = Math.min(slot.span || 1, slots.length - sIdx); // clamp
      // Mark subsequent slots as covered
      for (let k = 1; k < span; k++) covered.add(sIdx + k);

      const gridRow = span > 1 ? `grid-row: ${sIdx+2} / span ${span}` : `grid-row: ${sIdx+2}`;
      const gridCol = `grid-column: ${dIdx+2}`;
      const spanLabel = span > 1 ? `${slots[sIdx]} – ${slots[sIdx+span-1] || slots[slots.length-1]}` : '';

      cells += `<div class="itin-cell slot ${v?"filled":""}" style="${gridRow}; ${gridCol};"
                     data-didx="${dIdx}" data-sidx="${sIdx}" data-span="${span}">
        <div class="slot-content">
          ${spanLabel ? `<div class="slot-time-badge">${spanLabel}</div>` : ''}
          <textarea class="autogrow" onchange="updateSlot(${dIdx}, ${sIdx}, this.value)" placeholder="">${escapeHtml(v)}</textarea>
        </div>
        ${v ? `<div class="drag-handle" onmousedown="startSlotDrag(event, ${dIdx}, ${sIdx})"></div>` : ''}
        ${v ? `<button class="mobile-edit-btn" onclick="openActivityTimeDialog(${dIdx}, ${sIdx})" title="Edit time">⏱</button>` : ''}
      </div>`;
    });
  });

  // Time labels (column 1)
  slots.forEach((time, sIdx) => {
    cells += `<div class="itin-cell time" style="grid-row:${sIdx+2}; grid-column:1;">${time}</div>`;
  });

  return `
    <div class="panel">
      <div class="panel-head">
        <h3>Day-by-day itinerary</h3>
        <div class="actions">
          <button class="btn sm" onclick="addDay()">+ Add day</button>
          <button class="btn sm" onclick="openTimeSlotsEditor()">⏱ Edit time slots</button>
        </div>
      </div>
      <div class="panel-sub">Tap any cell to add an activity. Drag the bottom edge to span multiple hours. On mobile, tap ⏱ to set duration.</div>
      <div class="itin-grid-wrap">
        <div class="itin-grid" style="${gridStyle}">
          ${cells}
        </div>
      </div>
    </div>
  `;
}

function updateDayTheme(i, v) {
  if (!guardEdit()) return;
  const t = currentTrip(); t.itinerary[i].theme = v; saveState();
}
function updateSlot(dIdx, sIdx, v) {
  if (!guardEdit()) return;
  const t = currentTrip();
  if (!t.itinerary[dIdx].slots[sIdx]) t.itinerary[dIdx].slots[sIdx] = { time: (t.timeSlots||TIME_SLOTS_DEFAULT)[sIdx], activity: "" };
  t.itinerary[dIdx].slots[sIdx].activity = v;
  // Reset span if activity cleared
  if (!v || !v.trim()) t.itinerary[dIdx].slots[sIdx].span = 1;
  saveState();
  render();
}
function addDay() {
  if (!guardEdit()) return;
  const t = currentTrip();
  t.itinerary.push({ id: uid(), theme: "", slots: (t.timeSlots||TIME_SLOTS_DEFAULT).map(time => ({ time, activity: "", span: 1 })) });
  saveState(); render();
}
function removeDay(i) {
  if (!guardEdit()) return;
  const t = currentTrip();
  if (t.itinerary.length <= 1) return;
  if (!confirm("Remove this day from the itinerary?")) return;
  t.itinerary.splice(i, 1); saveState(); render();
}
function openTimeSlotsEditor() {
  if (!guardEdit()) return;
  const t = currentTrip();
  const current = (t.timeSlots || TIME_SLOTS_DEFAULT).join("\n");
  showModal({
    title: "Edit time slots",
    body: `
      <div class="field">
        <label>One time per line (e.g. "8:00 AM"). Slots apply to every day.</label>
        <textarea id="ts-input" rows="10" style="font-family:monospace;font-size:13px;">${escapeHtml(current)}</textarea>
        <div class="hint">Tip: add half-hour slots if you want finer granularity.</div>
      </div>
    `,
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Save", primary: true, onClick: () => {
        const slots = document.getElementById("ts-input").value.split("\n").map(s=>s.trim()).filter(Boolean);
        if (!slots.length) return alert("Need at least one time slot.");
        t.timeSlots = slots;
        // Resize each day's slots, preserving span data
        t.itinerary.forEach(d => {
          const oldMap = {};
          (d.slots||[]).forEach(s => { oldMap[s.time] = { activity: s.activity, span: s.span }; });
          d.slots = slots.map(time => ({ time, activity: (oldMap[time]||{}).activity || "", span: (oldMap[time]||{}).span || 1 }));
        });
        saveState(); closeModal(); render();
      }}
    ]
  });
}

// -------- DRAG TO RESIZE ACTIVITY SPAN --------
let dragState = null;

function startSlotDrag(e, dIdx, sIdx) {
  if (!isEditing()) return;
  e.preventDefault();
  const t = currentTrip();
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const cell = e.target.closest('.itin-cell.slot');
  if (!cell) return;

  // Get all slot cells for this day to compute row positions
  const grid = cell.closest('.itin-grid');
  const allTimeCells = grid.querySelectorAll('.itin-cell.time:not(.daycol)');
  // Build row boundaries from the time cells (column 1)
  // Actually use all cells in column 1 that are slot rows
  const timeCellArr = [];
  allTimeCells.forEach(tc => {
    // skip the header "Time" cell
    if (tc.style.gridRow && parseInt(tc.style.gridRow) >= 2) {
      timeCellArr.push(tc);
    }
  });

  const rowBounds = timeCellArr.map(tc => {
    const r = tc.getBoundingClientRect();
    return { top: r.top, bottom: r.bottom, mid: r.top + r.height/2 };
  });

  const startSpan = t.itinerary[dIdx].slots[sIdx].span || 1;

  dragState = { dIdx, sIdx, startSpan, rowBounds, maxSpan: slots.length - sIdx };

  const onMove = (ev) => {
    if (!dragState) return;
    const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
    // Find which row the mouse is over
    let newSpan = 1;
    for (let i = sIdx; i < dragState.rowBounds.length; i++) {
      if (clientY >= dragState.rowBounds[i].mid) {
        newSpan = i - sIdx + 1;
      }
    }
    newSpan = Math.max(1, Math.min(newSpan, dragState.maxSpan));

    // Check if any covered slot has content (don't merge over filled slots)
    const day = t.itinerary[dIdx];
    let canSpan = true;
    for (let k = 1; k < newSpan; k++) {
      const coveredSlot = day.slots[sIdx + k];
      if (coveredSlot && coveredSlot.activity && coveredSlot.activity.trim()) {
        newSpan = k; // stop before the filled slot
        break;
      }
    }

    if (newSpan !== (t.itinerary[dIdx].slots[sIdx].span || 1)) {
      t.itinerary[dIdx].slots[sIdx].span = newSpan;
      // Clear span on covered slots
      for (let k = 1; k < newSpan; k++) {
        if (day.slots[sIdx + k]) day.slots[sIdx + k].span = 1;
      }
      // Update cell visually without full re-render during drag
      cell.style.gridRow = `${sIdx+2} / span ${newSpan}`;
    }
  };

  const onUp = () => {
    dragState = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    saveState(); render(); // full re-render on drag end
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onUp);
}

// -------- MOBILE ACTIVITY TIME DIALOG --------
function openActivityTimeDialog(dIdx, sIdx) {
  const t = currentTrip(); if (!t) return;
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const day = t.itinerary[dIdx];
  const slot = day.slots[sIdx];
  const currentSpan = slot.span || 1;
  const startDate = parseDate(t.startDate);
  let dayLabel = `Day ${dIdx+1}`;
  if (startDate) {
    const dd = new Date(startDate); dd.setDate(dd.getDate() + dIdx);
    dayLabel = dd.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });
  }

  // Build start time options (current start slot)
  const startOptions = slots.map((s, i) =>
    `<option value="${i}" ${i===sIdx?"selected":""}>${s}</option>`
  ).join("");

  // Build end time options (from start to end of day)
  const maxEnd = slots.length - 1;
  const currentEndIdx = sIdx + currentSpan - 1;
  const endOptions = slots.map((s, i) => {
    if (i < sIdx) return "";
    // Check if slots between sIdx+1 and i have content
    let blocked = false;
    for (let k = sIdx + 1; k <= i; k++) {
      if (day.slots[k] && day.slots[k].activity && day.slots[k].activity.trim()) {
        blocked = true; break;
      }
    }
    if (blocked) return "";
    return `<option value="${i}" ${i===currentEndIdx?"selected":""}>${s}</option>`;
  }).join("");

  showModal({
    title: `${escapeHtml(slot.activity || "Activity")}`,
    size: "sm",
    body: `
      <div class="activity-time-form">
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:4px;">${dayLabel}</div>
        <div class="field">
          <label>Activity</label>
          <textarea id="atd-activity" rows="2" style="width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:14px;">${escapeHtml(slot.activity||"")}</textarea>
        </div>
        <div class="field-row">
          <label>Start</label>
          <select id="atd-start">${startOptions}</select>
        </div>
        <div class="field-row">
          <label>End</label>
          <select id="atd-end">${endOptions}</select>
        </div>
      </div>
    `,
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Save", primary: true, onClick: () => {
        const newActivity = document.getElementById("atd-activity").value;
        const newStart = parseInt(document.getElementById("atd-start").value);
        const newEnd = parseInt(document.getElementById("atd-end").value);
        const newSpan = Math.max(1, newEnd - newStart + 1);

        // If start changed, move the activity
        if (newStart !== sIdx) {
          // Clear old slot
          day.slots[sIdx].activity = "";
          day.slots[sIdx].span = 1;
          // Set new slot
          if (!day.slots[newStart]) day.slots[newStart] = { time: slots[newStart], activity: "" };
          day.slots[newStart].activity = newActivity;
          day.slots[newStart].span = newSpan;
        } else {
          day.slots[sIdx].activity = newActivity;
          day.slots[sIdx].span = newSpan;
        }

        saveState(); closeModal(); render();
      }}
    ]
  });
}

// -------- EXPENSE SPLIT LOGIC --------
function expenseParticipants(e, allTravelers) {
  // splitAmong: undefined = all travelers; [] = none; otherwise specific names
  if (!e.splitAmong) return allTravelers.slice();
  return e.splitAmong.filter(p => allTravelers.includes(p));
}

function computeSplit(expense, allTravelers) {
  const cost = parseFloat(expense.cost) || 0;
  const participants = expenseParticipants(expense, allTravelers);
  const result = {};
  if (!participants.length) return result;
  const method = expense.splitMethod || "equal";
  const d = expense.splitDetails || {};

  if (method === "equal") {
    const each = cost / participants.length;
    participants.forEach(p => result[p] = each);
  } else if (method === "exact") {
    participants.forEach(p => result[p] = parseFloat(d[p]) || 0);
  } else if (method === "percent") {
    participants.forEach(p => result[p] = cost * (parseFloat(d[p]) || 0) / 100);
  } else if (method === "shares" || method === "days") {
    let total = 0;
    participants.forEach(p => total += (parseFloat(d[p]) || 0));
    if (total <= 0) {
      const each = cost / participants.length;
      participants.forEach(p => result[p] = each);
    } else {
      participants.forEach(p => result[p] = cost * (parseFloat(d[p]) || 0) / total);
    }
  } else if (method === "adjust") {
    let totalAdj = 0;
    participants.forEach(p => totalAdj += (parseFloat(d[p]) || 0));
    const base = (cost - totalAdj) / participants.length;
    participants.forEach(p => result[p] = base + (parseFloat(d[p]) || 0));
  }
  return result;
}

function splitTotalAllocated(expense, allTravelers) {
  const split = computeSplit(expense, allTravelers);
  return Object.values(split).reduce((s, v) => s + (v || 0), 0);
}

function splitSummaryLabel(expense, allTravelers) {
  const m = SPLIT_METHODS.find(x => x.id === (expense.splitMethod||"equal")) || SPLIT_METHODS[0];
  const ppl = expenseParticipants(expense, allTravelers).length;
  return `${m.icon} ${m.label} · ${ppl} ${ppl===1?"person":"ppl"}`;
}

// -------- EXPENSES TAB --------
function renderExpenses(t, printMode) {
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];
  const total = expenses.reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);

  // Aggregate owed/paid/settled using computeSplit logic
  const owedBy = {}; const paidBy = {}; const settledAmt = {}; const unsettledAmt = {};
  travelers.forEach(p => { owedBy[p] = 0; paidBy[p] = 0; settledAmt[p] = 0; unsettledAmt[p] = 0; });
  expenses.forEach(e => {
    const cost = parseFloat(e.cost) || 0;
    const split = computeSplit(e, travelers);
    Object.entries(split).forEach(([p, v]) => { if (owedBy[p] !== undefined) owedBy[p] += v; });
    const payer = e.paidBy && e.paidBy.length ? e.paidBy : (travelers[0] ? [travelers[0]] : []);
    if (payer.length) payer.forEach(p => { if (paidBy[p] !== undefined) paidBy[p] += cost / payer.length; });
    // Track settlements
    const settled = e.settledBy || [];
    const participants = expenseParticipants(e, travelers);
    participants.forEach(p => {
      const share = split[p] || 0;
      if (payer.includes(p)) { settledAmt[p] += share; }
      else if (settled.includes(p)) { settledAmt[p] += share; }
      else { unsettledAmt[p] += share; }
    });
  });

  const rows = expenses.map((e, i) => {
    const allocated = splitTotalAllocated(e, travelers);
    const cost = parseFloat(e.cost) || 0;
    const balanced = Math.abs(allocated - cost) < 0.01;
    const participants = travelers.length ? expenseParticipants(e, travelers) : [];
    const perPerson = participants.length > 0 ? cost / participants.length : 0;
    const method = e.splitMethod || "equal";
    const isCustom = method !== "equal" || (e.splitAmong && e.splitAmong.length > 0 && e.splitAmong.length < travelers.length);
    const splitLabel = isCustom
      ? `${fmtCurrency(perPerson)} avg · ${participants.length} ppl`
      : (participants.length > 0 ? fmtCurrency(perPerson) : "$0.00");
    return `
    <tr>
      <td><input value="${escapeHtml(e.name||"")}" onchange="updateExpense(${i},'name',this.value)" placeholder="Expense" /></td>
      <td><select onchange="updateExpense(${i},'category',this.value)">
        ${EXPENSE_CATEGORIES.map(c => `<option ${e.category===c?"selected":""}>${c}</option>`).join("")}
      </select></td>
      <td class="num"><input type="number" step="0.01" value="${e.cost||""}" onchange="updateExpense(${i},'cost',parseFloat(this.value)||0)" /></td>
      <td><input type="date" value="${e.date||""}" onchange="updateExpense(${i},'date',this.value)" /></td>
      <td>
        <button class="payer-btn" onclick="openPayerDialog(${i})" title="Select who paid & settle up">
          ${(e.paidBy||[]).length ? (e.paidBy||[]).map(p => `<span class="payer-tag">${escapeHtml(p)}</span>`).join("") : '<span class="payer-placeholder">Select payer</span>'}
          ${(() => {
            const parts = travelers.length ? expenseParticipants(e, travelers) : [];
            const payers = (e.paidBy||[]);
            const settled = (e.settledBy||[]);
            const needSettle = parts.filter(p => !payers.includes(p));
            const doneCount = needSettle.filter(p => settled.includes(p)).length;
            return needSettle.length > 0 && payers.length > 0
              ? '<span style="font-size:10px;color:' + (doneCount === needSettle.length ? '#2e7d32' : 'var(--ink-soft)') + ';margin-left:2px;">' + doneCount + '/' + needSettle.length + '</span>'
              : '';
          })()}
        </button>
      </td>
      <td><input value="${escapeHtml(e.note||"")}" onchange="updateExpense(${i},'note',this.value)" placeholder="" /></td>
      <td>
        <button class="split-cell-btn" onclick="openSplitEditor(${i})" title="Customize split">
          ${splitLabel} ${!balanced && cost>0 ? '<span style="color:#c0392b;" title="Allocation doesn\'t match cost">⚠</span>' : ''}
        </button>
      </td>
      <td class="row-actions no-print">
        <button class="icon-btn" onclick="deleteExpense(${i})" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </td>
    </tr>
  `;}).join("");

  return `
    <div class="panel">
      <div class="panel-head">
        <h3>Expenses</h3>
        <div class="actions">
          <button class="btn sm" onclick="openCalc()" title="Calculator">🧮 Calculator</button>
          <button class="btn sm primary" onclick="addExpense()">+ Add expense</button>
        </div>
      </div>

      ${expenses.length === 0 ? `
        <div class="empty-mini">
          <h4>No expenses yet 💸</h4>
          <p>Add your flights, lodging, activities — anything you're spending on this trip.</p>
          <button class="btn primary sm" onclick="addExpense()" style="margin-top:8px;">+ Add first expense</button>
        </div>
      ` : `
        <div class="t-wrap">
          <table class="t">
            <thead><tr>
              <th>Expense</th><th>Category</th><th style="text-align:right;">Cost</th>
              <th>Date</th><th>Paid by</th><th>Note</th><th>Per Person</th>
              <th class="no-print"></th>
            </tr></thead>
            <tbody>${rows}</tbody>
            <tfoot>
              <tr>
                <td colspan="2">Total</td>
                <td class="num">${fmtCurrency(total)}</td>
                <td colspan="4"></td>
                <td class="no-print"></td>
              </tr>
            </tfoot>
          </table>
        </div>

        ${travelers.length >= 1 ? `
          <h4 style="margin:18px 0 0;">Per-person breakdown</h4>
          <div class="panel-sub">Compares each person's share of expenses vs. what they've paid. Click a person to see their expense details.</div>
          <div class="split-summary">
            ${travelers.map(p => {
              const owe = owedBy[p] || 0, paid = paidBy[p] || 0, net = paid - owe;
              const color = net > 0.01 ? "var(--primary)" : net < -0.01 ? "#c0392b" : "var(--ink-soft)";
              const sAmt = settledAmt[p] || 0, uAmt = unsettledAmt[p] || 0;
              const hasActivity = owe > 0;
              return `
                <div class="split-pill" onclick="openPersonDetail('${escapeAttr(p)}')" title="Click to see ${escapeHtml(p)}'s expenses">
                  <div class="who">${escapeHtml(p)}</div>
                  <div class="amt">${fmtCurrency(owe)}</div>
                  <div class="text-sm" style="color:${color};margin-top:2px;">
                    ${net > 0.01 ? "Is owed " + fmtCurrency(net) : net < -0.01 ? "Owes " + fmtCurrency(-net) : "Even"}
                  </div>
                  ${hasActivity && uAmt > 0.01 ? `<div class="text-sm" style="color:#c0392b;margin-top:1px;font-size:10px;">${fmtCurrency(uAmt)} unsettled</div>` : ''}
                  ${hasActivity && uAmt < 0.01 && owe > 0 ? `<div class="text-sm" style="color:#2e7d32;margin-top:1px;font-size:10px;">✓ All settled</div>` : ''}
                </div>
              `;
            }).join("")}
          </div>
        ` : `<div class="hint" style="margin-top:14px;">Add travelers (in Overview tab) to see per-person breakdowns.</div>`}
      `}
    </div>
  `;
}

// -------- SPLIT EDITOR --------
function openSplitEditor(i) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  const travelers = t.travelers || [];
  if (!travelers.length) {
    alert("Add travelers first (in the Overview tab) so you can split this expense.");
    return;
  }
  const e = t.expenses[i];
  // Ensure splitAmong defaults to all travelers if undefined
  if (!e.splitAmong) e.splitAmong = travelers.slice();
  e.splitMethod = e.splitMethod || "equal";
  e.splitDetails = e.splitDetails || {};

  showModal({
    title: `Split: ${e.name || "Expense"} (${fmtCurrency(parseFloat(e.cost)||0)})`,
    size: "lg",
    body: `<div id="split-editor-body"></div>`,
    actions: [
      { label: "Done", primary: true, onClick: () => { saveState(); closeModal(); render(); } }
    ]
  });
  renderSplitEditor(i);
}

function renderSplitEditor(i) {
  const t = currentTrip();
  const e = t.expenses[i];
  const allTravelers = t.travelers || [];
  const participants = expenseParticipants(e, allTravelers);
  const cost = parseFloat(e.cost) || 0;
  const method = e.splitMethod || "equal";
  const methodObj = SPLIT_METHODS.find(m => m.id === method) || SPLIT_METHODS[0];
  const split = computeSplit(e, allTravelers);
  const allocated = Object.values(split).reduce((s,v)=>s+(v||0), 0);
  const balanced = Math.abs(allocated - cost) < 0.01;

  // Method-specific rows
  let rowsHtml = "";
  let headHtml = "";
  if (!participants.length) {
    rowsHtml = `<div style="padding:24px;text-align:center;color:var(--ink-soft);">Select at least one traveler above.</div>`;
  } else if (method === "equal") {
    headHtml = `<div class="split-row-head cols-2"><div>Traveler</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => `
      <div class="split-row cols-2">
        <div class="who">${escapeHtml(p)}</div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `).join("");
  } else if (method === "exact") {
    headHtml = `<div class="split-row-head cols-2"><div>Traveler</div><div style="text-align:right;">Amount (${state.settings.currency})</div></div>`;
    rowsHtml = participants.map(p => `
      <div class="split-row cols-2">
        <div class="who">${escapeHtml(p)}</div>
        <input class="split-in" type="number" step="0.01" value="${(e.splitDetails[p]!==undefined?e.splitDetails[p]:(split[p]||0).toFixed(2))}"
               onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="max-width:140px;margin-left:auto;display:block;text-align:right;"/>
      </div>
    `).join("");
  } else if (method === "percent") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Percent</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => {
      const pct = e.splitDetails[p]!==undefined ? e.splitDetails[p] : (100/participants.length).toFixed(2);
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="0.01" value="${pct}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "shares") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Shares</div><div style="text-align:right;">Amount</div></div>`;
    rowsHtml = participants.map(p => {
      const sh = e.splitDetails[p]!==undefined ? e.splitDetails[p] : 1;
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="1" min="0" value="${sh}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "days") {
    headHtml = `<div class="split-row-head cols-3"><div>Traveler</div><div style="text-align:right;">Days</div><div style="text-align:right;">Amount</div></div>`;
    const tripDays = tripDuration(t) || 1;
    rowsHtml = participants.map(p => {
      const dv = e.splitDetails[p]!==undefined ? e.splitDetails[p] : tripDays;
      return `
      <div class="split-row cols-3">
        <div class="who">${escapeHtml(p)}</div>
        <div><input class="split-in" type="number" step="1" min="0" value="${dv}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  } else if (method === "adjust") {
    headHtml = `<div class="split-row-head cols-4"><div>Traveler</div><div style="text-align:right;">Equal share</div><div style="text-align:right;">Adjustment</div><div style="text-align:right;">Final</div></div>`;
    const totalAdj = participants.reduce((s,p)=>s+(parseFloat(e.splitDetails[p])||0), 0);
    const baseShare = (cost - totalAdj) / participants.length;
    rowsHtml = participants.map(p => {
      const adj = e.splitDetails[p]!==undefined ? e.splitDetails[p] : 0;
      return `
      <div class="split-row cols-4">
        <div class="who">${escapeHtml(p)}</div>
        <div class="amt-out muted-out" style="text-align:right;">${fmtCurrency(baseShare)}</div>
        <div class="adj-wrap"><input class="split-in adj" type="number" step="0.01" value="${adj}"
                onchange="updateSplitDetail(${i}, '${escapeAttr(p)}', this.value)" style="text-align:right;"/></div>
        <div class="amt-out" style="text-align:right;">${fmtCurrency(split[p]||0)}</div>
      </div>
    `;}).join("");
  }

  // Method-specific footer
  let footerHtml = "";
  if (method === "percent") {
    const totalPct = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    const pctOk = Math.abs(totalPct - 100) < 0.01;
    footerHtml = `<div class="split-summary-line">
      <div>Total: <span class="${pctOk?'ok':'bad'}">${totalPct.toFixed(2)}%</span></div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else if (method === "shares") {
    const totalShares = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    footerHtml = `<div class="split-summary-line">
      <div>Total shares: ${totalShares}</div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else if (method === "days") {
    const totalDays = participants.reduce((s,p)=>s + (parseFloat(e.splitDetails[p])||0), 0);
    footerHtml = `<div class="split-summary-line">
      <div>Total person-days: ${totalDays}</div>
      <div>${fmtCurrency(allocated)} ${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">≠ ${fmtCurrency(cost)}</span>`}</div>
    </div>`;
  } else {
    footerHtml = `<div class="split-summary-line">
      <div>Total: <strong>${fmtCurrency(allocated)}</strong></div>
      <div>${balanced ? '<span class="ok">✓ Fully allocated</span>' : `<span class="bad">${fmtCurrency(allocated-cost>0?allocated-cost:cost-allocated)} ${allocated>cost?"over":"short"}</span>`}</div>
    </div>`;
  }

  const html = `
    <div class="field">
      <label>Split method</label>
      <div class="split-methods">
        ${SPLIT_METHODS.map(m => `
          <button class="split-method ${method===m.id?'sel':''}" onclick="changeSplitMethod(${i}, '${m.id}')">
            <div class="sm-icon">${m.icon}</div>
            <div class="sm-label">${m.label}</div>
          </button>
        `).join("")}
      </div>
      <div class="split-desc">${methodObj.desc}</div>
    </div>

    <div class="field">
      <label>Who's involved? (${participants.length} of ${allTravelers.length})</label>
      <div class="split-participants">
        ${allTravelers.map(p => {
          const on = (e.splitAmong || allTravelers).includes(p);
          return `
            <label class="split-chip ${on?'on':''}" onclick="toggleSplitParticipant(${i}, '${escapeAttr(p)}')">
              <div class="dot"></div> ${escapeHtml(p)}
            </label>
          `;
        }).join("")}
        <button class="split-chip" style="background:transparent;font-weight:600;color:var(--primary);"
                onclick="setAllSplitParticipants(${i}, ${participants.length === allTravelers.length})">
          ${participants.length === allTravelers.length ? "Clear all" : "Select all"}
        </button>
      </div>
    </div>

    <div class="field">
      <label>Allocation</label>
      <div class="split-rows">
        ${headHtml}
        ${rowsHtml}
      </div>
      ${footerHtml}
      ${method !== "equal" && participants.length ? `
        <div style="margin-top:8px;display:flex;justify-content:flex-end;">
          <button class="btn sm" onclick="splitAutoBalance(${i})">⚖ Auto-balance</button>
        </div>
      ` : ""}
    </div>
  `;
  document.getElementById("split-editor-body").innerHTML = html;
}

function escapeAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function changeSplitMethod(i, method) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitMethod = method;
  // Reset details to sensible defaults
  const participants = expenseParticipants(e, t.travelers || []);
  e.splitDetails = {};
  if (method === "percent") {
    const each = participants.length ? 100/participants.length : 0;
    participants.forEach(p => e.splitDetails[p] = parseFloat(each.toFixed(2)));
  } else if (method === "shares") {
    participants.forEach(p => e.splitDetails[p] = 1);
  } else if (method === "days") {
    const td = tripDuration(t) || 1;
    participants.forEach(p => e.splitDetails[p] = td);
  } else if (method === "adjust") {
    participants.forEach(p => e.splitDetails[p] = 0);
  } else if (method === "exact") {
    const cost = parseFloat(e.cost) || 0;
    const each = participants.length ? cost/participants.length : 0;
    participants.forEach(p => e.splitDetails[p] = parseFloat(each.toFixed(2)));
  }
  saveState();
  renderSplitEditor(i);
}

function updateSplitDetail(i, name, value) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitDetails = e.splitDetails || {};
  e.splitDetails[name] = parseFloat(value) || 0;
  saveState();
  renderSplitEditor(i);
}

function toggleSplitParticipant(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitAmong = e.splitAmong || (t.travelers || []).slice();
  const idx = e.splitAmong.indexOf(name);
  if (idx >= 0) e.splitAmong.splice(idx, 1); else e.splitAmong.push(name);
  // Clean up details for removed participants
  if (e.splitDetails) { Object.keys(e.splitDetails).forEach(k => { if (!e.splitAmong.includes(k)) delete e.splitDetails[k]; }); }
  saveState();
  renderSplitEditor(i);
}

function setAllSplitParticipants(i, clear) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.splitAmong = clear ? [] : (t.travelers || []).slice();
  saveState();
  renderSplitEditor(i);
}

function splitAutoBalance(i) {
  // Adjust last participant's value so total matches cost
  const t = currentTrip();
  const e = t.expenses[i];
  const cost = parseFloat(e.cost) || 0;
  const participants = expenseParticipants(e, t.travelers || []);
  if (!participants.length) return;
  const method = e.splitMethod;

  if (method === "percent") {
    const last = participants[participants.length - 1];
    let used = 0;
    for (let j = 0; j < participants.length - 1; j++) {
      used += parseFloat(e.splitDetails[participants[j]]) || 0;
    }
    e.splitDetails[last] = parseFloat((100 - used).toFixed(2));
  } else if (method === "exact") {
    const last = participants[participants.length - 1];
    let used = 0;
    for (let j = 0; j < participants.length - 1; j++) {
      used += parseFloat(e.splitDetails[participants[j]]) || 0;
    }
    e.splitDetails[last] = parseFloat((cost - used).toFixed(2));
  } else if (method === "adjust") {
    // zero out adjustments
    participants.forEach(p => e.splitDetails[p] = 0);
  } else if (method === "shares" || method === "days") {
    // Already auto-balances proportionally
  }
  saveState();
  renderSplitEditor(i);
}

// -------- PAYER & SETTLE-UP DIALOG --------
function openPayerDialog(i) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  const travelers = t.travelers || [];
  if (!travelers.length) {
    alert("Add travelers first (in the Overview tab).");
    return;
  }
  const e = t.expenses[i];
  e.paidBy = e.paidBy || [];
  e.settledBy = e.settledBy || [];

  showModal({
    title: `Payment: ${e.name || "Expense"} (${fmtCurrency(parseFloat(e.cost)||0)})`,
    size: "lg",
    body: `<div id="payer-dialog-body"></div>`,
    actions: [
      { label: "Done", primary: true, onClick: () => { saveState(); closeModal(); render(); } }
    ]
  });
  renderPayerDialog(i);
}

function renderPayerDialog(i) {
  const t = currentTrip();
  const e = t.expenses[i];
  const travelers = t.travelers || [];
  const participants = expenseParticipants(e, travelers);
  const cost = parseFloat(e.cost) || 0;
  const split = computeSplit(e, travelers);
  const payers = e.paidBy || [];
  const settled = e.settledBy || [];

  // Payer selection
  const payerChips = travelers.map(p => {
    const on = payers.includes(p);
    return `<div class="settle-payer-chip ${on?'on':''}" onclick="dialogTogglePayer(${i}, '${escapeAttr(p)}')">
      <div class="chip-dot"></div> ${escapeHtml(p)}
    </div>`;
  }).join("");

  // Settle-up rows: participants who didn't pay need to settle
  let settleHtml = "";
  if (payers.length > 0 && participants.length > 0) {
    const settleRows = participants.map(p => {
      const share = split[p] || 0;
      const isPayer = payers.includes(p);
      const isSettled = settled.includes(p);

      let toggleHtml;
      if (isPayer) {
        toggleHtml = `<div class="settle-toggle is-payer">Payer</div>`;
      } else {
        toggleHtml = `<div class="settle-toggle ${isSettled?'settled':''}" onclick="dialogToggleSettle(${i}, '${escapeAttr(p)}')">
          ${isSettled ? '✓ Settled' : 'Unsettled'}
        </div>`;
      }
      return `<div class="settle-row">
        <div class="settle-name">${escapeHtml(p)}</div>
        <div class="settle-amt">${fmtCurrency(share)}</div>
        ${toggleHtml}
      </div>`;
    }).join("");

    const needSettle = participants.filter(p => !payers.includes(p));
    const doneCount = needSettle.filter(p => settled.includes(p)).length;
    const totalUnsettled = needSettle.filter(p => !settled.includes(p)).reduce((s, p) => s + (split[p]||0), 0);

    settleHtml = `
      <div class="settle-section">
        <div class="settle-section-label">Settle up</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:10px;">
          Mark participants as settled once they've paid back the payer${payers.length > 1 ? 's' : ''}.
        </div>
        <div class="settle-rows">${settleRows}</div>
        <div class="settle-summary">
          <span>${doneCount}/${needSettle.length} settled</span>
          <span style="color:${totalUnsettled > 0.01 ? '#c0392b' : '#2e7d32'}">
            ${totalUnsettled > 0.01 ? fmtCurrency(totalUnsettled) + ' unsettled' : '✓ All settled'}
          </span>
        </div>
      </div>
    `;
  } else if (payers.length === 0) {
    settleHtml = `<div style="padding:16px;text-align:center;color:var(--ink-soft);font-size:13px;">Select who paid above to track settlements.</div>`;
  }

  document.getElementById("payer-dialog-body").innerHTML = `
    <div class="settle-section">
      <div class="settle-section-label">Who paid?</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;">Select the person(s) who paid for this expense upfront.</div>
      <div class="settle-payer-chips">${payerChips}</div>
    </div>
    ${settleHtml}
  `;
}

function dialogTogglePayer(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.paidBy = e.paidBy || [];
  const idx = e.paidBy.indexOf(name);
  if (idx >= 0) e.paidBy.splice(idx, 1); else e.paidBy.push(name);
  // If removed as payer, also remove from settled
  if (idx >= 0 && e.settledBy) {
    const si = e.settledBy.indexOf(name);
    if (si >= 0) e.settledBy.splice(si, 1);
  }
  saveState();
  renderPayerDialog(i);
}

function dialogToggleSettle(i, name) {
  const t = currentTrip();
  const e = t.expenses[i];
  e.settledBy = e.settledBy || [];
  const idx = e.settledBy.indexOf(name);
  if (idx >= 0) e.settledBy.splice(idx, 1); else e.settledBy.push(name);
  saveState();
  renderPayerDialog(i);
}

// -------- PERSON EXPENSE DETAIL --------
function openPersonDetail(name) {
  const t = currentTrip(); if (!t) return;
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];

  // Find all expenses this person is involved in
  const personExpenses = [];
  let totalOwed = 0, totalPaid = 0, totalSettled = 0, totalUnsettled = 0;

  expenses.forEach((e, i) => {
    const cost = parseFloat(e.cost) || 0;
    const participants = expenseParticipants(e, travelers);
    if (!participants.includes(name)) return;

    const split = computeSplit(e, travelers);
    const share = split[name] || 0;
    totalOwed += share;

    const payers = e.paidBy && e.paidBy.length ? e.paidBy : (travelers[0] ? [travelers[0]] : []);
    let paidAmount = 0;
    if (payers.includes(name)) {
      paidAmount = cost / payers.length;
    }
    totalPaid += paidAmount;

    // Settlement status
    const isPayer = payers.includes(name);
    const isSettled = (e.settledBy || []).includes(name);
    let status;
    if (isPayer) { status = "payer"; totalSettled += share; }
    else if (isSettled) { status = "settled"; totalSettled += share; }
    else { status = "unsettled"; totalUnsettled += share; }

    personExpenses.push({
      name: e.name || "Untitled",
      category: e.category || "Misc",
      date: e.date || "",
      totalCost: cost,
      share: share,
      paidAmount: paidAmount,
      status: status,
      index: i
    });
  });

  const net = totalPaid - totalOwed;
  const netClass = net > 0.01 ? "positive" : net < -0.01 ? "negative" : "even";
  const netLabel = net > 0.01 ? "Is owed " + fmtCurrency(net) : net < -0.01 ? "Owes " + fmtCurrency(-net) : "Even";

  const statusBadge = (s) => {
    if (s === "payer") return '<span style="display:inline-block;background:var(--primary-soft);color:var(--primary-dark);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Payer</span>';
    if (s === "settled") return '<span style="display:inline-block;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Settled</span>';
    return '<span style="display:inline-block;background:#fff3e0;color:#e65100;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;">Unsettled</span>';
  };

  const tableRows = personExpenses.length ? personExpenses.map(pe => `
    <tr>
      <td><strong>${escapeHtml(pe.name)}</strong></td>
      <td class="cat-badge"><span>${escapeHtml(pe.category)}</span></td>
      <td class="num">${fmtCurrency(pe.totalCost)}</td>
      <td>${pe.date || "—"}</td>
      <td class="num">${fmtCurrency(pe.share)}</td>
      <td class="num">${pe.paidAmount > 0 ? fmtCurrency(pe.paidAmount) : "—"}</td>
      <td style="text-align:center;">${statusBadge(pe.status)}</td>
    </tr>
  `).join("") : `<tr><td colspan="7" style="text-align:center;color:var(--ink-soft);padding:24px;">No expenses yet</td></tr>`;

  showModal({
    title: `${escapeHtml(name)}'s Expenses`,
    size: "lg",
    body: `
      <div class="person-detail-summary" style="grid-template-columns:repeat(4,1fr);">
        <div class="person-detail-stat">
          <div class="label">Total Owed</div>
          <div class="value">${fmtCurrency(totalOwed)}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Total Paid</div>
          <div class="value">${fmtCurrency(totalPaid)}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Balance</div>
          <div class="value ${netClass}">${netLabel}</div>
        </div>
        <div class="person-detail-stat">
          <div class="label">Settled</div>
          <div class="value ${totalUnsettled < 0.01 && totalOwed > 0 ? 'positive' : totalUnsettled > 0.01 ? 'negative' : 'even'}">
            ${totalOwed > 0 ? (totalUnsettled < 0.01 ? '✓ All' : fmtCurrency(totalUnsettled) + ' left') : '—'}
          </div>
        </div>
      </div>
      <div class="person-detail-expenses">
        <table>
          <thead>
            <tr>
              <th>Expense</th>
              <th>Category</th>
              <th class="num">Total Cost</th>
              <th>Date</th>
              <th class="num">Their Share</th>
              <th class="num">Paid</th>
              <th style="text-align:center;">Status</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          ${personExpenses.length ? `
          <tfoot>
            <tr>
              <td colspan="4">Total</td>
              <td class="num">${fmtCurrency(totalOwed)}</td>
              <td class="num">${fmtCurrency(totalPaid)}</td>
              <td></td>
            </tr>
          </tfoot>` : ""}
        </table>
      </div>
    `,
    actions: [
      { label: "Close", primary: true, onClick: () => closeModal() }
    ]
  });
}

function addExpense() {
  if (!guardEdit()) return;
  const t = currentTrip();
  t.expenses = t.expenses || [];
  t.expenses.push({ id: uid(), name: "", category: "Misc", cost: null, date: "", paidBy: [], settledBy: [], splitAmong: [], note: "" });
  saveState(); render();
}
function updateExpense(i, key, value) {
  if (!guardEdit()) return;
  const t = currentTrip();
  t.expenses[i][key] = value; saveState();
  // re-render to update totals
  if (key === "cost" || key === "paidBy") render();
}
function deleteExpense(i) {
  if (!guardEdit()) return;
  const t = currentTrip();
  t.expenses.splice(i, 1); saveState(); render();
}

                </button>
              </div>
              <div class="pack-bar"><div class="pack-bar-fill" style="width:${total ? (done/total*100) : 0}%"></div></div>
              <div class="pack-items">
                ${c.items.map((it, ii) => `

  }

// -------- CALCULATOR --------
let calcState = { expr: "", just: false };
function openCalc() {
  showModal({
    title: "Quick calculator",
    size: "sm",
    body: `
      <div class="calc">
        <div class="calc-display">
          <div class="expr" id="calc-expr"></div>
          <div id="calc-val">0</div>
        </div>
        <div class="calc-grid">
          ${"AC,÷,×,⌫,7,8,9,−,4,5,6,+,1,2,3,=,0,.,(,)".split(",").map((b,i) => {
            const cls = ["÷","×","−","+","="].includes(b) ? (b==="=" ? "eq" : "op") : (b === "AC" || b === "⌫" || b === "(" || b === ")" ? "fn" : "");
            return `<button class="calc-btn ${cls}" onclick="calcPress('${b}')">${b}</button>`;
          }).join("")}
        </div>
        <div class="calc-help">
          <strong>Power tools:</strong> use buttons above, or type math directly.<br>
          Split by N people: e.g. <span class="kbd">450 / 8</span> → ${fmtCurrency(56.25)}<br>
          Press <span class="kbd">Enter</span> to compute.
        </div>
      </div>
    `,
    actions: [{ label: "Close", onClick: closeModal }]
  });
  // attach keyboard listener temporarily
  document.addEventListener("keydown", calcKey);
}
function closeCalcCleanup() { document.removeEventListener("keydown", calcKey); }
function calcKey(e) {
  if (!document.querySelector(".calc")) { closeCalcCleanup(); return; }
  const k = e.key;
  if (/[0-9.+\-*/()]/.test(k)) { calcAppend(k); e.preventDefault(); }
  else if (k === "Enter" || k === "=") { calcEval(); e.preventDefault(); }
  else if (k === "Backspace") { calcBackspace(); e.preventDefault(); }
  else if (k === "Escape") { closeModal(); closeCalcCleanup(); }
}
function calcPress(b) {
  if (b === "AC") { calcState.expr = ""; calcState.just = false; }
  else if (b === "⌫") calcBackspace();
  else if (b === "=") calcEval();
  else if (b === "÷") calcAppend("/");
  else if (b === "×") calcAppend("*");
  else if (b === "−") calcAppend("-");
  else calcAppend(b);
  calcRefresh();
}
function calcAppend(s) {
  if (calcState.just && /[0-9.]/.test(s)) calcState.expr = "";
  calcState.expr += s; calcState.just = false; calcRefresh();
}
function calcBackspace() { calcState.expr = calcState.expr.slice(0, -1); calcRefresh(); }
function calcEval() {
  if (!calcState.expr) return;
  try {
    if (!/^[\d\s+\-*/().]+$/.test(calcState.expr)) { alert("Invalid expression"); return; }
    const v = Function('"use strict";return (' + calcState.expr + ')')();
    document.getElementById("calc-expr").textContent = calcState.expr + " =";
    calcState.expr = String(v); calcState.just = true; calcRefresh();
  } catch (e) { alert("Invalid expression"); }
}
function calcRefresh() {
  const v = document.getElementById("calc-val");
  const x = document.getElementById("calc-expr");
  if (!v) return;
  v.textContent = calcState.expr || "0";
  if (!calcState.just) x.textContent = "";
}

function updateCurrency(c) { if (!isShareMode() && !guardEdit()) return; state.settings.currency = c; saveState(); render(); }
function exportJson() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `trip-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importJson(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.trips) throw new Error("Not a Trip Planner backup");
      if (confirm(`Import ${data.trips.length} trip(s)? This will MERGE with your current data.`)) {
        const ids = new Set(state.trips.map(t => t.id));
        data.trips.forEach(t => { if (!ids.has(t.id)) state.trips.push(t); });
        if (data.settings) state.settings = Object.assign(state.settings, data.settings);
        saveState(); closeModal(); render();
        alert("Import successful!");
      }
    } catch (e) { alert("Failed to import: " + e.message); }
  };
  reader.readAsText(file);
}
function resetAll() {
  if (!isEditing()) { alert("Sign in to edit."); return; }
  if (!confirm("Delete ALL trips and data? This cannot be undone.")) return;
  if (!confirm("Really? Last chance.")) return;
  state = DEFAULT_STATE();
  saveState(); closeModal(); goHome();
}

// -------- INITIAL --------
document.addEventListener("DOMContentLoaded", async () => {
  // Register PWA service worker.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }

  // Handle shared trip link: ?share=<token>
  const shareToken = new URLSearchParams(location.search).get("share");
  if (shareToken) {
    await loadSharedTrip(shareToken);
    return;
  }

  state = await loadState();
  applyAuthState();
  render();
});

async function loadSharedTrip(token) {
  document.getElementById("app-root").innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft);">Loading shared trip…</div>`;
  try {
    const res = await fetch(`/api/share/${token}`);
    if (!res.ok) throw new Error("not found");
    const { trip, settings, mode } = await res.json();

    state = { trips: [trip], settings: settings || { theme: "beach", currency: "USD" } };

    // Mark the document as being in share mode — hides navigation and data controls.
    document.documentElement.setAttribute("data-share", "true");
    document.getElementById("lock-btn").style.display = "none";
    document.getElementById("newtrip-nav-btn").style.display = "none";

    const banner = document.getElementById("view-only-banner");
    banner.style.display = "";

    if (mode === "edit") {
      window._shareToken = token;
      document.documentElement.setAttribute("data-auth", "share-edit");
      banner.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Editing shared trip — changes save automatically`;
    } else {
      document.documentElement.setAttribute("data-auth", "locked");
      banner.innerHTML = `🔗 Shared view — read only`;
    }

    route = { view: "trip", tripId: trip.id, tab: "overview" };
    render();
  } catch {
    document.getElementById("app-root").innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">🔗</div>
        <h3>Share link not found</h3>
        <p style="color:var(--ink-soft);">This link may have expired or been removed.</p>
        <button class="btn primary" onclick="location.href='/'">Go home</button>
      </div>`;
  }
}

function renderTripCard(t) {
  const dU = daysUntil(t.startDate);
  const dEnd = daysUntil(t.endDate);
  let cdLabel, cdClass = "";
  if (dU === null) { cdLabel = "no date"; cdClass = "past"; }
  else if (dU > 0) cdLabel = `in ${dU}d`;
  else if (dU === 0) { cdLabel = "today!"; cdClass = "live"; }
  else if (dEnd !== null && dEnd >= 0) { cdLabel = "live now"; cdClass = "live"; }
  else { cdLabel = `${-dU}d ago`; cdClass = "past"; }

  const totalSpend = (t.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);
  const peopleCt = (t.travelers || []).length;
  const nights = tripDuration(t);
  const dates = (t.startDate || t.endDate)
    ? `${fmtDate(t.startDate, {month:"short",day:"numeric"})}${t.endDate ? " – " + fmtDate(t.endDate, {month:"short",day:"numeric",year:"numeric"}) : ""}`
    : "Dates TBD";

  return `
    <div class="trip-card" onclick="openTrip('${t.id}')">
      <div class="trip-card-cd ${cdClass}">${cdLabel}</div>
      <div class="trip-card-banner">${t.emoji || "🌍"}</div>
      <div class="trip-card-title">${escapeHtml(t.title)}</div>
      <div class="trip-card-dest">${escapeHtml(t.destination || "Destination TBD")}</div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${dates}${nights ? ` <span class="muted">· ${nights}d</span>` : ""}
      </div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${peopleCt ? peopleCt + " " + (peopleCt === 1 ? "traveler" : "travelers") : "Solo or TBD"}
      </div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        ${totalSpend > 0 ? fmtCurrency(totalSpend) : (t.budget ? fmtCurrency(t.budget) + "/person budget" : "No expenses yet")}
      </div>
      <button class="btn sm edit-action share-edit-hidden" style="margin-top:10px;width:100%;justify-content:center;"
              onclick="duplicateTrip('${t.id}', event)" title="Duplicate as template">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Duplicate
      </button>
    </div>
  `;
}
</script>
