/* ===========================================================
   SHARE MODE
   =========================================================== */
.share-banner {
  background: var(--primary-soft);
  border-bottom: 1px solid var(--line);
  color: var(--primary-dark);
  font-size: 13px; font-weight: 600;
  text-align: center; padding: 7px 16px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}

/* Any share link: hide nav elements visitors must never touch */
[data-share] .share-hidden { display: none !important; }

/* Any share link: hide trip-level edit actions (share, delete, duplicate) */
[data-share] .edit-action { display: none !important; }

/* Read-only share: disable every form control */
[data-share="read"] #app-root input,
[data-share="read"] #app-root textarea,
[data-share="read"] #app-root select {
  pointer-events: none !important;
  cursor: default !important;
  background: transparent !important;
  color: var(--ink) !important;
}
[data-share="read"] #app-root input[type="checkbox"] { opacity: 0.45; }
[data-share="read"] #app-root a { pointer-events: auto !important; }

/* Itinerary slot textareas stay transparent so filled-cell background shows */
[data-share] #app-root .itin-cell.slot textarea { background: transparent !important; }

/* ===========================================================
   BASE
   =========================================================== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(1200px 700px at 0% 0%, var(--bg-grad-1) 0%, transparent 60%),
    radial-gradient(1100px 700px at 100% 0%, var(--bg-grad-3) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-grad-2) 0%, #ffffff 70%);
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
h1, h2, h3, h4 { margin: 0; font-weight: 700; letter-spacing: -0.01em; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ===========================================================
   TOP NAV
   =========================================================== */
.nav {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}
.brand {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none;
}
.brand-mark {
  width: 36px; height: 36px; border-radius: 11px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: grid; place-items: center;
  color: white; font-size: 18px;
  box-shadow: var(--shadow-sm);
}
.brand-name {
  font-weight: 800; font-size: 18px; color: var(--ink);
  letter-spacing: -0.01em;
}
.brand-tag {
  font-family: 'Caveat', cursive;
  font-size: 17px; color: var(--primary);
  margin-left: 4px;
}
.nav-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface-solid); border: 1px solid var(--line);
  display: grid; place-items: center; color: var(--ink);
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--primary-soft); border-color: var(--line-strong); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn.unlocked { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
.user-chip {
  display: flex; align-items: center; gap: 7px;
  padding: 0 12px 0 6px; height: 38px; border-radius: 10px;
  background: var(--surface-solid); border: 1px solid var(--line);
  color: var(--ink); font: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.user-chip:hover { background: var(--primary-soft); border-color: var(--line-strong); }
.user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--primary-soft); color: var(--primary);
  display: grid; place-items: center; flex-shrink: 0;
}
.user-avatar svg { width: 14px; height: 14px; }

/* ===========================================================
   APP LAYOUT
   =========================================================== */
.app { max-width: 1600px; margin: 0 auto; padding: 28px; }
.app-print-only { display: none; }
@media print {
  .nav, .fab, #modal-root, .no-print { display: none !important; }
  body { background: white; }
  .app { max-width: 100%; padding: 0; }
}

/* ===========================================================
   DASHBOARD
   =========================================================== */
.hero {
  display: flex; align-items: center; justify-content: space-between;
  gap: 28px; padding: 28px 0 32px;
}
.hero-text h1 {
  font-size: 38px; line-height: 1.1; margin-bottom: 8px;
}
.hero-text h1 .accent { color: var(--primary); }
.hero-text p { color: var(--ink-soft); margin: 0; font-size: 16px; }
.hero-emoji {
  font-size: 78px; line-height: 1;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.12));
  animation: bob 5s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-6px) rotate(3deg); }
}

.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: 6px 0 16px;
}
.section-head h2 { font-size: 22px; }
.section-head .muted { color: var(--ink-soft); font-size: 14px; margin-left: 8px; font-weight: 500; }
.year-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.year-pill {
  padding: 4px 12px; border-radius: 999px; border: 1.5px solid var(--line);
  background: transparent; font-size: 13px; font-weight: 600; color: var(--ink-soft);
  cursor: pointer; transition: all 0.15s;
}
.year-pill:hover { border-color: var(--primary); color: var(--primary); }
.year-pill.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-dark); }

.trip-grid {
  display: grid; gap: 18px;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
}
.trip-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.trip-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: var(--line-strong);
}
.trip-card-banner {
  height: 110px; border-radius: 12px; margin: -6px -6px 14px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: grid; place-items: center;
  font-size: 56px;
  position: relative; overflow: hidden;
}
.trip-card-banner::after {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25) 0%, transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0%, transparent 35%);
  pointer-events: none;
}
.trip-card-title { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.trip-card-dest { color: var(--ink-soft); font-size: 13px; margin-bottom: 12px; }
.trip-card-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--ink-soft);
  margin-top: 6px;
}
.trip-card-row svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
.trip-card-cd {
  position: absolute; top: 12px; right: 12px;
  background: var(--surface-solid); color: var(--primary);
  border-radius: 999px; padding: 5px 11px; font-size: 12px;
  font-weight: 700; box-shadow: var(--shadow-sm);
}
.trip-card-cd.past { color: var(--ink-soft); }
.trip-card-cd.live { color: white; background: var(--accent); }

/* New trip card */
.trip-card.new {
  background: transparent;
  border: 2px dashed var(--line-strong);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 270px; cursor: pointer;
  color: var(--primary); font-weight: 600;
  transition: all 0.2s;
}
.trip-card.new:hover {
  border-color: var(--primary); background: var(--primary-soft);
}
.trip-card.new .plus {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary-soft); display: grid; place-items: center;
  font-size: 30px; color: var(--primary); margin-bottom: 10px;
  font-weight: 300;
}
.trip-card.new:hover .plus { background: white; }

/* ===========================================================
   PAST TRIPS — TIMELINE + POSTCARD WALL
   =========================================================== */
.past-section {
  margin-top: 34px;
  padding: 18px 18px 24px;
  border-radius: 22px;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.78) 0%, rgba(255,255,255,0.9) 100%),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.35) 0 12px, rgba(255,255,255,0.15) 12px 24px);
  backdrop-filter: blur(10px);
}
.past-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap;
  margin-bottom: 10px;
}
.past-title {
  display: flex; align-items: baseline; gap: 10px;
}
.past-title h2 { font-size: 20px; }
.past-title .muted { font-size: 12px; }

.year-map {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 14px;
  overflow-x: auto;
  position: relative;
  max-width: 100%;
  min-width: 0;
  scroll-snap-type: x mandatory;
  scroll-padding: 14px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.year-map::-webkit-scrollbar { display: none; }
.year-pill-mini {
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px; font-weight: 700;
  border: 1px dashed var(--line-strong);
  background: var(--surface-2);
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  scroll-snap-align: center;
  transition: all 0.15s;
}
.year-pill-mini.active {
  border-style: solid;
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary-dark);
}
.year-track {
  position: relative;
  display: inline-flex; align-items: flex-start; gap: 22px;
  padding: 8px 16px;
  min-width: 260px;
  user-select: none;
}
.year-track::before {
  content: "";
  position: absolute;
  left: 14px; right: 14px; top: 14px;
  height: 4px; background: var(--line-strong);
  border-radius: 999px;
}
.year-node {
  position: relative;
  display: inline-flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
  padding: 2px 4px; border-radius: 12px;
  transition: all 0.15s;
  scroll-snap-align: center;
  scroll-snap-stop: always;
  z-index: 1;
}
.year-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--surface-solid);
  border: 2px solid var(--line-strong);
}
.year-node.active .year-dot {
  border-color: var(--primary);
  background: white;
  box-shadow: 0 0 0 6px var(--primary-soft);
}
.year-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
.year-node.active .year-label { color: var(--primary-dark); }
.year-count {
  font-size: 10px; font-weight: 700;
  color: var(--primary-dark);
  background: var(--primary-soft);
  border-radius: 999px; padding: 2px 7px;
}
.year-handle {
  position: absolute;
  top: 16px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--primary);
  transform: translate(-50%, -50%);
  box-shadow: 0 8px 18px rgba(0,0,0,0.18);
  border: 3px solid white;
  cursor: grab;
  z-index: 2;
}
.year-handle:active { cursor: grabbing; }
.year-tooltip {
  position: absolute;
  top: -26px;
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 999px;
  transform: translate(-50%, -100%);
  white-space: nowrap;
}
.year-tooltip::after {
  content: "";
  position: absolute;
  left: 50%; bottom: -4px;
  width: 8px; height: 8px;
  background: var(--primary);
  transform: translateX(-50%) rotate(45deg);
}

.postcard-wall {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-top: 2px;
}
.past-year {
  margin-bottom: 6px;
}
.past-year-header {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 800; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-soft);
  background: var(--surface-solid);
  border: 1px solid var(--line);
  padding: 6px 10px; border-radius: 999px;
  margin-bottom: 12px;
}

.postcard-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 16px;
  align-items: start;
}
.postcard-row .postcard { width: 100%; max-width: none; justify-self: stretch; }

.postcard-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 16px;
}

.postcard {
  break-inside: avoid;
  display: inline-block;
  width: 100%;
  padding: 14px 16px 12px;
  margin: 0 0 18px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.98)),
    radial-gradient(circle at 20% 20%, rgba(0,0,0,0.04), transparent 45%);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transform: translateY(0);
  transition: all 0.18s ease;
  position: relative; overflow: hidden;
}
.postcard:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.postcard .stamp {
  position: absolute; top: 10px; right: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 999px; padding: 4px 8px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.05em;
}
.postcard-emoji {
  font-size: 32px; line-height: 1;
  margin-bottom: 10px;
}
.postcard-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.postcard-sub { color: var(--ink-soft); font-size: 12px; margin-bottom: 8px; }
.postcard-memory {
  font-family: 'Caveat', cursive;
  font-size: 20px; color: var(--primary-dark);
  line-height: 1.1;
  min-height: 22px;
}
.postcard-reveal {
  margin-top: 12px;
  background: var(--surface-2);
  border: 1px dashed var(--line-strong);
  border-radius: 12px;
  padding: 10px 12px;
  opacity: 0;
  transform: translateY(6px);
  transition: all 0.18s ease;
  pointer-events: none;
}
.postcard:hover .postcard-reveal,
.postcard.revealed .postcard-reveal {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.postcard-actions {
  display: flex; gap: 8px; margin-top: 10px; align-items: center;
}
.postcard-actions .btn { flex: 1; justify-content: center; }
.postcard-edit {
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 9px; padding: 4px 6px;
  font-size: 11px; font-weight: 700; color: var(--ink-soft);
  cursor: pointer;
}
.postcard-edit:hover { color: var(--primary); border-color: var(--primary); }

@media (max-width: 760px) {
  .trip-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .trip-card { padding: 14px; border-radius: 16px; }
  .trip-card-banner { height: 96px; font-size: 48px; }
  .postcard-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .postcard-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .year-map { width: 100%; }
  .year-track { gap: 16px; padding: 10px 12px 6px; }
  .year-dot { width: 10px; height: 10px; }
}

/* Empty state */
.empty-state {
  padding: 60px 28px; text-align: center;
  background: var(--surface);
  border-radius: 22px; border: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.empty-state .e-emoji { font-size: 64px; margin-bottom: 12px; }
.empty-state h3 { font-size: 22px; margin-bottom: 6px; }
.empty-state p { color: var(--ink-soft); margin: 0 0 18px; }

/* ===========================================================
   BUTTONS
   =========================================================== */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 11px;
  font-weight: 600; font-size: 14px;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s; text-decoration: none;
  color: var(--ink); background: var(--surface-solid);
  border-color: var(--line);
}
.btn:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.btn.primary {
  background: var(--primary); color: white;
  border-color: var(--primary);
}
.btn.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
.btn.accent {
  background: var(--accent); color: white; border-color: var(--accent);
}
.btn.ghost { background: transparent; border-color: transparent; }
.btn.ghost:hover { background: var(--surface-solid); border-color: var(--line); }
.btn.danger { color: #c0392b; border-color: rgba(192,57,43,0.2); }
.btn.danger:hover { background: #fbe9e7; border-color: rgba(192,57,43,0.4); }
.btn svg { width: 16px; height: 16px; }
.btn.lg { padding: 13px 22px; font-size: 15px; }
.btn.sm { padding: 6px 11px; font-size: 12px; border-radius: 8px; }
.btn.sm svg { width: 13px; height: 13px; }

/* ===========================================================
   TRIP DETAIL
   =========================================================== */
.trip-header {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 24px 28px;
  margin-bottom: 22px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(8px);
}
.trip-header::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--primary-soft) 0%, transparent 50%);
  opacity: 0.6; pointer-events: none;
}
.trip-header-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 22px;
  align-items: center;
  position: relative;
}
.trip-emoji {
  font-size: 60px; line-height: 1;
  width: 86px; height: 86px; border-radius: 22px;
  display: grid; place-items: center;
  background: var(--surface-solid);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  border: 1px solid var(--line);
}
.trip-emoji:hover { transform: scale(1.04); }
.avatar-menu {
  position: fixed; z-index: 600;
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.16);
  padding: 6px; min-width: 180px;
  display: flex; flex-direction: column; gap: 2px;
  animation: fadeInScale .12s ease;
}
@keyframes fadeInScale {
  from { opacity: 0; transform: scale(.95); }
  to   { opacity: 1; transform: scale(1); }
}
.avatar-menu button {
  background: none; border: none; text-align: left;
  padding: 9px 13px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: var(--ink); width: 100%;
}
.avatar-menu button:hover { background: var(--accent-bg); }
.avatar-menu button.danger { color: #c0392b; }
.avatar-menu hr { border: none; border-top: 1px solid var(--line); margin: 4px 0; }
.trip-meta { min-width: 0; }
.trip-title {
  font-size: 28px;
  display: flex; align-items: center;
}
.trip-title input {
  font: inherit; background: transparent; border: none;
  padding: 4px 6px; border-radius: 8px; width: 100%;
  border: 1px solid transparent; color: var(--ink);
  min-width: 0;
}
.trip-title input:hover { border-color: var(--line); }
.trip-title input:focus { outline: none; border-color: var(--primary); background: var(--surface-solid); }
.trip-sub {
  color: var(--ink-soft); font-size: 14px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  margin-top: 12px; position: relative;
}
.trip-sub span { display: inline-flex; align-items: center; gap: 5px; }
.trip-sub svg { width: 14px; height: 14px; opacity: 0.7; }
.trip-sub-loc-tz { display: inline-flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.trip-actions-bar {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; margin-top: 14px;
}
.trip-actions-bar .btn { white-space: nowrap; }
.trip-back-btn { white-space: nowrap; flex-shrink: 0; }

.trip-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-top: 18px;
}
.stat {
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
}
.stat-label { font-size: 11px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 20px; font-weight: 700; color: var(--ink); margin-top: 3px; }
.stat-value.accent { color: var(--accent); }
.stat-value.primary { color: var(--primary); }

/* ===========================================================
   TABS
   =========================================================== */
.tabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 14px; padding: 5px;
  margin-bottom: 22px;
}
.tab {
  padding: 10px 16px; border-radius: 10px;
  background: transparent; border: none;
  color: var(--ink-soft); font-weight: 600; font-size: 14px;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
  transition: all 0.15s;
}
.tab:hover { color: var(--ink); background: var(--surface-2); }
.tab.active {
  background: var(--primary); color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.tab svg { width: 15px; height: 15px; }

.panel {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px;
  backdrop-filter: blur(8px);
}
.panel-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.panel-head h3 { font-size: 18px; }
.panel-head .actions { display: flex; gap: 8px; }
.panel-sub { color: var(--ink-soft); font-size: 13px; margin: -8px 0 14px; }

/* ===========================================================
   TABLES
   =========================================================== */
.t-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); background: var(--surface-solid); }
table.t {
  width: 100%; border-collapse: collapse; font-size: 14px;
  min-width: 860px;
}
table.t th, table.t td {
  text-align: left; padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
table.t th {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-soft);
  background: var(--surface-2);
}
table.t tr:last-child td { border-bottom: none; }
table.t td input, table.t td textarea, table.t td select {
  width: 100%; background: transparent;
  border: 1px solid transparent; padding: 6px 8px;
  border-radius: 7px; color: var(--ink);
  font-size: 13px;
}
table.t .col-note { min-width: 220px; width: 28%; }
table.t td.col-note textarea { min-height: 56px; resize: vertical; line-height: 1.4; }
table.t .col-name { min-width: 160px; }
table.t .col-cat  { min-width: 120px; }
table.t .col-cost { min-width: 90px; }
table.t .col-date { min-width: 120px; }
table.t .col-paid { min-width: 130px; }
table.t .col-per  { min-width: 110px; }
table.t .col-item { min-width: 180px; }
table.t .col-status { min-width: 100px; width: 110px; }
table.t .col-link { min-width: 140px; }
table.t td input:hover, table.t td textarea:hover, table.t td select:hover {
  border-color: var(--line);
}
table.t td input:focus, table.t td textarea:focus, table.t td select:focus {
  outline: none; border-color: var(--primary); background: white;
}
table.t td.num { text-align: right; font-variant-numeric: tabular-nums; }
table.t td.num input { text-align: right; }
table.t tfoot td {
  font-weight: 700; background: var(--surface-2);
  border-top: 2px solid var(--line-strong);
}
.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.row-actions .icon-btn { width: 28px; height: 28px; border-radius: 7px; }
.row-actions .icon-btn svg { width: 14px; height: 14px; }

/* ===========================================================
   PACKING
   =========================================================== */
.pack-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.pack-cat {
  background: var(--surface-solid);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
}
.pack-cat-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 8px;
}
.pack-cat-title {
  font-weight: 700; font-size: 14px; color: var(--ink);
  background: transparent; border: 1px solid transparent;
  padding: 4px 6px; border-radius: 6px; width: 100%;
  display: flex; align-items: center; gap: 6px;
}
.pack-cat-title input {
  background: transparent; border: 1px solid transparent;
  padding: 4px 6px; border-radius: 6px; width: 100%;
  font: inherit; color: inherit;
}
.pack-cat-title input:hover { border-color: var(--line); }
.pack-cat-title input:focus { outline: none; border-color: var(--primary); background: white; }
.pack-cat-progress {
  font-size: 11px; color: var(--ink-soft);
  font-weight: 600; white-space: nowrap;
}
.pack-bar {
  height: 4px; background: var(--surface-2);
  border-radius: 999px; overflow: hidden;
  margin-bottom: 10px;
}
.pack-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 999px; transition: width 0.3s;
}
.pack-items { display: flex; flex-direction: column; gap: 3px; }
.pack-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 6px; border-radius: 7px;
  transition: background 0.1s;
}
.pack-item:hover { background: var(--surface-2); }
.pack-item.checked .pack-name {
  text-decoration: line-through; color: var(--ink-soft); opacity: 0.7;
}
.pack-item input[type="checkbox"] {
  width: 17px; height: 17px; accent-color: var(--primary);
  cursor: pointer; flex-shrink: 0;
}
.pack-item input[type="text"] {
  flex: 1; background: transparent; border: none;
  padding: 3px 0; font-size: 13px; color: var(--ink);
  min-width: 0;
}
.pack-item input[type="text"]:focus { outline: none; }
.pack-item .x {
  visibility: hidden;
  background: transparent; border: none; color: var(--ink-soft);
  padding: 2px; cursor: pointer; border-radius: 5px;
  width: 22px; height: 22px; display: grid; place-items: center;
}
.pack-item .x:hover { background: var(--line); color: #c0392b; }
.pack-item:hover .x { visibility: visible; }
.pack-add {
  display: flex; gap: 6px; margin-top: 8px;
}
.pack-add input {
  flex: 1; background: var(--surface-2);
  border: 1px solid var(--line); padding: 7px 10px;
  border-radius: 8px; font-size: 13px; color: var(--ink);
}
.pack-add input:focus { outline: none; border-color: var(--primary); background: white; }
.pack-add button {
  background: var(--primary-soft); color: var(--primary-dark);
  border: 1px solid transparent; border-radius: 8px;
  padding: 6px 10px; font-size: 12px; font-weight: 700;
}
.pack-add button:hover { background: var(--primary); color: white; }

/* ===========================================================
   ITINERARY
   =========================================================== */
.itin-controls {
  display: flex; gap: 8px; margin-bottom: 14px;
  align-items: center; flex-wrap: wrap;
}
.itin-controls label { font-size: 13px; color: var(--ink-soft); }
.itin-controls select, .itin-controls input {
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--ink);
}
.itin-grid-wrap {
  overflow-x: auto;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface-solid);
  -webkit-overflow-scrolling: touch;
}
.itin-grid {
  display: grid; gap: 1px;
  background: var(--line);
  border: 0;
  border-radius: 0;
  overflow: visible;
  min-width: max-content;
}
.itin-cell {
  padding: 8px 10px; min-height: 46px; font-size: 13px;
  position: relative; background: var(--surface-solid);
}
.itin-cell.time {
  background: var(--surface-2) !important;
  font-weight: 600; color: var(--ink-soft);
  font-size: 11px; font-variant-numeric: tabular-nums;
  min-width: 70px; text-align: right; padding-right: 10px;
  display: flex; align-items: flex-start; padding-top: 4px;
  /* Sticky time column */
  position: sticky; left: 0; z-index: 2;
}
/* "Time" header cell — centered, higher z so it covers time labels when scrolling */
.itin-cell.time.itin-time-hdr {
  display: grid; place-items: center;
  text-align: center; padding: 8px 10px;
  font-size: 12px; font-weight: 700;
  z-index: 3;
}
.itin-cell.daycol {
  font-weight: 700; text-align: center;
  background: var(--primary-soft) !important;
  color: var(--primary-dark);
  padding: 12px 10px;
  min-width: 150px;
}
.itin-cell.daycol .dnum { font-size: 11px; opacity: 0.7; }
.itin-cell.daycol .dlabel { font-size: 14px; }
.itin-cell.daycol .ddate { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.itin-cell.daycol input.theme-in {
  margin-top: 6px; width: 100%; background: rgba(255,255,255,0.7);
  border: 1px dashed var(--line-strong); border-radius: 7px;
  padding: 4px 8px; font-size: 12px; text-align: center;
  font-family: 'Caveat', cursive; color: var(--primary-dark);
  font-weight: 700;
}
.itin-cell.daycol input.theme-in:focus { outline: none; border-style: solid; background: white; }
.itin-cell.slot { cursor: text; position: relative; }
.itin-cell.slot .slot-content {
  width: 100%; height: 100%; min-height: 30px;
  background: transparent; border: 1px solid transparent;
  padding: 6px 8px; border-radius: 6px;
  font: inherit; font-size: 13px; color: var(--ink);
  display: flex; flex-direction: column; justify-content: flex-start;
}
.itin-cell.slot textarea {
  width: 100%; background: transparent; border: none;
  padding: 0; border-radius: 0; resize: none;
  font: inherit; font-size: 13px; color: var(--ink);
  overflow: hidden; flex: 1;
}
.itin-cell.slot textarea:focus { outline: none; }
.itin-cell.slot.filled .slot-content {
  background: var(--accent-soft); border-color: transparent;
  border-radius: 8px;
}
.itin-cell.slot .slot-content:hover { border-color: var(--line); }
.itin-cell.slot.filled .slot-content:hover { border-color: var(--accent); }
.itin-cell.slot .slot-time-badge {
  font-size: 10px; color: var(--ink-soft); font-weight: 500;
  margin-bottom: 3px; pointer-events: none; line-height: 1.2;
  font-variant-numeric: tabular-nums;
}
/* Drag handle for spanning */
.itin-cell.slot.filled .drag-handle {
  position: absolute; bottom: 0; left: 10%; right: 10%; height: 8px;
  cursor: ns-resize; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.itin-cell.slot.filled:hover .drag-handle { opacity: 1; }
.drag-handle::after {
  content: ""; width: 30px; height: 3px; border-radius: 3px;
  background: var(--primary); opacity: 0.5;
}
.drag-handle:hover::after { opacity: 1; height: 4px; }
/* Current-time red line */
.itin-grid { position: relative; }
.itin-now-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: #e53935; z-index: 10; pointer-events: none;
}
.itin-now-line::before {
  content: ''; position: absolute;
  left: -1px; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%; background: #e53935;
}
/* Past slot dimming */
.itin-cell.slot.filled.slot-past .slot-content {
  opacity: 0.3; filter: grayscale(0.5);
}
.itin-cell.slot.filled.slot-past textarea { pointer-events: auto; }
@media print { .itin-now-line { display: none !important; } }
/* Reservation badge inside itinerary slot */
.slot-res-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 999px; margin-top: 4px;
  pointer-events: none; white-space: nowrap;
}
.slot-res-badge.booked   { background: #d4edda; color: #1a6630; }
.slot-res-badge.pending  { background: #fff3cd; color: #856404; }
.slot-res-badge.cancelled { background: #f8d7da; color: #842029; }
/* Slot action button bar (res-link + mobile-edit) */
.slot-btns {
  position: absolute; top: 4px; right: 4px;
  display: flex; flex-direction: row; gap: 3px; align-items: center;
}
.slot-res-link-btn {
  display: none;
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 5px; padding: 2px 5px; font-size: 10px;
  cursor: pointer; color: var(--ink-soft); line-height: 1.4;
  transition: all 0.15s;
}
.slot-res-link-btn.linked { display: inline-flex; color: var(--primary); border-color: var(--primary); }
.itin-cell.slot.filled:hover .slot-res-link-btn { display: inline-flex; }
/* Address field inside itinerary slot */
.slot-addr-input {
  width: 100%; margin-top: 5px; padding: 2px 0;
  font-size: 10px; color: var(--ink-soft); background: transparent;
  border: none; border-bottom: 1px dashed var(--line-strong); outline: none;
}
.slot-addr-input::placeholder { color: var(--ink-soft); opacity: 0.55; }
.slot-addr-input:focus { border-color: var(--primary); }
.slot-addr-row { display: flex; align-items: flex-start; gap: 4px; margin-top: 4px; }
.slot-addr-link {
  display: inline-flex; align-items: flex-start; gap: 3px; flex: 1;
  font-size: 10px; color: var(--ink-soft);
  text-decoration: none; line-height: 1.35; word-break: break-word;
}
.slot-addr-link:hover { color: var(--primary); text-decoration: underline; }
.slot-addr-link svg { width: 10px; height: 10px; flex-shrink: 0; margin-top: 1px; }
.slot-addr-clear {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  font-size: 9px; color: var(--ink-soft); padding: 0 2px; line-height: 1;
  opacity: 0; transition: opacity 0.15s;
}
.itin-cell.slot.filled:hover .slot-addr-clear { opacity: 1; }
/* Mobile: tap target for activity dialog */
.itin-cell.slot.filled .mobile-edit-btn {
  display: none;
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 5px; padding: 2px 5px; font-size: 10px;
  cursor: pointer; color: var(--ink-soft); line-height: 1.4;
}
/* Delete button inside itinerary slot */
.slot-delete-btn {
  display: none;
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 5px; padding: 2px 5px; font-size: 10px;
  cursor: pointer; color: var(--ink-soft); line-height: 1.4;
  align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.slot-delete-btn:hover { background: #fbe9e7; color: #c0392b; }
.itin-cell.slot.filled:hover .slot-delete-btn { display: inline-flex; }
@media (hover: none) and (pointer: coarse) {
  .itin-cell.slot.filled .drag-handle { display: none !important; }
  .itin-cell.slot.filled .mobile-edit-btn { display: flex; align-items: center; justify-content: center; }
  .itin-cell.slot.filled .slot-delete-btn { display: inline-flex; }
  /* Always show res-link-btn on touch (only exists in DOM when editing).
     Since the button is already visible before any tap, it can't snap into the tap
     target mid-gesture — eliminating the hover-intercept bug. */
  .itin-cell.slot.filled .slot-res-link-btn { display: inline-flex; }
}
@media (max-width: 600px) {
  /* Single-day mobile view: fit grid to screen, no horizontal scroll */
  .itin-grid { min-width: 0 !important; }
  .itin-grid-wrap { overflow-x: hidden; }
  .itin-cell { min-width: 0; }
  .slot-addr-link { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; display: block; }
}
/* Mobile day navigation */
.itin-day-nav {
  display: none;
  align-items: center; justify-content: space-between;
  margin-bottom: 12px; gap: 8px;
}
@media (max-width: 600px) { .itin-day-nav { display: flex; } }
.itin-day-nav-btn {
  display: flex; align-items: center;
  padding: 7px 11px; border-radius: 9px;
  border: 1px solid var(--line); background: var(--surface-solid);
  font-size: 16px; cursor: pointer; color: var(--ink);
  transition: background 0.15s;
}
.itin-day-nav-btn:hover:not(:disabled) { background: var(--surface-2); }
.itin-day-nav-btn:disabled { opacity: 0.3; cursor: default; }
.itin-day-nav-center {
  display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1;
}
.itin-day-label { font-size: 14px; font-weight: 700; color: var(--primary-dark); line-height: 1.2; }
.itin-day-date-label { font-size: 11px; color: var(--ink-soft); }
.itin-day-summary-btn {
  margin-top: 3px; padding: 4px 10px; border-radius: 7px;
  border: 1px solid var(--line); background: var(--surface-2);
  font-size: 11px; cursor: pointer; color: var(--ink-soft);
}
.itin-day-summary-btn:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-dark); }
/* Activity time dialog */
.activity-time-form { display: flex; flex-direction: column; gap: 14px; }
.activity-time-form .field-row {
  display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 10px;
}
.activity-time-form .field-row label { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
.activity-time-form select {
  padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
  font-size: 14px; background: var(--surface-solid); color: var(--ink);
}

/* ===========================================================
   RESERVATIONS
   =========================================================== */
.res-status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.res-status.pending { background: #fff4d6; color: #946800; }
.res-status.booked { background: #d6f5e0; color: #1d6e3a; }
.res-status.cancelled { background: #fadcd9; color: #a02b25; }
.res-status-cell { position: relative; }
.res-status-select {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; z-index: 1;
}
.res-status { cursor: pointer; }
.res-open-btn {
  display: none;
  padding: 4px 10px; border-radius: 6px;
  background: var(--primary); color: white;
  font-size: 12px; font-weight: 600;
  text-decoration: none; white-space: nowrap;
}
.res-open-btn:hover { opacity: 0.85; }
.res-link-input { display: block; }

/* ===========================================================
   NOTES – sticky board
   =========================================================== */
.sticky-board { display: flex; flex-wrap: wrap; gap: 16px; }
.sticky-note {
  position: relative; width: 200px;
  border-radius: 4px;
  box-shadow: 2px 3px 10px rgba(0,0,0,.13);
  padding: 28px 12px 12px;
  display: flex; flex-direction: column;
}
.sticky-note textarea {
  width: 100%; height: 130px;
  background: transparent; border: none; outline: none;
  font: inherit; font-size: 13px; color: var(--ink);
  resize: none; line-height: 1.6;
}
.sticky-note .note-remove {
  position: absolute; top: 6px; right: 8px;
  background: none; border: none; cursor: pointer;
  color: rgba(0,0,0,.3); font-size: 18px; line-height: 1; padding: 0 2px;
}
.sticky-note .note-remove:hover { color: #ef4444; }
.sticky-add {
  width: 200px; height: 170px;
  border: 2px dashed var(--line); border-radius: 4px;
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
  color: var(--ink-2); font-size: 13px;
  transition: border-color .15s, color .15s;
}
.sticky-add:hover { border-color: var(--primary); color: var(--primary); }

/* ===========================================================
   MODAL
   =========================================================== */
.modal-bg {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(20,20,30,0.45);
  backdrop-filter: blur(4px);
  display: grid; place-items: center;
  padding: 20px;
  animation: fadein 0.15s ease;
}
.login-bg { background: transparent; backdrop-filter: none; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes popin { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal {
  background: white; color: var(--ink);
  border-radius: 18px;
  width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  animation: popin 0.18s ease;
}
.modal-head {
  padding: 18px 22px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 { font-size: 18px; }
.modal-body { padding: 6px 22px 18px; }
.modal-foot {
  padding: 14px 22px 18px; display: flex; gap: 8px;
  justify-content: flex-end; border-top: 1px solid var(--line);
}
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 12px; font-weight: 700;
  color: var(--ink-soft); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 10px;
  font-size: 14px; color: var(--ink); background: var(--surface-2);
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--primary); background: white;
}
.field textarea { min-height: 80px; resize: vertical; }
.emoji-picker {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
  margin-top: 6px;
}
.emoji-picker button {
  font-size: 22px; padding: 7px;
  background: var(--surface-2); border: 1px solid transparent;
  border-radius: 9px;
}
.emoji-picker button:hover { background: var(--primary-soft); border-color: var(--primary); }
.emoji-picker button.sel { background: var(--primary-soft); border-color: var(--primary); }

.share-tabs-wrap { margin: 8px 0 10px; }
.share-tabs-label {
  font-size: 12px; font-weight: 600; color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
}
.share-tabs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
}
.share-tab-chip {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; cursor: pointer;
  padding: 6px 10px; border: 1px solid var(--line);
  border-radius: 8px; background: var(--surface-2);
  user-select: none;
}
.share-tab-chip input { accent-color: var(--primary); cursor: pointer; }
.share-link-row { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
.share-link-input {
  flex: 1; padding: 9px 12px;
  border: 1px solid var(--line); border-radius: 9px;
  font: inherit; font-size: 13px;
  background: var(--surface-2);
  min-width: 0;
}

/* ===========================================================
   FAB (Quick calc)
   =========================================================== */
.fab {
  position: fixed; bottom: 26px; right: 26px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary); color: white;
  border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  cursor: pointer; z-index: 40;
  display: grid; place-items: center;
  font-size: 22px;
  transition: all 0.2s;
}
.fab:hover { transform: scale(1.06); background: var(--primary-dark); }
.fab svg { width: 22px; height: 22px; }

/* ===========================================================
   CALCULATOR
   =========================================================== */
.calc {
  background: white; border-radius: 18px;
  padding: 18px; max-width: 320px;
}
.calc-display {
  background: var(--ink); color: white;
  border-radius: 12px; padding: 14px 16px;
  font-family: 'Plus Jakarta Sans', monospace;
  font-size: 26px; font-weight: 600;
  text-align: right; min-height: 56px;
  margin-bottom: 12px;
  word-break: break-all; overflow-wrap: anywhere;
}
.calc-display .expr {
  font-size: 12px; opacity: 0.5; min-height: 14px;
  margin-bottom: 2px;
}
.calc-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.calc-btn {
  padding: 14px 0; border-radius: 11px;
  background: var(--surface-2); border: 1px solid var(--line);
  font-size: 17px; font-weight: 600; color: var(--ink);
  transition: all 0.1s;
}
.calc-btn:hover { background: var(--primary-soft); }
.calc-btn:active { transform: scale(0.95); }
.calc-btn.op { background: var(--primary-soft); color: var(--primary-dark); }
.calc-btn.eq { background: var(--primary); color: white; border-color: var(--primary); }
.calc-btn.fn { background: var(--accent-soft); color: var(--accent); }
.calc-help {
  margin-top: 10px; padding: 10px 12px;
  background: var(--surface-2); border-radius: 9px;
  font-size: 12px; color: var(--ink-soft);
}

/* ===========================================================
   SETTINGS PANEL
   =========================================================== */
.set-panel { padding: 6px 4px; }
.theme-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-top: 10px;
}
.theme-swatch {
  border: 2px solid transparent; border-radius: 13px;
  padding: 4px; cursor: pointer; transition: all 0.15s;
  background: white;
}
.theme-swatch.sel { border-color: var(--ink); }
.theme-swatch:hover { transform: translateY(-2px); }
.theme-swatch .preview {
  height: 60px; border-radius: 9px; position: relative; overflow: hidden;
}
.theme-swatch .preview::after {
  content: ""; position: absolute; bottom: 6px; left: 6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--p1); border: 2px solid white;
}
.theme-swatch .name { text-align: center; font-size: 12px; font-weight: 600; margin-top: 6px; }

/* ===========================================================
   SHARED HELPERS
   =========================================================== */
.muted { color: var(--ink-soft); }
.text-sm { font-size: 13px; }
.empty-mini {
  padding: 24px; text-align: center;
  color: var(--ink-soft); font-size: 14px;
  background: var(--surface-2); border-radius: 12px;
  border: 1px dashed var(--line-strong);
}
.empty-mini h4 { margin: 0 0 6px; color: var(--ink); font-size: 15px; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.row.between { justify-content: space-between; }
.spacer { flex: 1; }
.kbd {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  background: var(--surface-2); border: 1px solid var(--line);
  font-family: monospace; font-size: 11px;
}
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--primary-soft); color: var(--primary-dark);
  padding: 3px 9px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.tag:hover { background: var(--primary); color: white; }
.tag.is-me {
  background: var(--primary); color: white;
  box-shadow: 0 0 0 2px var(--primary-soft);
}
.tag .me-badge { font-size: 9px; opacity: 0.85; }
.tag .trav-remove-x {
  display: none;
  background: none; border: none; padding: 0 0 0 2px;
  font-size: 13px; line-height: 1; cursor: pointer;
  color: inherit; opacity: 0.7; flex-shrink: 0;
}
.tag .trav-remove-x:hover { opacity: 1; }
.trav-edit-mode .tag .trav-remove-x { display: inline; }
.trav-edit-mode .tag { cursor: default; }
.trav-edit-mode .tag:hover { background: var(--primary-soft); color: var(--primary-dark); }
.trav-edit-mode .tag.is-me:hover { background: var(--primary); color: white; }
.trav-edit-btn {
  padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700;
  border: 1px solid var(--line); background: transparent; cursor: pointer;
  color: var(--ink-soft); transition: all 0.15s;
}
.trav-edit-btn:hover { border-color: var(--primary); color: var(--primary); }
.trav-edit-btn.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary-dark); }

/* Traveler groups */
.group-lane {
  border: 2px dashed var(--line); border-radius: 12px;
  padding: 10px 12px; margin-top: 8px; min-height: 48px;
  transition: border-color 0.15s, background 0.15s;
}
.group-lane.drag-over { border-color: var(--primary); background: var(--primary-soft); }
.group-lane-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.group-lane-name {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--ink-soft); flex: 1;
  background: none; border: none; font-family: inherit; cursor: text; padding: 0;
  min-width: 0;
}
.group-lane-name:focus { outline: none; color: var(--primary); }
.group-chip-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--primary); color: var(--primary);
  background: transparent; cursor: pointer; transition: all 0.15s; user-select: none;
}
.group-chip-btn.selected { background: var(--primary); color: white; }
.group-chip-btn:hover { background: var(--primary); color: white; }
.trav-draggable {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--primary-soft); color: var(--primary-dark);
  padding: 3px 9px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  cursor: grab; user-select: none;
  transition: all 0.15s; margin: 2px;
}
.trav-draggable:active { cursor: grabbing; opacity: 0.6; }
.trav-draggable.is-me { background: var(--primary); color: white; }
.trav-draggable .remove-trav { opacity: 0.5; font-size: 11px; cursor: pointer; margin-left: 2px; }
.trav-draggable .remove-trav:hover { opacity: 1; }
.split-group-row {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
}

/* My Summary panel */
.my-summary {
  background: linear-gradient(135deg, var(--primary-soft) 0%, var(--surface-2) 100%);
  border: 1px solid var(--primary); border-radius: 14px;
  padding: 18px;
}
.overview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}
.overview-my-summary {
  grid-column: 1 / -1;
  order: 100;
}
@media (max-width: 600px) {
  .overview-travelers { order: 1; }
  .overview-my-summary { order: 2; }
  .overview-budget { order: 3; }
  .overview-themes { order: 4; }
  .overview-needs { order: 5; }
}
.my-summary-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.my-summary-head h4 { font-size: 15px; color: var(--primary-dark); margin: 0; }
.my-summary-stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 14px;
}
.my-stat {
  background: var(--surface-solid); border: 1px solid var(--line);
  border-radius: 10px; padding: 10px 12px; text-align: center;
}
.my-stat .label { font-size: 10px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.my-stat .value { font-size: 18px; font-weight: 700; margin-top: 3px; }
.my-debts { margin-top: 10px; }
.my-debts-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft); margin-bottom: 6px; }
.my-debt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-radius: 8px; font-size: 13px;
  background: var(--surface-solid); border: 1px solid var(--line);
  margin-bottom: 4px;
}
.my-debt-row .name { font-weight: 600; }
.my-debt-row .amt { font-weight: 700; font-variant-numeric: tabular-nums; }
.my-debt-row .amt.owed-to-me { color: var(--primary); }
.my-debt-row .amt.i-owe { color: #c0392b; }
.split-summary {
  display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  margin-top: 14px;
}
.split-pill {
  background: var(--surface-2);
  border: 1px solid var(--line); border-radius: 11px;
  padding: 10px 12px;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.split-pill:hover {
  border-color: var(--primary); background: var(--primary-soft);
  transform: translateY(-1px); box-shadow: var(--shadow-sm);
}
.split-pill .who { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.split-pill .amt { font-size: 18px; font-weight: 700; color: var(--ink); margin-top: 2px; }

/* Person detail dialog */
.person-detail-expenses { margin-top: 12px; }
.person-detail-expenses table { width: 100%; border-collapse: collapse; font-size: 13px; }
.person-detail-expenses th {
  text-align: left; padding: 8px 10px; font-weight: 600; font-size: 12px;
  color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 2px solid var(--line-strong);
}
.person-detail-expenses th.num { text-align: right; }
.person-detail-expenses td { padding: 8px 10px; border-bottom: 1px solid var(--line); }
.person-detail-expenses td.num { text-align: right; font-variant-numeric: tabular-nums; }
.person-detail-expenses td.cat-badge span {
  display: inline-block; background: var(--primary-soft); color: var(--primary-dark);
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600;
}
.person-detail-expenses tfoot td { font-weight: 700; border-top: 2px solid var(--line-strong); border-bottom: none; }
.person-detail-summary {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px;
}
.person-detail-stat {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 11px; padding: 12px; text-align: center;
}
.person-detail-stat .label { font-size: 11px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.person-detail-stat .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
.person-detail-stat .value.positive { color: var(--primary); }
.person-detail-stat .value.negative { color: #c0392b; }
.person-detail-stat .value.even { color: var(--ink-soft); }

/* ===========================================================
   SPLIT EDITOR
   =========================================================== */
.split-methods {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  margin-bottom: 6px;
}
@media (max-width: 600px) {
  .split-methods { grid-template-columns: repeat(3, 1fr); }
}
.split-method {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 10px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
}

// -------- TIME SLOT HELPERS --------
function parseTime12(str) {
  const m = (str || "").match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const p = m[3].toUpperCase();
  if (p === 'PM' && h !== 12) h += 12;
  if (p === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}
function formatTime12(minutes) {
  const h24 = Math.floor(minutes / 60) % 24;
  const min = minutes % 60;
  const p = h24 < 12 ? 'AM' : 'PM';
  const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
  return `${h12}:${String(min).padStart(2,'0')} ${p}`;
}
function nextTimeStr(timeStr) {
  const min = parseTime12(timeStr);
  if (min === null) return timeStr;
  return formatTime12(min + 60);
}
// Return the label for an exclusive-end slot index (slots[idx] or computed next time)
function slotEndLabel(slots, idx) {
  return idx < slots.length ? slots[idx] : nextTimeStr(slots[slots.length - 1]);
}
// Generate all half-hour time strings for the range picker dropdowns
function allHalfHourTimes() {
  const times = [];
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) times.push(formatTime12(h * 60 + m));
  }
  return times;
}
// Generate slot array from inclusive start to inclusive last-slot end
function generateSlotsFromRange(startStr, lastStr, intervalMin) {
  const start = parseTime12(startStr);
  const last = parseTime12(lastStr);
  if (start === null || last === null || last < start) return [];
  const slots = [];
  for (let m = start; m <= last; m += intervalMin) slots.push(formatTime12(m));
  return slots;
}

function parseSlotTime(dayDate, timeStr) {
  if (!timeStr) return null;
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ampm = m[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  const dt = new Date(dayDate);
  dt.setHours(h, min, 0, 0);
  return dt;
}

function applyItineraryTimeState() {
  const t = currentTrip();
  if (!t || !t.startDate) return;
  const now = new Date();
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const startDate = parseDate(t.startDate);
  if (!startDate) return;
  const todayMidnight = new Date(now.toISOString().slice(0, 10) + 'T00:00:00');

  document.querySelectorAll('.itin-cell.slot.filled').forEach(cell => {
    const dIdx = parseInt(cell.dataset.didx);
    const sIdx = parseInt(cell.dataset.sidx);
    const span = parseInt(cell.dataset.span) || 1;
    const dayDate = new Date(startDate);
    dayDate.setDate(dayDate.getDate() + dIdx);
    // Days before today are always past
    if (dayDate < todayMidnight) { cell.classList.add('slot-past'); return; }
    const startDt = parseSlotTime(dayDate, slots[sIdx]);
    const endDt   = parseSlotTime(dayDate, slots[Math.min(sIdx + span, slots.length - 1)]);
    if (!startDt || !endDt) return;
    const isOngoing = startDt <= now && now < endDt;
    cell.classList.toggle('slot-past', !isOngoing && endDt <= now);
  });
}

function renderCurrentTimeLine() {
  document.querySelectorAll('.itin-now-line').forEach(el => el.remove());
  const t = currentTrip();
  if (!t || !t.startDate) return;
  const now = new Date();
  const slots = t.timeSlots || TIME_SLOTS_DEFAULT;
  const startDate = parseDate(t.startDate);
  if (!startDate) return;

  // Find today's day column index
  const todayStr = now.toISOString().slice(0, 10);
  let todayDIdx = -1;
  for (let i = 0; i < t.itinerary.length; i++) {
    const d = new Date(startDate); d.setDate(d.getDate() + i);
    if (d.toISOString().slice(0, 10) === todayStr) { todayDIdx = i; break; }
  }
  if (todayDIdx === -1) return;

  const grid = document.querySelector('.itin-grid');
  if (!grid) return;
  // Time-column cells (skip "Time" header)
  const timeCells = Array.from(grid.querySelectorAll('.itin-cell.time'))
    .filter(c => c.textContent.trim() !== 'Time');
  if (!timeCells.length) return;

  const dayDate = new Date(startDate);
  dayDate.setDate(dayDate.getDate() + todayDIdx);
  const slotDates = slots.map(s => parseSlotTime(dayDate, s));
  const gridRect = grid.getBoundingClientRect();
  let yPos = null;

  if (now <= slotDates[0]) {
    yPos = timeCells[0].getBoundingClientRect().top - gridRect.top;
  } else if (now >= slotDates[slotDates.length - 1]) {
    yPos = timeCells[timeCells.length - 1].getBoundingClientRect().bottom - gridRect.top;
  } else {
    for (let i = 0; i < slotDates.length - 1; i++) {
      if (slotDates[i] && slotDates[i + 1] && slotDates[i] <= now && now < slotDates[i + 1]) {
        const r1 = timeCells[i].getBoundingClientRect();
        const r2 = timeCells[i + 1].getBoundingClientRect();
        const frac = (now - slotDates[i]) / (slotDates[i + 1] - slotDates[i]);
        yPos = (r1.top - gridRect.top) + frac * (r2.top - r1.top);
        break;
      }
    }
  }

  if (yPos === null) return;
  const line = document.createElement('div');
  line.className = 'itin-now-line';
  line.style.top = `${yPos}px`;
  grid.appendChild(line);
}

// -------- STATE / STORAGE --------
const DEFAULT_STATE = () => ({ trips: [], settings: { theme: "beach", currency: "USD" } });

async function loadState() {
  try {
    const res = await fetch("/api/data", {
      headers: { "Authorization": `Bearer ${getToken()}` },
    });
    if (res.status === 401) { clearToken(); return DEFAULT_STATE(); }
    if (!res.ok) throw new Error("fetch failed");
    const s = await res.json();
    s.trips = s.trips || [];
    s.trips.forEach(t => {
      if (!t.driveFolder) t.driveFolder = { folderId: null, thumbnailId: null, thumbnailUrl: null };
      else if (!('thumbnailUrl' in t.driveFolder)) t.driveFolder.thumbnailUrl = null;
    });
    s.settings = Object.assign({ theme: "beach", currency: "USD" }, s.settings || {});
    return s;
  } catch {
    return DEFAULT_STATE();
  }
}
function saveState() {
  if (isShareMode() && window._shareToken) {
    const trip = currentTrip();
    if (!trip) return;
    fetch(`/api/share/${window._shareToken}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ trip }),
    }).catch(console.error);
    return;
  }

  const token = getToken();
  if (!token) return;
  fetch("/api/data", {
    method: "PUT",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(state),
  }).catch(console.error);
}

// -------- HELPERS --------
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  const cur = state.settings.currency || "USD";
  if (n === null || n === undefined || isNaN(n)) return "—";
  try { return new Intl.NumberFormat(undefined, { style:"currency", currency: cur, maximumFractionDigits: 2 }).format(n); }
  catch { return "$" + Number(n).toFixed(2); }
}
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function parseDate(d) { if (!d) return null; const x = new Date(d + "T00:00:00"); return isNaN(x) ? null : x; }
function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}
function daysUntil(dateStr) {
  const d = parseDate(dateStr); if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return daysBetween(today, d);
}
function fmtDate(dateStr, opts={month:"short",day:"numeric",year:"numeric"}) {
  const d = parseDate(dateStr); if (!d) return "";
  return d.toLocaleDateString(undefined, opts);
}
function fmtBookingTime(val) {
  if (!val) return "";
  const d = new Date(val);
  if (isNaN(d)) return val;
  const hasTime = val.includes("T") && !val.endsWith("T");
  if (hasTime) {
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) + " " +
           d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  }
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function tripDuration(t) {
  if (!t.startDate || !t.endDate) return null;
  return daysBetween(parseDate(t.startDate), parseDate(t.endDate)) + 1;
}

function setTheme(themeId) {

// -------- TRIP MODEL --------
function newTrip(data) {
  if (!guardEdit()) return null;
  const start = data.startDate ? parseDate(data.startDate) : null;
  const end = data.endDate ? parseDate(data.endDate) : null;
  const days = (start && end) ? daysBetween(start, end) + 1 : 3;
  const trip = {
    id: uid(),
    title: data.title || "New Trip",
    destination: data.destination || "",
    emoji: data.emoji || "🏖️",
    startDate: data.startDate || "",
    endDate: data.endDate || "",
    travelers: (data.travelers || "").split(",").map(s => s.trim()).filter(Boolean),
    budget: data.budget ? parseFloat(data.budget) : null,
    expenses: [],
    packing: data.useTemplate
      ? PACKING_TEMPLATE.map(c => ({ id: uid(), name: c.name, items: c.items.map(i => ({ id: uid(), name: i, packed: false })) }))
      : [],
    itinerary: Array.from({ length: days }, (_, i) => ({
      id: uid(),
      theme: "",
      slots: TIME_SLOTS_DEFAULT.map(t => ({ time: t, activity: "" }))
    })),
    reservations: [],
    notes: [],
    timeSlots: TIME_SLOTS_DEFAULT.slice(),
    timezone: "",
    createdAt: new Date().toISOString(),
    driveFolder: { folderId: null, thumbnailId: null, thumbnailUrl: null },
    destinationCoords: null
  };
  state.trips.push(trip); saveState(); return trip;
}

function deleteTrip(id) {
  state.trips = state.trips.filter(t => t.id !== id);
  saveState();
}
function duplicateTrip(id, ev) {
  if (ev) ev.stopPropagation();
  const src = state.trips.find(t => t.id === id);
  if (!src) return;
  const clone = JSON.parse(JSON.stringify(src));
  clone.id = uid();
  clone.title = src.title + " (copy)";
  clone.startDate = "";
  clone.endDate = "";
  clone.expenses = [];
  clone.createdAt = new Date().toISOString();
  // Reset packing items to unpacked
  (clone.packing || []).forEach(cat => cat.items.forEach(item => { item.packed = false; item.id = uid(); }));
  state.trips.push(clone);
  saveState();
  render();
}
function currentTrip() { return state.trips.find(t => t.id === route.tripId); }

// -------- ROUTING --------
function goHome() { travEditMode = false; route = { view: "home", tripId: null, tab: "overview" }; render(); }
function openTrip(id, tab) { itinMobileDay = 0; travEditMode = false; route = { view: "trip", tripId: id, tab: tab || "overview" }; render(); }
function setTab(t) { travEditMode = false; route.tab = t; render(); }
function setPastYearFilter(y) {
  pastYearFilter = y;
  render();
  requestAnimationFrame(() => scrollPastYearIntoView(y));
}
function scrollPastYearIntoView(y) {
  if (y === "all") {
    const root = document.getElementById("past-root");
    if (root) root.scrollIntoView({ behavior: "smooth", block: "start" });
    return;
  }
  const el = document.getElementById(`past-year-${y}`);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

// -------- RENDER --------
function render() {
  document.documentElement.setAttribute("data-theme", state.settings.theme || "beach");
  stopTzClock(); stopItinClock();
  const root = document.getElementById("app-root");
  if (route.view === "home") root.innerHTML = renderHome();
  else if (route.view === "trip") root.innerHTML = renderTrip();
  document.querySelectorAll("textarea.autogrow").forEach(autoGrow);
  if (route.view === "trip" && currentTrip()?.timezone) startTzClock();
  if (route.view === "trip" && route.tab === "itinerary") startItinClock();
  if (route.view === "home") setupPastYearScrubber();
}

function autoGrow(el) {
  const adjust = () => { el.style.height = "auto"; el.style.height = (el.scrollHeight + 2) + "px"; };
  el.addEventListener("input", adjust); adjust();
}

// -------- ON THIS DAY --------
function getOnThisDayTrips() {
  const today = new Date();
  const yy = today.getFullYear();
  // Normalize today to a comparable number (month*100 + day)
  const todayMD = today.getMonth() * 100 + today.getDate();
  return state.trips.filter(t => {
    if (!t.startDate) return false;
    const start = parseDate(t.startDate);
    if (!start || start.getFullYear() >= yy) return false;
    const end = t.endDate ? parseDate(t.endDate) : start;
    // Check if today's m/d falls within the trip's m/d range (ignoring year)
    const startMD = start.getMonth() * 100 + start.getDate();
    const endMD = (end || start).getMonth() * 100 + (end || start).getDate();
    return todayMD >= startMD && todayMD <= endMD;
  });
}

function renderOnThisDay() {
  const trips = getOnThisDayTrips();
  if (!trips.length) return "";
  const today = new Date();
  if (trips.length === 1) {
    const t = trips[0];
    const yearsAgo = today.getFullYear() - parseDate(t.startDate).getFullYear();
    return `<div class="on-this-day-banner" onclick="openTrip('${t.id}')">
      <div style="font-size:28px;flex-shrink:0;">🗓️</div>
      <div class="on-this-day-content">
        <div class="on-this-day-label">On this day, ${yearsAgo} year${yearsAgo === 1 ? "" : "s"} ago</div>
        <div class="on-this-day-title">${escapeHtml(t.title)}</div>
        <div class="on-this-day-sub">${t.destination ? escapeHtml(t.destination) : ""}${t.memoryLine ? " · " + escapeHtml(t.memoryLine) : ""}</div>
      </div>
      <div style="font-size:20px;color:var(--ink-soft);">→</div>
    </div>`;
  }
  const chips = trips.map(t => {
    const yearsAgo = today.getFullYear() - parseDate(t.startDate).getFullYear();
    return `<div class="on-this-day-chip" onclick="openTrip('${t.id}')">
      <div class="on-this-day-label" style="margin-bottom:2px;">${yearsAgo}yr ago</div>
      <div style="font-size:13px;font-weight:600;">${escapeHtml(t.title)}</div>
      ${t.destination ? `<div style="font-size:12px;color:var(--ink-soft);">${escapeHtml(t.destination)}</div>` : ""}
    </div>`;
  }).join("");
  return `<div style="margin-bottom:16px;">
    <div class="on-this-day-label" style="margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--primary,#e07b39);">🗓️ On this day</div>
    <div class="on-this-day-multi">${chips}</div>
  </div>`;
}

// -------- TRAVELER GROUPS --------
function openGroupsModal(tripId) {
  renderGroupsModal(tripId);
}

function renderGroupsModal(tripId) {
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t) return;
  t.groups = t.groups || [];
  const travelers = t.travelers || [];

  const grouped = new Set(t.groups.flatMap(g => g.members.filter(p => travelers.includes(p))));
  const ungrouped = travelers.filter(p => !grouped.has(p));

  const lanesHtml = t.groups.map((g, gi) => {
    const members = g.members.filter(p => travelers.includes(p));
    return `
      <div class="group-lane" id="glane-${gi}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="dropTravelerIntoGroup(event,${gi},'${escapeAttr(tripId)}')">
        <div class="group-lane-header">
          <input class="group-lane-name" value="${escapeAttr(g.name)}"
                 onchange="renameGroup(${gi},'${escapeAttr(tripId)}',this.value)"
                 onblur="renameGroup(${gi},'${escapeAttr(tripId)}',this.value)" />
          <button class="btn sm ghost" style="padding:2px 8px;font-size:11px;color:#c0392b;"
                  onclick="deleteGroup(${gi},'${escapeAttr(tripId)}')">Remove</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;min-height:28px;">
          ${members.length ? members.map(p => travDraggableChip(p, gi)).join("") : `<span class="muted text-sm">Drag travelers here</span>`}
        </div>
      </div>`;
  }).join("");

  const ungroupedHtml = `
    <div class="group-lane" id="glane-ungrouped" style="border-style:solid;background:var(--surface-2);"
         ondragover="event.preventDefault();this.classList.add('drag-over')"
         ondragleave="this.classList.remove('drag-over')"
         ondrop="dropTravelerIntoGroup(event,-1,'${escapeAttr(tripId)}')">
      <div class="group-lane-header">
        <span class="group-lane-name" style="cursor:default;">Ungrouped</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;min-height:28px;">
        ${ungrouped.length ? ungrouped.map(p => travDraggableChip(p, -1)).join("") : `<span class="muted text-sm" style="font-size:12px;">All travelers are in groups</span>`}
      </div>
    </div>`;

  showModal({
    title: "Manage groups",
    size: "sm",
    body: `
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;">
        Drag travelers between groups. Click a group name to rename it.
      </div>
      ${ungroupedHtml}
      ${lanesHtml}
      <button class="btn sm" style="margin-top:12px;width:100%;" onclick="addGroup('${escapeAttr(tripId)}')">+ New group</button>
    `,
    actions: [{ label: "Done", primary: true, onClick: () => { closeModal(); render(); } }],
  });
}

function travDraggableChip(name, groupIndex) {
  return `<span class="trav-draggable" draggable="true"
    ondragstart="event.dataTransfer.setData('text/plain','${escapeAttr(name)}|${groupIndex}')">${escapeHtml(name)}</span>`;
}

function dropTravelerIntoGroup(event, targetGroupIndex, tripId) {
  event.preventDefault();
  document.querySelectorAll('.group-lane').forEach(el => el.classList.remove('drag-over'));
  const data = event.dataTransfer.getData('text/plain');
  const [name, fromStr] = data.split('|');
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t || !name) return;
  t.groups = t.groups || [];

  // Remove from current group (if any)
  t.groups.forEach(g => { g.members = g.members.filter(m => m !== name); });

  // Add to target group
  if (targetGroupIndex >= 0 && t.groups[targetGroupIndex]) {
    if (!t.groups[targetGroupIndex].members.includes(name)) {
      t.groups[targetGroupIndex].members.push(name);
    }
  }
  saveState();
  renderGroupsModal(tripId);
}

function addGroup(tripId) {
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t) return;
  t.groups = t.groups || [];
  t.groups.push({ id: uid(), name: `Group ${t.groups.length + 1}`, members: [] });
  saveState();
  renderGroupsModal(tripId);
}

function renameGroup(groupIndex, tripId, newName) {
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t || !t.groups[groupIndex]) return;
  t.groups[groupIndex].name = (newName || "").trim() || t.groups[groupIndex].name;
  saveState();
}

function deleteGroup(groupIndex, tripId) {
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t) return;
  t.groups.splice(groupIndex, 1);
  saveState();
  renderGroupsModal(tripId);
}

function toggleTravEditMode() {
  if (!guardEdit()) return;
  travEditMode = !travEditMode;
  render();
}
function addTraveler(name) {
  if (!guardEdit()) return;
  name = (name || "").trim(); if (!name) return;
  const t = currentTrip(); if (!t) return;
  t.travelers = t.travelers || [];
  t.travelers.push(name); saveState(); render();
}
function removeTraveler(name) {
  if (!guardEdit()) return;
  const t = currentTrip(); if (!t) return;
  t.travelers = (t.travelers || []).filter(p => p !== name);
  if (getMyTraveler(t.id) === name) localStorage.removeItem("myTraveler_" + t.id);
  saveState(); render();
}
function getMyTraveler(tripId) {
  return localStorage.getItem("myTraveler_" + tripId) || null;
}
function setMyTraveler(name) {
  const t = currentTrip(); if (!t) return;
  const current = getMyTraveler(t.id);
  if (isShareMode() && current && current !== name) {
    showModal({
      title: "Switch traveler?",
      size: "sm",
      body: `<p>You're currently viewing as <strong>${escapeHtml(current)}</strong>. Switch to <strong>${escapeHtml(name)}</strong>?</p>`,
      actions: [
        { label: "Switch", primary: true, onClick: () => { localStorage.setItem("myTraveler_" + t.id, name); closeModal(); render(); } },
        { label: "Cancel", onClick: closeModal }
      ]
    });
    return;
  }
  if (current === name) {
    localStorage.removeItem("myTraveler_" + t.id);
  } else {
    localStorage.setItem("myTraveler_" + t.id, name);
  }
  render();
}
function showTravelerSelectModal(trip) {
  const travelers = trip.travelers || [];
  const chipsHtml = travelers.map(p => `
    <button class="btn" style="margin:4px 4px 4px 0;"
      onclick="selectTravelerFromModal('${escapeAttr(p)}', '${escapeAttr(trip.id)}')">
      ${escapeHtml(p)}
    </button>`).join("");
  showModal({
    title: "Who are you?",
    size: "sm",
    body: `<p style="margin-bottom:12px;color:var(--ink-soft);">Select your name to track your personal expense summary.</p>
      <div style="display:flex;flex-wrap:wrap;">${chipsHtml}</div>`,
    actions: [{ label: "Skip", onClick: closeModal }],
    dismissOnOverlay: false
  });
}
function selectTravelerFromModal(name, tripId) {
  localStorage.setItem("myTraveler_" + tripId, name);
  closeModal();
  render();
}
function computeMyData(t) {
  const me = getMyTraveler(t.id);
  if (!me) return null;
  const expenses = t.expenses || [];
  const travelers = t.travelers || [];
  let myOwed = 0, myPaid = 0, mySettled = 0, myUnsettled = 0;
  // Track net debts: positive = they owe me, negative = I owe them
  const netWith = {};
  travelers.forEach(p => { if (p !== me) netWith[p] = 0; });

  expenses.forEach(e => {
    const cost = parseFloat(e.cost) || 0;
    const participants = expenseParticipants(e, travelers);
    const payers = e.paidBy && e.paidBy.length ? e.paidBy : [];
    const isPayer = payers.includes(me);
    if (!participants.includes(me) && !isPayer) return;
    const split = computeSplit(e, travelers);
    const myShare = participants.includes(me) ? (split[me] || 0) : 0;
    myOwed += myShare;

    if (isPayer) myPaid += cost / payers.length;

    const settled = e.settledBy || [];
    const iHaveSettled = isPayer || settled.includes(me);
    if (iHaveSettled) mySettled += myShare;
    else myUnsettled += myShare;

    // Compute who owes whom, respecting settlements
    if (isPayer) {
      // I paid: only count participants who haven't settled with me yet
      participants.forEach(p => {
        if (p === me || netWith[p] === undefined) return;
        if (!payers.includes(p) && !settled.includes(p)) {
          netWith[p] += split[p] || 0;
        }
      });
    } else if (payers.length > 0 && !iHaveSettled) {
      // Someone else paid and I haven't settled: I still owe them
      payers.forEach(p => {
        if (p === me || netWith[p] === undefined) return;
        netWith[p] -= myShare / payers.length;
      });
    }
  });

  // Aggregate into owesMe / iOwe lists
  const owesMe = [], iOwe = [];
  Object.entries(netWith).forEach(([p, v]) => {
    if (v > 0.01) owesMe.push({ name: p, amount: v });
    else if (v < -0.01) iOwe.push({ name: p, amount: -v });
  });
  owesMe.sort((a, b) => b.amount - a.amount);
  iOwe.sort((a, b) => b.amount - a.amount);

  // Net balance: positive = owed to me, negative = I owe
  const net = Object.values(netWith).reduce((s, v) => s + v, 0);
  return { myOwed, myPaid, mySettled, myUnsettled, owesMe, iOwe, net };
}
