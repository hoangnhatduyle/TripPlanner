function generateTripCard(t) {
  const W = 1200, H = 630, PAD = 56;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const FONT = "system-ui, -apple-system, 'Segoe UI', sans-serif";

  function drawCard() {
    // Background
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, "#fdf6ee"); bg.addColorStop(1, "#fff0dc");
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Left image panel — rounded rect, inset with padding
    const imgX = PAD, imgY = PAD, imgW = Math.round(W * 0.44) - PAD, imgH = H - PAD * 2, r = 24;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(imgX + r, imgY);
    ctx.lineTo(imgX + imgW - r, imgY); ctx.arcTo(imgX + imgW, imgY, imgX + imgW, imgY + r, r);
    ctx.lineTo(imgX + imgW, imgY + imgH - r); ctx.arcTo(imgX + imgW, imgY + imgH, imgX + imgW - r, imgY + imgH, r);
    ctx.lineTo(imgX + r, imgY + imgH); ctx.arcTo(imgX, imgY + imgH, imgX, imgY + imgH - r, r);
    ctx.lineTo(imgX, imgY + r); ctx.arcTo(imgX, imgY, imgX + r, imgY, r);
    ctx.closePath(); ctx.clip();

    const pg = ctx.createLinearGradient(imgX, imgY, imgX + imgW, imgY + imgH);
    pg.addColorStop(0, "#e07b39"); pg.addColorStop(1, "#f5a55a");
    ctx.fillStyle = pg; ctx.fillRect(imgX, imgY, imgW, imgH);

    if (canvas._thumbImg) {
      const img = canvas._thumbImg;
      const scale = Math.max(imgW / img.width, imgH / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      ctx.drawImage(img, imgX + (imgW - dw) / 2, imgY + (imgH - dh) / 2, dw, dh);
    } else {
      ctx.font = `${Math.round(imgH * 0.38)}px serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(t.emoji || "✈️", imgX + imgW / 2, imgY + imgH / 2);
    }
    ctx.restore();

    // Right panel
    const tx = imgX + imgW + PAD + 8, tw = W - tx - PAD;
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    let cy = 140;

    ctx.fillStyle = "#1a1a1a";
    ctx.font = `bold 68px ${FONT}`;
    let title = t.title || "My Trip";
    while (ctx.measureText(title).width > tw && title.length > 2) title = title.slice(0, -1);
    if (title !== t.title) title = title.trimEnd() + "…";
    ctx.fillText(title, tx, cy); cy += 78;

    if (t.destination) {
      ctx.fillStyle = "#e07b39";
      ctx.font = `bold 36px ${FONT}`;
      let dest = t.destination;
      while (ctx.measureText(dest).width > tw && dest.length > 2) dest = dest.slice(0, -1);
      if (dest !== t.destination) dest = dest.trimEnd() + "…";
      ctx.fillText(dest, tx, cy); cy += 52;
    }

    if (t.startDate) {
      ctx.fillStyle = "#666";
      ctx.font = `500 30px ${FONT}`;
      const ds = fmtDate(t.startDate, { month: "short", day: "numeric", year: "numeric" }) +
        (t.endDate ? " – " + fmtDate(t.endDate, { month: "short", day: "numeric", year: "numeric" }) : "");
      ctx.fillText(ds, tx, cy); cy += 48;
    }

    cy += 16;
    ctx.strokeStyle = "#e5d5c5"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx, cy); ctx.lineTo(W - PAD, cy); ctx.stroke(); cy += 36;

    const statParts = [];
    if ((t.travelers || []).length) statParts.push(`👥 ${t.travelers.length} traveler${t.travelers.length === 1 ? "" : "s"}`);
    const spend = (t.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);
    if (spend > 0) statParts.push(`💰 ${fmtCurrency(spend)}`);
    const dur = tripDuration(t);
    if (dur) statParts.push(`📅 ${dur} day${dur === 1 ? "" : "s"}`);
    if (statParts.length) {
      ctx.fillStyle = "#555"; ctx.font = `500 28px ${FONT}`;
      ctx.fillText(statParts.join("   ·   "), tx, cy);
    }

    ctx.fillStyle = "#bba898"; ctx.font = `400 22px ${FONT}`;
    ctx.fillText("wanderwise ~ trip planner", tx, H - PAD + 14);
  }

  drawCard();

  if (t.driveFolder?.thumbnailId) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => { canvas._thumbImg = img; drawCard(); const p = document.getElementById("hc-preview"); if (p) p.src = canvas.toDataURL("image/png"); };
    img.onerror = () => { /* proxy failed, draw without photo */ drawCard(); };
    img.src = `/api/drive/thumb?fileId=${encodeURIComponent(t.driveFolder.thumbnailId)}&sz=600`;
  }

  return canvas;
}

function downloadTripCard(canvas, title) {
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = `${(title || "trip").replace(/[^a-z0-9]/gi, "-").toLowerCase()}-card.png`;
  a.click();
}

function openCalc() {

        <div class="calc-display">
          <div class="expr" id="calc-expr"></div>

        <div class="calc-grid">
          ${"AC,÷,×,⌫,7,8,9,−,4,5,6,+,1,2,3,=,0,.,(,)".split(",").map((b,i) => {
            const cls = ["÷","×","−","+","="].includes(b) ? (b==="=" ? "eq" : "op") : (b === "AC" || b === "⌫" || b === "(" || b === ")" ? "fn" : "");
            return `<button class="calc-btn ${cls}" onclick="calcPress('${b}')">${b}</button>`;
          }).join("")}
        </div>
        <div class="calc-help">
          <strong>Power tools:</strong> use buttons above, or type math directly.<br>
          Split by N people: e.g. <span class="kbd">450 / 8</span> → ${fmtCurrency(56.25)}<br>
          Press <span class="kbd">Enter</span> to compute.
        </div>
      </div>
    `,
    actions: [{ label: "Close", onClick: closeModal }]
  });
  // attach keyboard listener temporarily
  document.addEventListener("keydown", calcKey);
}
function closeCalcCleanup() { document.removeEventListener("keydown", calcKey); }
function calcKey(e) {
  if (!document.querySelector(".calc")) { closeCalcCleanup(); return; }
  const k = e.key;
  if (/[0-9.+\-*/()]/.test(k)) { calcAppend(k); e.preventDefault(); }
  else if (k === "Enter" || k === "=") { calcEval(); e.preventDefault(); }
  else if (k === "Backspace") { calcBackspace(); e.preventDefault(); }
  else if (k === "Escape") { closeModal(); closeCalcCleanup(); }
}
function calcPress(b) {
  if (b === "AC") { calcState.expr = ""; calcState.just = false; }
  else if (b === "⌫") calcBackspace();
  else if (b === "=") calcEval();
  else if (b === "÷") calcAppend("/");
  else if (b === "×") calcAppend("*");
  else if (b === "−") calcAppend("-");
  else calcAppend(b);
  calcRefresh();
}
function calcAppend(s) {
  if (calcState.just && /[0-9.]/.test(s)) calcState.expr = "";
  calcState.expr += s; calcState.just = false; calcRefresh();
}
function calcBackspace() { calcState.expr = calcState.expr.slice(0, -1); calcRefresh(); }
function calcEval() {
  if (!calcState.expr) return;
  try {
    if (!/^[\d\s+\-*/().]+$/.test(calcState.expr)) { alert("Invalid expression"); return; }
    const v = Function('"use strict";return (' + calcState.expr + ')')();
    document.getElementById("calc-expr").textContent = calcState.expr + " =";
    calcState.expr = String(v); calcState.just = true; calcRefresh();
  } catch (e) { alert("Invalid expression"); }
}
function calcRefresh() {
  const v = document.getElementById("calc-val");
  const x = document.getElementById("calc-expr");
  if (!v) return;
  v.textContent = calcState.expr || "0";
  if (!calcState.just) x.textContent = "";
}

// -------- SETTINGS / EXPORT-IMPORT --------
function openSettings() {
  const stats = {
    trips: state.trips.length,
    expenses: state.trips.reduce((s,t)=>s + (t.expenses||[]).length, 0),
    items: state.trips.reduce((s,t)=>s + (t.packing||[]).reduce((a,c)=>a+c.items.length,0), 0)
  };
  showModal({
    title: "Settings",
    body: `
      <div class="set-panel">
        <div class="field">
          <label>Color theme</label>
          <div class="theme-grid">
            ${THEMES.map(th => `
              <div class="theme-swatch ${state.settings.theme===th.id?'sel':''}" onclick="pickTheme('${th.id}')"
                   style="--p1:${th.p1};--p2:${th.p2};">
                <div class="preview" style="background:${th.bg};">
                  <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;">${th.emoji}</div>
                  <div style="position:absolute;bottom:6px;right:6px;width:18px;height:18px;border-radius:50%;background:${th.p2};border:2px solid white;"></div>
                </div>
                <div class="name">${th.label}</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="field">
          <label>Currency</label>
          <select onchange="updateCurrency(this.value)">
            ${["USD","EUR","GBP","JPY","CAD","AUD","CHF","CNY","INR","MXN","BRL","KRW","SGD","VND","THB"].map(c => `<option ${state.settings.currency===c?"selected":""}>${c}</option>`).join("")}
          </select>
        </div>

        ${isLoggedIn() ? `
        <div class="field">
          <label>Data</label>
          <div class="row">
            <button class="btn" onclick="exportJson()">⬇ Export all to JSON</button>
            <label class="btn">
              ⬆ Import JSON
              <input type="file" accept=".json" style="display:none;" onchange="importJson(event)"/>
            </label>
          </div>
          <div class="hint" style="margin-top:8px;">
            ${stats.trips} trip${stats.trips===1?"":"s"} · ${stats.expenses} expense${stats.expenses===1?"":"s"} · ${stats.items} packing item${stats.items===1?"":"s"} synced to cloud.<br>
            Export a JSON backup any time. Import merges by trip ID — existing backups still work.
          </div>
        </div>

        <div class="field">
          <label style="color:#c0392b;">Danger zone</label>
          <button class="btn danger" onclick="resetAll()">Reset all data</button>
        </div>
        ` : ""}

        <div class="field">
          <label>App</label>
          <button class="btn" onclick="hardRefresh()">🔄 Hard refresh &amp; empty cache</button>
          <div class="hint" style="margin-top:8px;">Clears the service worker cache and reloads. Use if the app feels stuck on an old version.</div>
        </div>
      </div>
    `,
    actions: [{ label: "Done", primary: true, onClick: closeModal }]
  });
}
async function hardRefresh() {
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
  }
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  location.reload(true);
}
function pickTheme(id) {
  setTheme(id);
  document.querySelectorAll(".theme-swatch").forEach(s => s.classList.remove("sel"));
  document.querySelectorAll(`.theme-swatch[onclick*="${id}"]`).forEach(s => s.classList.add("sel"));
}
function updateCurrency(c) { if (!guardEdit()) return; state.settings.currency = c; saveState(); render(); }
function exportJson() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `trip-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importJson(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.trips) throw new Error("Not a Trip Planner backup");
      if (confirm(`Import ${data.trips.length} trip(s)? This will MERGE with your current data.`)) {
        const ids = new Set(state.trips.map(t => t.id));
        data.trips.forEach(t => { if (!ids.has(t.id)) state.trips.push(t); });
        if (data.settings) state.settings = Object.assign(state.settings, data.settings);
        saveState(); closeModal(); render();
        alert("Import successful!");
      }
    } catch (e) { alert("Failed to import: " + e.message); }
  };
  reader.readAsText(file);
}
function resetAll() {
  if (!isLoggedIn()) return;
  if (!confirm("Delete ALL trips and data? This cannot be undone.")) return;
  if (!confirm("Really? Last chance.")) return;
  state = DEFAULT_STATE();
  saveState(); closeModal(); goHome();
}

// -------- INITIAL --------
document.addEventListener("DOMContentLoaded", async () => {
  // Apply cached theme immediately — zero flicker on return visits.
  const cachedTheme = localStorage.getItem("tp_theme") || "beach";
  document.documentElement.setAttribute("data-theme", cachedTheme);

  // Register PWA service worker.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  }

  // Handle shared trip link: ?share=<token> — no auth required.
  const shareToken = new URLSearchParams(location.search).get("share");
  if (shareToken) {
    await loadSharedTrip(shareToken);
    return;
  }

  // Restore session from localStorage JWT.
  const storedToken = getToken();
  if (storedToken) {
    try { currentUser = JSON.parse(atob(storedToken.split(".")[1])); } catch { currentUser = null; }
  }

  if (currentUser) {
    updateHeaderUI();
    state = await loadState();
    render();
  } else {
    showLoginModal();
  }

  document.addEventListener("keydown", e => {
    if (document.getElementById("lightbox-bg")) {
      if (e.key === "Escape") closeLightbox();
      else if (e.key === "ArrowLeft") moveLightbox(-1);
      else if (e.key === "ArrowRight") moveLightbox(1);
    }
  });
});

async function loadSharedTrip(token) {
  document.getElementById("app-root").innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--ink-soft);">Loading shared trip…</div>`;
  try {
    const res = await fetch(`/api/share/${token}`);
    if (!res.ok) throw new Error("not found");
    const { trip, settings, mode } = await res.json();

    state = { trips: [trip], settings: settings || { theme: "beach", currency: "USD" } };

    // Mark the document as being in share mode — hides nav and edit actions.
    document.documentElement.setAttribute("data-share", mode === "edit" ? "edit" : "read");

    const banner = document.getElementById("share-banner");
    banner.style.display = "";

    if (mode === "edit") {
      window._shareToken = token;
      banner.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Editing shared trip — changes save automatically`;
    } else {
      banner.innerHTML = `🔗 Shared view — read only`;
    }

    const tabsParam = new URLSearchParams(location.search).get("tabs");
    window._shareTabs = tabsParam ? tabsParam.split(",").filter(t => ALL_TABS.includes(t)) : null;

    const firstTab = window._shareTabs ? window._shareTabs[0] : "overview";
    route = { view: "trip", tripId: trip.id, tab: firstTab || "overview" };
    render();
    if (!getMyTraveler(trip.id) && (trip.travelers || []).length > 0) {
      showTravelerSelectModal(trip);
    }
  } catch {
    document.getElementById("app-root").innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <div style="font-size:48px;margin-bottom:16px;">🔗</div>
        <h3>Share link not found</h3>
        <p style="color:var(--ink-soft);">This link may have expired or been removed.</p>
        <button class="btn primary" onclick="location.href='/'">Go home</button>
      </div>`;
  }
}

function getFileThumbUrl(f, size = 400) {
  return f.thumbnailLink
    ? f.thumbnailLink.replace(/=s\d+$/, `=s${size}`)
    : `/api/drive/thumb?fileId=${encodeURIComponent(f.id)}&sz=${size}`;
}

function getTripThumbnailUrl(t) {
  const { thumbnailId } = t.driveFolder || {};
  return thumbnailId ? `/api/drive/thumb?fileId=${encodeURIComponent(thumbnailId)}` : null;
}

function renderTripCard(t) {
  const dU = daysUntil(t.startDate);
  const dEnd = daysUntil(t.endDate);
  let cdLabel, cdClass = "";
  if (dU === null) { cdLabel = "no date"; cdClass = "past"; }
  else if (dU > 0) cdLabel = `in ${dU}d`;
  else if (dU === 0) { cdLabel = "today!"; cdClass = "live"; }
  else if (dEnd !== null && dEnd >= 0) { cdLabel = "live now"; cdClass = "live"; }
  else { cdLabel = `${-dU}d ago`; cdClass = "past"; }

  const totalSpend = (t.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);
  const peopleCt = (t.travelers || []).length;
  const nights = tripDuration(t);
  const dates = (t.startDate || t.endDate)
    ? `${fmtDate(t.startDate, {month:"short",day:"numeric"})}${t.endDate ? " – " + fmtDate(t.endDate, {month:"short",day:"numeric",year:"numeric"}) : ""}`
    : "Dates TBD";

  return `
    <div class="trip-card" onclick="openTrip('${t.id}')">
      <div class="trip-card-cd ${cdClass}">${cdLabel}</div>
      ${(() => { const tu = getTripThumbnailUrl(t); return `<div class="trip-card-banner${tu ? " has-thumb" : ""}">
        ${tu ? `<img src="${escapeAttr(tu)}" alt="${escapeHtml(t.title)}" onerror="this.parentElement.classList.remove('has-thumb');this.remove()" />` : (t.emoji || "🌍")}
      </div>`; })()}
      <div class="trip-card-title">${escapeHtml(t.title)}</div>
      <div class="trip-card-dest">${escapeHtml(t.destination || "Destination TBD")}</div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${dates}${nights ? ` <span class="muted">· ${nights}d</span>` : ""}
      </div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        ${peopleCt ? peopleCt + " " + (peopleCt === 1 ? "traveler" : "travelers") : "Solo or TBD"}
      </div>
      <div class="trip-card-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        ${totalSpend > 0 ? fmtCurrency(totalSpend) : (t.budget ? fmtCurrency(t.budget) + "/person budget" : "No expenses yet")}
      </div>
      <button class="btn sm edit-action" style="margin-top:10px;width:100%;justify-content:center;"
              onclick="duplicateTrip('${t.id}', event)" title="Duplicate as template">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Duplicate
      </button>
    </div>
  `;
}

function getTripMemoryLine(t) {
  const line = (t.memoryLine || "").trim();
  if (line) return line;
  return (t.destination || "").trim() || "Memory";
}

function renderPostcard(t, idx) {
  const dates = (t.startDate || t.endDate)
    ? `${fmtDate(t.startDate, {month:"short",day:"numeric"})}${t.endDate ? " – " + fmtDate(t.endDate, {month:"short",day:"numeric",year:"numeric"}) : ""}`
    : "Dates TBD";
  const peopleCt = (t.travelers || []).length;
  const totalSpend = (t.expenses || []).reduce((s, e) => s + (parseFloat(e.cost) || 0), 0);
  const nights = tripDuration(t);
  const memoryLine = getTripMemoryLine(t);
  return `
    <article class="postcard" onclick="handlePostcardClick(event, '${t.id}')">
      <div class="stamp">${(t.startDate || "").slice(0,4) || ""}</div>
      <div class="postcard-emoji">${t.emoji || "🌍"}</div>
      <div class="postcard-title">${escapeHtml(t.title)}</div>
      <div class="postcard-sub">${escapeHtml(dates)}</div>
      <div class="postcard-memory">${escapeHtml(memoryLine)}</div>

      <div class="postcard-reveal">
        <div class="text-sm">${peopleCt ? peopleCt + " traveler" + (peopleCt === 1 ? "" : "s") : "Travelers TBD"} · ${nights ? nights + " day" + (nights === 1 ? "" : "s") : "Dates TBD"}</div>
        <div class="text-sm" style="margin-top:4px;">${totalSpend > 0 ? fmtCurrency(totalSpend) + " total" : (t.budget ? fmtCurrency(t.budget) + "/person budget" : "No expenses yet")}</div>
        <div class="postcard-actions">
          <button class="btn sm" onclick="openTrip('${t.id}'); event.stopPropagation();">Open trip</button>
          <button class="postcard-edit" onclick="openMemoryLineEditor('${t.id}'); event.stopPropagation();">✎ Memory</button>
        </div>
      </div>
    </article>
  `;
}

function setupPastYearScrubber() {
  const track = document.getElementById("year-track");
  const handle = document.getElementById("year-handle");
  const tooltip = document.getElementById("year-tooltip");
  if (!track || !handle) return;
  const points = Array.from(track.querySelectorAll(".year-node"));
  if (!points.length) return;

  const resolveActive = () => {
    if (pastYearFilter === "all") return points[points.length - 1];
    return points.find(p => p.dataset.year === pastYearFilter) || points[points.length - 1];
  };

  const positionHandle = (point, showTooltip) => {
    if (!point) return;
    const trackRect = track.getBoundingClientRect();
    const pointRect = point.getBoundingClientRect();
    const center = pointRect.left - trackRect.left + pointRect.width / 2;
    handle.style.left = `${center}px`;
    if (tooltip) {
      tooltip.textContent = point.dataset.year || "";
      tooltip.style.display = showTooltip ? "block" : "none";
    }
  };

  const pickNearestYear = (clientX) => {
    const trackRect = track.getBoundingClientRect();
    const x = Math.min(Math.max(clientX, trackRect.left), trackRect.right);
    let nearest = points[0];
    let min = Infinity;
    points.forEach(p => {
      const r = p.getBoundingClientRect();
      const px = r.left + r.width / 2;
      const d = Math.abs(px - x);
      if (d < min) { min = d; nearest = p; }
    });
    return nearest;
  };

  positionHandle(resolveActive(), false);

  let dragging = false;
  let pendingYear = null;
  const onPointerMove = (e) => {
    if (!dragging) return;
    const nearest = pickNearestYear(e.clientX);
    pendingYear = nearest.dataset.year;
    positionHandle(nearest, true);
  };

  const stopDrag = (e) => {
    if (!dragging) return;
    dragging = false;
    try { handle.releasePointerCapture(e.pointerId); } catch {}
    document.removeEventListener("pointermove", onPointerMove);
    document.removeEventListener("pointerup", stopDrag);
    if (pendingYear && pastYearFilter !== pendingYear) {
      setPastYearFilter(pendingYear);
    } else {
      positionHandle(resolveActive(), false);
    }
    pendingYear = null;
  };

  handle.onpointerdown = (e) => {
    dragging = true;
    handle.setPointerCapture(e.pointerId);
    document.addEventListener("pointermove", onPointerMove);
    document.addEventListener("pointerup", stopDrag);
  };

  track.onpointerdown = (e) => {
    if (e.target === handle) return;
    const nearest = pickNearestYear(e.clientX);
    pendingYear = nearest.dataset.year;
    positionHandle(nearest, true);
    if (pendingYear && pastYearFilter !== pendingYear) {
      setPastYearFilter(pendingYear);
    } else {
      positionHandle(resolveActive(), false);
    }
    pendingYear = null;
  };
}

function handlePostcardClick(event, tripId) {
  const card = event.currentTarget;
  if (event.target.closest(".postcard-actions") || event.target.closest(".postcard-edit")) return;
  if (card.classList.contains("revealed")) {
    openTrip(tripId);
    return;
  }
  document.querySelectorAll(".postcard.revealed").forEach(c => c.classList.remove("revealed"));
  card.classList.add("revealed");
}

function openMemoryLineEditor(tripId) {
  if (!guardEdit()) return;
  const t = (state.trips || []).find(x => x.id === tripId);
  if (!t) return;
  const current = (t.memoryLine || "").trim();
  showModal({
    title: "Edit memory line",
    size: "sm",
    body: `
      <div class="field">
        <label>Memory line</label>
        <input id="memory-line-input" value="${escapeAttr(current)}" placeholder="${escapeAttr(t.destination || 'Memory line')}" />
      </div>
    `,
    actions: [
      { label: "Cancel", onClick: closeModal },
      { label: "Save", primary: true, onClick: () => {
        const v = (document.getElementById("memory-line-input").value || "").trim();
        t.memoryLine = v;
        saveState();
        closeModal();
        render();
      }}
    ]
  });
}
